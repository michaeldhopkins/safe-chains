[[command]]
name = "codex"
description = "OpenAI's local coding agent that reads, modifies, and executes code on your machine. Codex runs in Agent mode by default, giving it the ability to read files, write changes, and run shell commands within your project directory. It communicates with OpenAI's API over the network, sending code context with each request. Some subcommands (cloud status/list/diff, review) are read-only, while others (apply, exec, fork, resume) modify local state. The project is under active development with frequent CLI changes."
url = "https://github.com/openai/codex"
bare_flags = ["--help", "--version", "-V", "-h"]
[command.wrapper]
valued = ["--config", "--disable", "--enable", "-c"]

[[command.sub]]
name = "apply"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "cloud"
nested_bare = true
[[command.sub.sub]]
name = "apply"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "diff"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "status"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "completion"
standalone = ["--help", "-h"]
valued = ["--shell", "-s"]
max_positional = 0

[[command.sub]]
name = "debug"
nested_bare = true
[[command.sub.sub]]
name = "app-server"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "exec"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "features"
nested_bare = true
[[command.sub.sub]]
name = "disable"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "enable"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "fork"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "mcp"
nested_bare = true
[[command.sub.sub]]
name = "add"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "get"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "remove"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "resume"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "review"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "sandbox"
level = "SafeWrite"
tolerate_unknown_short = true
tolerate_unknown_long = true
