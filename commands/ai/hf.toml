[[command]]
name = "hf"
description = "CLI for interacting with the Hugging Face Hub, a platform hosting ML models, datasets, and Spaces. The full CLI includes subcommands for downloading, uploading, repo creation, and job management, all of which hit the Hugging Face API over the network. Read-only subcommands (list, info, cache inspection) query the Hub or inspect local cache without side effects. Mutating subcommands (upload, repo create/delete, login) modify remote state. The project is actively developed with new subcommands appearing regularly."
url = "https://huggingface.co/docs/huggingface_hub/guides/cli"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "env"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "cache"
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "verify"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "collections"
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
valued = ["--limit", "--owner"]

[[command.sub]]
name = "datasets"
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
valued = ["--author", "--filter", "--limit", "--search", "--sort"]
[[command.sub.sub]]
name = "parquet"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "discussions"
[[command.sub.sub]]
name = "diff"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "list"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "jobs"
[[command.sub.sub]]
name = "logs"
bare = false
standalone = ["--help", "-h"]
valued = ["--tail"]
[[command.sub.sub]]
name = "ps"
standalone = ["--help", "-h"]

[[command.sub]]
name = "models"
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
valued = ["--author", "--filter", "--limit", "--search", "--sort"]

[[command.sub]]
name = "spaces"
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
valued = ["--author", "--filter", "--limit", "--search", "--sort"]
