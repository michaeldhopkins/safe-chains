[[command]]
name = "llm"
description = "CLI and Python library for interacting with large language models from multiple providers. The full tool can send prompts to LLMs over the network, execute tool-calling functions locally, manage API keys, and install plugins that extend its capabilities with arbitrary code. Read-only subcommands (models, plugins, aliases, templates, logs) inspect local configuration and conversation history stored in a SQLite database without side effects. The project is under very active development with major new features (tool calling, multimodal input) added in recent releases."
url = "https://llm.datasette.io/en/stable/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "aliases"
standalone = ["--help", "--json", "-h"]

[[command.sub]]
name = "collections"
standalone = ["--help", "--json", "-h"]

[[command.sub]]
name = "logs"
standalone = [
    "--conversation", "--help", "--json", "--no-truncate", "--response", "--truncate",
    "-h",
]
valued = ["--cid", "--count", "--id", "--model", "--search", "-c", "-m", "-n"]

[[command.sub]]
name = "models"
standalone = ["--help", "--json", "--options", "-h"]

[[command.sub]]
name = "plugins"
standalone = ["--all", "--help", "--json", "-h"]

[[command.sub]]
name = "templates"
standalone = ["--help", "--json", "-h"]
