[[command]]
name = "aapt2"
description = "Android Asset Packaging Tool, part of the Android SDK build tools. aapt2 compiles and links Android resources into binary format for inclusion in APKs. The compile and link subcommands write output files. The dump subcommands are read-only, parsing compiled APK files to display badging, permissions, resources, strings, and XML trees without modification. Entirely local with no network access. Released as part of the Android SDK build tools, which update a few times per year."
url = "https://developer.android.com/tools/aapt2"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "dump"
[[command.sub.sub]]
name = "badging"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "configurations"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "permissions"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "resources"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "strings"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "styleparents"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "xmlstrings"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]
[[command.sub.sub]]
name = "xmltree"
bare = false
standalone = ["--help", "--no-values", "-h", "-v"]
valued = ["--config", "--file"]

[[command.sub]]
name = "version"
bare = true
max_positional = 0
standalone = ["--help", "-h"]
