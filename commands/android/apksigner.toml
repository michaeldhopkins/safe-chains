[[command]]
name = "apksigner"
description = "Signs and verifies Android APK files using cryptographic signatures, part of the Android SDK build tools. The sign subcommand modifies the APK by embedding a digital signature (requires access to a private key). The rotate subcommand manages signing key lineage. The verify subcommand is read-only: it checks the integrity and authenticity of an existing signature without modifying the file. All operations are local with no network access. Released as part of the Android SDK build tools."
url = "https://developer.android.com/tools/apksigner"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "help"
bare = true
max_positional = 0
standalone = ["--help", "-h"]

[[command.sub]]
name = "verify"
bare = false
standalone = ["--help", "--print-certs", "--verbose", "-h", "-v"]
valued = ["--in", "--max-sdk-version", "--min-sdk-version"]

[[command.sub]]
name = "version"
bare = true
max_positional = 0
standalone = ["--help", "-h"]
