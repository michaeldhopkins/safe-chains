[[command]]
name = "ansible-vault"
description = "Manages encrypted Ansible vault files. Subcommands: `view` / `decrypt` (read encrypted content), `encrypt` / `encrypt_string` / `rekey` (write — re-encrypt or replace files), `edit` (interactive — opens $EDITOR), `create` (interactive new). Each invocation reads or writes the local vault file with the configured password source."
url = "https://docs.ansible.com/ansible/latest/cli/ansible-vault.html"
researched_version = "Ansible 9.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "view"
profile = "decrypt-read"
fact = "`ansible-vault view` decrypts an encrypted vault file with the configured password and prints its PLAINTEXT to stdout — the decrypted secrets (passwords, keys, tokens) enter the caller's context."
source = "https://docs.ansible.com/ansible/latest/cli/ansible-vault.html"
judgment = "Revealing a vault's decrypted contents to the model is a secret disclosure; conservative classification is decrypt-to-screen (credential exposure)."
bare = false
tolerate_unknown_short = true
standalone = ["--ask-vault-pass", "--ask-vault-password", "--help", "-h", "--vault-password-file"]
valued = ["--vault-id", "--vault-password-file", "--ask-vault-pass-file"]

[[command.sub]]
name = "decrypt"
profile = "decrypt-read"
fact = "`ansible-vault decrypt` decrypts an encrypted vault file — with `--output -` it streams the PLAINTEXT to stdout (into the caller's context); otherwise it rewrites the file to plaintext on disk (unencrypted secret material persisted)."
source = "https://docs.ansible.com/ansible/latest/cli/ansible-vault.html"
judgment = "Revealing or materializing a vault's decrypted secrets is a secret disclosure; conservative classification is decrypt-to-screen, matching the sibling `view` sub."

[[command.sub]]
name = "encrypt"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = ["--ask-vault-pass", "--ask-vault-password", "--encrypt-vault-id", "--help", "-h"]
valued = ["--encrypt-vault-id", "--output", "--vault-id", "--vault-password-file"]

[[command.sub]]
name = "encrypt_string"
level = "SafeRead"
bare = false
standalone = ["--ask-vault-pass", "--ask-vault-password", "--help", "--show-input", "--stdin-name", "-h", "-n"]
valued = ["--encrypt-vault-id", "--name", "--stdin-name", "--vault-id", "--vault-password-file"]

[[command.sub]]
name = "create"
candidate = true

[[command.sub]]
name = "edit"
candidate = true

[[command.sub]]
name = "rekey"
candidate = true

[[command.sub]]
name = "help"
allow_all = true
