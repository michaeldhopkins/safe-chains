[[command]]
name = "anchor"
description = "Anchor — Solana smart contract framework. Subcommands: `init`, `build`, `test`, `verify`, `deploy`, `upgrade`, `idl init/upgrade/fetch/parse/build`, `migrate`, `cluster`, `localnet`, `account`, `airdrop`, `keys list/sync`, `new`, `run`, `shell`, `clean`, `expand`, `--version`, `--help`. Carve-out: --version / --help / `keys list` / `idl fetch` / `cluster list`."
url = "https://www.anchor-lang.com/docs/cli"
researched_version = "Anchor 0.x"
bare_flags = ["--help", "--version", "-h", "-V"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "keys"
nested_bare = false

[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "sync"
candidate = true

[[command.sub]]
name = "idl"
nested_bare = false

[[command.sub.sub]]
name = "fetch"
standalone = ["--help", "-h"]
valued = ["--out", "-o"]

[[command.sub.sub]]
name = "parse"
standalone = ["--help", "-h"]
valued = ["--file", "--out"]

