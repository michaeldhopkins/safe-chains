[[command]]
name = "cast"
description = "Foundry — Swiss Army knife for interacting with Ethereum chains. Many subcommands. Read-side: `call`, `code`, `block`, `block-number`, `chain`, `chain-id`, `client`, `compute-address`, `gas-price`, `nonce`, `storage`, `tx`, `receipt`, `logs`, `lookup-address`, `resolve-name`, `balance`, `balance-of`, `wallet address`, `wallet vanity`, `4byte`, `4byte-decode`, `abi-decode`, `abi-encode`, `decode-string`, `decode-uint`, `decode-int`, `to-*` conversion subs, `format-bytes32-string`, `parse-bytes32-string`, `keccak`, `from-bin`, `from-utf8`, `concat-hex`, `--version`, `--help`. Write-side: `send`, `mktx`, `publish`, `wallet new/import/derive/sign/decrypt-keystore`, `bind`, `etherscan-source`, `disassemble` (read), `wallet new-mnemonic`."
url = "https://book.getfoundry.sh/reference/cast/"
researched_version = "Foundry 2024.x"
bare_flags = ["--help", "--version", "-h", "-v"]

