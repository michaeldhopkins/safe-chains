[[command]]
name = "forge"
description = "Foundry — Solidity build / test / deploy tool. Many subcommands. Read-side: `version`, `--help`, `tree`, `inspect`, `selectors`, `flatten`, `doc`, `geiger`, `cache ls`, `config`, `verify-check`, `verify-bytecode`, `--list`, `clean --dry-run`. Write-side: `init`, `build`, `compile`, `test`, `script`, `create`, `coverage`, `snapshot`, `bind`, `bind-json`, `clean`, `cache clean`, `update`, `install`, `remove`, `remappings`, `verify-contract`, `fmt`, `fmt --check`, `gen-completions`, `debug`."
url = "https://book.getfoundry.sh/reference/forge/"
researched_version = "Foundry 2024.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
allow_all = true

[[command.sub]]
name = "tree"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "inspect"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "selectors"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "flatten"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "geiger"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "config"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "verify-check"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "verify-bytecode"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "remappings"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "completions"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

