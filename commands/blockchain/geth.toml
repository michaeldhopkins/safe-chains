[[command]]
name = "geth"
description = "Go-Ethereum — Ethereum execution layer client. Bare invocation starts the node (long-running, listens, syncs from peers). Subcommands: `version`, `console`, `attach`, `account`, `init`, `db`, `dump`, `dumpgenesis`, `export`, `import`, `removedb`, `snapshot`, `js`, `license`. Carve-out covers diagnostic / read forms."
url = "https://geth.ethereum.org/docs/fundamentals/command-line-options"
researched_version = "Geth 1.x"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "version"
allow_all = true

[[command.sub]]
name = "license"
allow_all = true

[[command.sub]]
name = "help"
allow_all = true

