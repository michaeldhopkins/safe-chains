[[command]]
name = "ignite"
description = "Ignite CLI — develops Cosmos SDK chains. Subcommands: `scaffold` (chain/module/type/message/list/map/single/query/packet), `chain serve/build/init/faucet`, `relayer`, `network`, `account`, `version`, `--help`, `tools`, `generate`, `docs`. Carve-out covers diagnostic / read forms."
url = "https://docs.ignite.com/references/cli"
researched_version = "Ignite 28.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "scaffold"
candidate = true

[[command.sub]]
name = "chain"
candidate = true

[[command.sub]]
name = "relayer"
candidate = true

[[command.sub]]
name = "network"
candidate = true

[[command.sub]]
name = "account"
candidate = true

[[command.sub]]
name = "tools"
candidate = true

[[command.sub]]
name = "generate"
candidate = true

[[command.sub]]
name = "docs"
candidate = true

[[command.sub]]
name = "node"
candidate = true

[[command.sub]]
name = "plugin"
candidate = true

[[command.sub]]
name = "app"
candidate = true

[[command.sub]]
name = "doctor"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "testnet"
candidate = true
