[[command]]
name = "solana"
description = "Solana CLI. Many subcommands. Read-side: `--version`, `address`, `balance`, `block`, `block-height`, `block-time`, `cluster-version`, `confirm`, `epoch`, `epoch-info`, `epoch-schedule`, `fees`, `find-program-derived-address`, `genesis-hash`, `gossip`, `inflation`, `largest-accounts`, `leader-schedule`, `live-slots`, `logs`, `nonce`, `nonce-account`, `ping`, `program show`, `program dump`, `rent`, `slot`, `stake-account`, `stake-history`, `stakes`, `stake-minimum-delegation`, `supply`, `transaction-count`, `transaction-history`, `transfer --dry-run`, `validators`, `vote-account`, `vote-update-validator --dry-run`, `wait-for-max-stake`, `withdraw-stake --dry-run`. Write-side: `airdrop`, `transfer`, `delegate-stake`, `deactivate-stake`, `merge-stake`, `split-stake`, `withdraw-stake`, `create-stake-account`, `create-vote-account`, `vote-update-commission`, `vote-update-validator`, `withdraw-from-vote-account`, `program deploy/upgrade/close`, `account`, `nonce-authorize`, `new-nonce`, `withdraw-from-nonce-account`, `create-nonce-account`, `decode-transaction`, `verify-program-deploy`."
