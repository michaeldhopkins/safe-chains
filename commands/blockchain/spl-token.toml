name = "supply"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "account-info"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "multisig-info"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "help"
allow_all = true

