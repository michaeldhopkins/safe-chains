[[command]]
name = "spl-token"
description = "Solana SPL Token CLI. Many subcommands. Read-side: `accounts`, `address`, `balance`, `display`, `gc`, `multisig-info`, `supply`, `account-info`, `--version`, `--help`. Write-side: `create-token`, `create-account`, `create-multisig`, `mint`, `burn`, `transfer`, `freeze`, `thaw`, `wrap`, `unwrap`, `approve`, `revoke`, `close`, `authorize`, `enable-required-transfer-memos`, `disable-required-transfer-memos`."
url = "https://spl.solana.com/token"
researched_version = "SPL Token 4.x"
bare_flags = ["--help", "--version", "-h", "-V"]

[[command.sub]]
name = "accounts"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "address"
allow_all = true
level = "SafeRead"

