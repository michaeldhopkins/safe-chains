[[command]]
name = "truffle"
description = "Truffle — Ethereum dev framework (deprecated by ConsenSys but still in use). Subcommands: `compile`, `console`, `migrate`, `test`, `deploy`, `develop`, `init`, `unbox`, `version`, `db`, `dashboard`, `debug`, `exec`, `networks`, `obtain`, `opcode`, `preserve`, `publish`, `run`, `watch`. Carve-out: `version`, `--help`, `networks`."
url = "https://archive.trufflesuite.com/docs/truffle/reference/truffle-commands/"
researched_version = "Truffle 5.x; deprecated"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "networks"
level = "SafeRead"
bare = true
standalone = ["--clean", "--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

