[[command]]
name = "earthly"
description = "Earthly — containerized build tool combining Docker + Make. Bare invocation runs an Earthfile target (executes container builds + arbitrary commands). Carve-out: --version / --help / `account`/`org`/`secrets list` (read forms)."
url = "https://docs.earthly.dev/docs/earthly-command"
researched_version = "earthly 0.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "doc"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--all-targets", "--help", "-a", "-h"]

[[command.sub]]
name = "ls"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--all", "--args", "--help", "--long", "-a", "-h", "-l"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "build"
candidate = true

[[command.sub]]
name = "init"
candidate = true

[[command.sub]]
name = "config"
candidate = true

