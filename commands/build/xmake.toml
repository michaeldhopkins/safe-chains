[[command]]
name = "xmake"
description = "xmake — modern C/C++ build tool with Lua project description. Many subcommands. Read-side: `--version`, `--help`, `info`, `list`, `show`, `lua`, `format` (with -c check). Write-side: `build`, `config`, `install`, `package`, `run`, `test`, `clean`, `update`, `upgrade`, `repo`, `f` (configure shortcut), `b` (build shortcut), `r` (run shortcut). Bare invocation runs the build."
url = "https://xmake.io/#/manual/builtin_commands"
researched_version = "xmake 2.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "show"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--help", "-h"]
valued = ["--config", "--list", "-l"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "lua"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

