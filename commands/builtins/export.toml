[[command]]
name = "export"
description = "Marks shell variables for export to child processes' environments, or lists currently exported variables. Effects are process-local -- exported variables propagate only to subsequently spawned child processes, not to parent or sibling processes. Cannot modify the filesystem. POSIX builtin; no independent release cycle."
url = "https://man7.org/linux/man-pages/man1/export.1p.html"
level = "Inert"
bare = true
positional_style = true
standalone = ["-f", "-n", "-p"]
