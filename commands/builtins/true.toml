[[command]]
name = "true"
description = "Does nothing and returns exit status 0. Has no side effects whatsoever -- no filesystem access, no output, no state changes. Part of POSIX and GNU coreutils; the implementation is trivially simple and has been unchanged for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#true-invocation"
level = "Inert"
bare = true
max_positional = 0
standalone = ["--help", "--version", "-V", "-h"]
