[[command]]
name = "unset"
description = "Removes shell variables or function definitions from the current session. Effects are process-local -- unsetting a variable does not propagate to parent processes or persist beyond the session. Cannot modify the filesystem, but removing critical variables (PATH, HOME) could alter subsequent command resolution within the same shell. POSIX builtin; no independent release cycle."
url = "https://man7.org/linux/man-pages/man1/unset.1p.html"
level = "Inert"
bare = true
standalone = ["--help", "--version", "-V", "-f", "-h", "-n", "-v"]
