[[command]]
name = "which"
description = "Searches PATH directories to locate the executable that would be run for a given command name. Read-only: prints the resolved path to stdout without executing the target or modifying the filesystem. Feature set has been stable for decades; present on virtually all Unix-like systems."
url = "https://man7.org/linux/man-pages/man1/which.1.html"
level = "Inert"
bare = false
standalone = ["--all", "--help", "--version", "-V", "-a", "-h", "-s"]
