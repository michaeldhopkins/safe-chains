[[command]]
name = "aws"
description = "Unified command-line interface for managing all Amazon Web Services resources. The full CLI can create, modify, and delete cloud infrastructure, manage IAM policies, and exfiltrate data from S3/Secrets Manager. Authenticated via credentials in ~/.aws or environment variables. Releases multiple times per week; very high project velocity."
url = "https://docs.aws.amazon.com/cli/latest/"
bare_flags = ["--help", "--version"]
[command.wrapper]
standalone = ["--debug", "--no-paginate", "--no-sign-request", "--no-verify-ssl"]
valued = [
    "--ca-bundle", "--cli-connect-timeout", "--cli-read-timeout",
    "--color", "--endpoint-url", "--output",
    "--profile", "--query", "--region",
]

[[command.sub]]
name = "configure"
[[command.sub.sub]]
name = "list"
standalone = ["--help"]
[[command.sub.sub]]
name = "get"
bare = false
standalone = ["--help"]

[[command.sub]]
name = "sts"
[[command.sub.sub]]
name = "get-caller-identity"
standalone = ["--help"]

[[command.sub]]
name = "s3"
first_arg = ["ls"]
positional_style = true

