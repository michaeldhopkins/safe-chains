[[command]]
name = "az"
description = "Unified command-line interface for managing Microsoft Azure resources. The full CLI can create, modify, and delete cloud infrastructure, manage RBAC/AD policies, and access Key Vault secrets. Authenticated via device login, service principal, or managed identity. Released monthly with high project velocity."
url = "https://learn.microsoft.com/en-us/cli/azure/"
examples_safe = [
    "az mysql server show --name n --resource-group g",
    "az servicebus namespace list",
    "az batch pool show --pool-id p",
    "az container logs --name n --resource-group g",
    "az cdn name-exists --name n",
    "az search service show --name n --resource-group g",
    "az vm nic list --vm-name v --resource-group g",
    "az batch node list --pool-id p",
    "az eventhubs namespace authorization-rule list --namespace-name n --resource-group g",
]
examples_denied = [
    "az search admin-key show --service-name s --resource-group g",
    "az search query-key list --service-name s --resource-group g",
    "az redis list-keys --name n --resource-group g",
    "az aks get-credentials --name n --resource-group g",
    "az cognitiveservices account keys list --name n --resource-group g",
    "az mysql server create --name n --resource-group g",
    "az servicebus namespace delete --name n --resource-group g",
    "az vm secret list --vm-name v --resource-group g",
    "az batch account keys list --name n",
    "az iot hub connection-string show --hub-name h",
    "az eventhubs namespace authorization-rule keys list --namespace-name n --resource-group g",
    "az vm nic delete --vm-name v --nic n --resource-group g",
]
bare_flags = ["--help", "-h", "--version"]
[command.wrapper]
standalone = ["--debug", "--only-show-errors", "--verbose"]
valued = ["--output", "--query", "--subscription", "-o"]

