[[command]]
name = "gcloud"
description = "Unified command-line interface for managing Google Cloud Platform resources. The full CLI can create, modify, and delete cloud infrastructure, manage IAM bindings, and access Secret Manager. Authenticated via OAuth or service account keys. Released weekly as part of the Google Cloud SDK; very high project velocity."
url = "https://cloud.google.com/sdk/gcloud/reference"
bare_flags = ["--help", "-h", "--version"]
[command.wrapper]
standalone = ["--quiet", "-q"]
valued = [
    "--configuration", "--flatten", "--format", "--filter",
    "--limit", "--log-http", "--project", "--sort-by", "--verbosity",
]

[[command.sub]]
name = "version"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "info"
standalone = ["--anonymize", "--help", "--run-diagnostics", "-h"]

[[command.sub]]
name = "auth"
[[command.sub.sub]]
name = "list"
standalone = ["--filter-account", "--help", "-h"]
[[command.sub.sub]]
name = "print-access-token"
profile = "credential-read"
fact = "Prints a valid OAuth2 access token for the active account to stdout — a bearer credential the holder can use to call Google APIs."
source = "https://cloud.google.com/sdk/gcloud/reference/auth/print-access-token"
[[command.sub.sub]]
name = "print-identity-token"
profile = "credential-read"
fact = "Prints a valid OIDC identity token to stdout — a bearer credential asserting the account's identity to relying services."
source = "https://cloud.google.com/sdk/gcloud/reference/auth/print-identity-token"

[[command.sub]]
name = "config"
[[command.sub.sub]]
name = "list"
standalone = ["--all", "--help", "-h"]
[[command.sub.sub]]
name = "get"
bare = false
