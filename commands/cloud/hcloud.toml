name = "datacenter"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--output", "-o"]
[[command.sub.sub]]
name = "describe"
bare = false
standalone = ["--help", "-h"]
valued = ["--output", "-o"]

