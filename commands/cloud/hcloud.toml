[[command]]
name = "hcloud"
description = "Command-line interface for managing Hetzner Cloud resources (servers, volumes, networks, firewalls, load balancers). The full CLI can create, modify, and delete infrastructure. Authenticated via project-scoped API token. Open-source Go project with moderate release velocity."
url = "https://github.com/hetznercloud/cli"
bare_flags = ["--help", "--version", "-h", "-v"]
[command.wrapper]
valued = ["--poll-interval"]

[[command.sub]]
name = "version"

[[command.sub]]
name = "context"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "active"
standalone = ["--help", "-h"]

[[command.sub]]
name = "datacenter"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--output", "-o"]
[[command.sub.sub]]
name = "describe"
bare = false
standalone = ["--help", "-h"]
valued = ["--output", "-o"]

[[command.sub]]
name = "location"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--output", "-o"]
[[command.sub.sub]]
name = "describe"
bare = false
standalone = ["--help", "-h"]
valued = ["--output", "-o"]

