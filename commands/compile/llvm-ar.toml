[[command]]
name = "llvm-ar"
aliases = ["llvm-ranlib"]
description = "LLVM archiver — manages static library (.a) archives. Same key-letter syntax as `ar`. r/q/x/d/s mutate archives, t/p are read."
url = "https://llvm.org/docs/CommandGuide/llvm-ar.html"
researched_version = "LLVM 22.x"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--version", "-?", "-h"]
