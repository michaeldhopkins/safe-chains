[[command]]
name = "llvm-as"
description = "LLVM assembler — converts text IR (.ll) to bitcode (.bc). Pure SafeWrite."
url = "https://llvm.org/docs/CommandGuide/llvm-as.html"
researched_version = "LLVM 22.x"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--version", "-?", "-h"]
