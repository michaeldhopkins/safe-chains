[[command]]
name = "llvm-dis"
description = "LLVM disassembler — converts bitcode (.bc) to text IR (.ll). Pure read + SafeWrite."
url = "https://llvm.org/docs/CommandGuide/llvm-dis.html"
researched_version = "LLVM 18.x"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--version", "-?", "-h"]
