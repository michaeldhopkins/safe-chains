[[command]]
name = "llvm-pdbutil"
description = "LLVM PDB utility — inspects Microsoft Program Database (`.pdb`) debug info files. Read-only: dumps streams, symbols, types, modules to stdout. Used when debugging Windows binaries from a Unix toolchain."
url = "https://llvm.org/docs/CommandGuide/llvm-pdbutil.html"
researched_version = "LLVM 22.x"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--version", "-?", "-h"]
