[[command]]
name = "buildah"
description = "OCI container builder. Subcommands: `build`, `from`, `commit`, `push`, `pull`, `tag`, `untag`, `rm`, `rmi`, `run`, `mount`, `unmount`, `manifest`, `bud`, `add`, `copy`, `config`, `images`, `containers`, `inspect`, `version`, `info`. Most operations modify local container storage and may contact registries (network). Carve-out covers diagnostic / read-only inspection."
url = "https://github.com/containers/buildah/tree/main/docs"
researched_version = "buildah 1.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]
valued = ["--format", "--json"]

[[command.sub]]
name = "info"
level = "Inert"
bare = true
standalone = ["--debug", "--help", "-h"]
valued = ["--format"]

[[command.sub]]
name = "images"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--all", "--digests", "--help", "--history", "--json", "--no-trunc", "--noheading", "--quiet", "-a", "-h", "-n", "-q"]
valued = ["--filter", "--format", "-f"]

[[command.sub]]
name = "containers"
level = "SafeRead"
bare = true
standalone = ["--all", "--help", "--json", "--no-trunc", "--noheading", "--notruncate", "--quiet", "-a", "-h", "-q"]
valued = ["--filter", "--format", "-f"]

[[command.sub]]
name = "inspect"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]
valued = ["--format", "--type", "-f", "-t"]

[[command.sub]]
name = "help"
allow_all = true

