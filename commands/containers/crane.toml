[[command]]
name = "crane"
description = "Lightweight CLI for interacting with container registries, part of google/go-containerregistry. Subcommands divide into read-only operations (manifest, config, digest, ls, catalog, blob, validate) that fetch metadata or content from registries, and write operations (push, append, copy, delete, tag, mutate, flatten) that modify registry state. All registry interactions are network operations. The project releases frequently -- multiple patch releases per month in active periods -- and occasionally adds new subcommands."
url = "https://github.com/google/go-containerregistry"
bare_flags = ["--help", "-h"]
[command.wrapper]
standalone = ["--insecure", "--verbose", "-v"]
valued = ["--platform"]

[[command.sub]]
name = "blob"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "catalog"
bare = false
standalone = ["--full-ref", "--help", "-h"]

[[command.sub]]
name = "config"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "digest"
bare = false
standalone = ["--full-ref", "--help", "--tarball", "-h"]

[[command.sub]]
name = "ls"
bare = false
standalone = ["--full-ref", "--help", "--omit-digest-tags", "-h"]

[[command.sub]]
name = "manifest"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "validate"
bare = false
standalone = ["--fast", "--help", "--remote", "--tarball", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]
