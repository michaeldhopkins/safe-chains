[[command]]
name = "kapp"
description = "Carvel kapp — Kubernetes application deployment tool that uses an app abstraction. Subcommands `deploy`, `delete`, `logs`, `inspect`, `app-change`, `pause`, `cancel`, `set` mostly modify cluster state. Read-side: `version`, `list`, `inspect`, `app-change list`, `config`. Carve-out covers diagnostic / read-only inspection."
url = "https://carvel.dev/kapp/"
researched_version = "kapp 0.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "list"
level = "SafeRead"
bare = true
standalone = ["--all-namespaces", "--help", "--namespace", "-A", "-h", "-n"]
valued = ["--namespace", "-n"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "deploy"
candidate = true

[[command.sub]]
name = "delete"
candidate = true

[[command.sub]]
name = "inspect"
candidate = true

[[command.sub]]
name = "logs"
candidate = true

[[command.sub]]
name = "app-change"
candidate = true

[[command.sub]]
name = "config"
candidate = true

[[command.sub]]
name = "pause"
candidate = true

[[command.sub]]
name = "cancel"
candidate = true

[[command.sub]]
name = "set"
candidate = true

[[command.sub]]
name = "rename"
candidate = true

[[command.sub]]
name = "label-change"
candidate = true

[[command.sub]]
name = "tools"
candidate = true
