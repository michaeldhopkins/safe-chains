[[command]]
name = "krew"
description = "kubectl plugin manager. Subcommands: `install`, `uninstall`, `update`, `upgrade`, `list`, `info`, `search`, `version`, `index`. Read-side: `list`, `info`, `search`, `version`, `index list`. Write-side: `install`, `uninstall`, `update`, `upgrade`, `index add/remove`."
url = "https://krew.sigs.k8s.io/"
researched_version = "krew 0.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "list"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "search"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "index"
nested_bare = true

[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "add"
candidate = true

[[command.sub.sub]]
name = "remove"
candidate = true

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "install"
candidate = true

[[command.sub]]
name = "uninstall"
candidate = true

[[command.sub]]
name = "update"
candidate = true

[[command.sub]]
name = "upgrade"
candidate = true
