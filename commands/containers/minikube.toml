[[command]]
name = "minikube"
description = "Provisions local Kubernetes clusters for development, using VM or container drivers (Docker, QEMU, HyperKit, etc.). Read-only subcommands (status, profile list, ip, service list, addons list, version) query cluster state. Write subcommands (start, stop, delete, pause, unpause, addons enable/disable, image load) create, destroy, or mutate the local cluster and its VMs/containers. start downloads binaries and container images from the network. The project releases roughly quarterly (v1.38.0 in January 2026) and its subcommand set grows slowly."
url = "https://minikube.sigs.k8s.io/docs/"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "status"
standalone = ["--format", "--help", "--output", "-h", "-o"]
valued = ["--node", "--profile", "-n", "-p"]

[[command.sub]]
name = "profile"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--light", "--output", "-h", "-l", "-o"]

[[command.sub]]
name = "version"
standalone = ["--components", "--help", "--output", "--short", "-h", "-o"]

[[command.sub]]
name = "ip"
standalone = ["--help", "-h"]
valued = ["--node", "--profile", "-n", "-p"]

[[command.sub]]
name = "service"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--namespace", "-h"]
valued = ["--profile", "-p"]

[[command.sub]]
name = "addons"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--output", "-h", "-o"]
valued = ["--profile", "-p"]
