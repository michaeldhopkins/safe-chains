[[command]]
name = "velero"
description = "Velero — Kubernetes backup / restore. Most subcommands contact the cluster's Velero server (network). Read-side: `version`, `get` (backups/restores/schedules/locations/etc.), `describe`, `logs`, `version`. Write-side: `backup create`, `restore create`, `schedule create/delete`, `install`, `uninstall`, `repo`, `snapshot-location create`, `bug`."
url = "https://velero.io/docs/"
researched_version = "velero 1.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--client-only", "--help", "--timeout", "-h"]
valued = ["--namespace", "--timeout", "-n"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "get"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--help", "-h", "-o", "--output"]
valued = ["-n", "--namespace", "-l", "--selector", "-o", "--output", "--kubeconfig", "--kubecontext"]

[[command.sub]]
name = "describe"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h", "--details", "--features", "--insecure-skip-tls-verify", "--volume-details"]
valued = ["-n", "--namespace", "-l", "--selector", "--kubeconfig", "--kubecontext"]

[[command.sub]]
name = "logs"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h", "--insecure-skip-tls-verify"]
valued = ["-n", "--namespace", "--kubeconfig", "--kubecontext", "--timeout", "--caCertFile"]

[[command.sub]]
name = "backup"
candidate = true

[[command.sub]]
name = "restore"
candidate = true

[[command.sub]]
name = "schedule"
candidate = true

[[command.sub]]
name = "snapshot-location"
candidate = true

[[command.sub]]
name = "backup-location"
candidate = true

[[command.sub]]
name = "install"
candidate = true

[[command.sub]]
name = "uninstall"
candidate = true

[[command.sub]]
name = "repo"
candidate = true

[[command.sub]]
name = "client"
candidate = true

[[command.sub]]
name = "create"
candidate = true

[[command.sub]]
name = "delete"
candidate = true

[[command.sub]]
name = "plugin"
candidate = true

[[command.sub]]
name = "debug"
candidate = true

[[command.sub]]
name = "bug"
candidate = true

[[command.sub]]
name = "node-agent"
candidate = true

[[command.sub]]
name = "server"
candidate = true
