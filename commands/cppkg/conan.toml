[[command]]
name = "conan"
description = "C++ package manager. Subcommands: `install`, `create`, `build`, `export`, `export-pkg`, `upload`, `download`, `inspect`, `cache`, `lock`, `source`, `package`, `remove`, `list`, `search`, `info`, `graph`, `workspace`, `config`, `profile`, `remote`, `editable`, `version`, `--help`. Read-side: `inspect`, `info`, `search`, `list`, `graph info`, `version`, `config show`, `profile show`, `remote list`. Write-side: `install`, `create`, `build`, `export`, `export-pkg`, `upload`, `download`, `cache`, `lock`, `source`, `package`, `remove`, `config install/init/home`, `profile new/update/remove/detect`, `remote add/remove/login/logout/update`."
url = "https://docs.conan.io/2/reference/commands.html"
researched_version = "Conan 2.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
allow_all = true

[[command.sub]]
name = "inspect"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "search"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "list"
allow_all = true
level = "SafeRead"

