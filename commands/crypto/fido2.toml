[[command]]
name = "fido2-assert"
description = "libfido2 assertion tool. -G obtains a new FIDO2 assertion from a connected authenticator; -V verifies a previously obtained assertion against a PEM-encoded public key file. The assertion proves possession of a credential without revealing the private key. Reads parameters from stdin or -i input file; writes output (the assertion or verification result) to stdout or -o output file. Network is not involved; the operation is between the local process and a USB/NFC/BLE authenticator. Other flags toggle user-presence, user-verification, PIN prompts, and the FIDO2 hmac-secret extension. libfido2 releases roughly twice a year; the CLI is stable."
url = "https://developers.yubico.com/libfido2/Manuals/fido2-assert.html"
researched_version = "libfido2 1.16.0"
level = "SafeWrite"
bare = false
standalone = ["-G", "-V", "-b", "-d", "-h", "-p", "-r", "-u", "-v", "-w"]
valued = ["-i", "-o", "-t"]

# -i is the input file, -o the output file. -t is an algorithm type, not a path.
[command.path_gate]
flags = { "-o" = "write", "-i" = "read" }

[[command]]
name = "fido2-cred"
description = "libfido2 credential tool. -M makes a new FIDO2 credential on a connected authenticator (private key stays on the device; only the public key and credential ID are returned); -V verifies a previously obtained credential. Reads parameters from stdin or -i input file; writes output to stdout or -o output file. Network is not involved; the operation is between the local process and a USB/NFC/BLE authenticator. Other flags toggle PIN prompts, the hmac-secret extension, the credProtect level, and resident/discoverable credentials. libfido2's CLI is stable across releases."
url = "https://developers.yubico.com/libfido2/Manuals/fido2-cred.html"
researched_version = "libfido2 1.16.0"
level = "SafeWrite"
bare = false
standalone = ["-M", "-V", "-b", "-d", "-h", "-q", "-r", "-u", "-v", "-w"]
valued = ["-a", "-c", "-i", "-o", "-t"]

# -i is the input file, -o the output file. -a/-c/-t are credential parameters, not paths.
[command.path_gate]
flags = { "-o" = "write", "-i" = "read" }

[[command]]
name = "fido2-token"
description = "libfido2 authenticator-management tool. Has both read-only modes (-L lists authenticators or their resident credentials, -I prints device info, -V prints version) and destructive modes (-C changes PIN, -D deletes resident credentials, -R resets the device and wipes all credentials, -G/-S manage largeBlobs and biometric templates) that are excluded here. Operations are between the local process and a connected authenticator over USB/NFC/BLE."
url = "https://developers.yubico.com/libfido2/Manuals/fido2-token.html"
researched_version = "libfido2 1.16.0"
level = "SafeRead"
bare = false
standalone = ["-I", "-L", "-V", "-b", "-c", "-d", "-e", "-r"]
valued = ["-k"]
