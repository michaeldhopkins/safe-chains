[[command.sub]]
name = "crl2pkcs7"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "pkcs7"
allow_all = true
level = "SafeWrite"

# `pkcs8` reads/converts a private key, writing it to stdout by default (decrypting a passphrase-
# protected one) — a disclosure unless `-out FILE` or `-noout` diverts it. (No `-pubout`: PKCS#8 is a
# private-key format.)
[[command.sub]]
name = "pkcs8"
allow_all = true
level = "SafeWrite"
profile = "decrypt-read"
unless_flags = ["-out", "-noout"]
fact = "`openssl pkcs8 -in priv.pem` reads a private key (decrypting it if passphrase-protected) and writes it in plaintext to stdout — the key enters the caller's context; `-out`/`-noout` divert it."
source = "https://docs.openssl.org/master/man1/openssl-pkcs8/"
judgment = "A private key streamed to the model is a secret disclosure; conservative classification is decrypt-to-screen unless the output is diverted."

[[command.sub]]
name = "pkcs12"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "asn1parse"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "dgst"
allow_all = true
level = "SafeWrite"

# `enc` is bimodal: it encrypts by default (ciphertext out — an ordinary local write) and decrypts
# with `-d`, writing the PLAINTEXT to stdout/-out. The `-d` flag flips it to a secret disclosure, so it
# classifies as decrypt-read (yolo); without `-d`, encrypt stays SafeWrite.
[[command.sub]]
name = "enc"
allow_all = true
level = "SafeWrite"
[[command.sub.flag]]
name = "-d"
classifies = "decrypt-read"
fact = "`openssl enc -d` decrypts the input with the given cipher and writes the PLAINTEXT to stdout (or -out) — the decrypted content enters the caller's context."
source = "https://docs.openssl.org/master/man1/openssl-enc/ (-d)"

[[command.sub]]
name = "rand"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "rehash"
allow_all = true
level = "SafeWrite"

# `smime`/`cms` decrypt an encrypted message with `-decrypt`, writing the PLAINTEXT out — a secret
# disclosure to the model (decrypt-read, yolo). The other modes (sign/verify/encrypt) stay SafeWrite.
[[command.sub]]
name = "smime"
allow_all = true
level = "SafeWrite"
[[command.sub.flag]]
name = "-decrypt"
classifies = "decrypt-read"
fact = "`openssl smime -decrypt` decrypts an S/MIME message and writes the PLAINTEXT to stdout (or -out) — the decrypted content enters the caller's context."
source = "https://docs.openssl.org/master/man1/openssl-smime/ (-decrypt)"

[[command.sub]]
name = "cms"
allow_all = true
level = "SafeWrite"
[[command.sub.flag]]
name = "-decrypt"
classifies = "decrypt-read"
fact = "`openssl cms -decrypt` decrypts a CMS message and writes the PLAINTEXT to stdout (or -out) — the decrypted content enters the caller's context."
source = "https://docs.openssl.org/master/man1/openssl-cms/ (-decrypt)"

