[[command.sub]]
name = "asn1parse"
allow_all = true
level = "SafeRead"

[[command.sub]]
name = "dgst"
allow_all = true
level = "SafeWrite"

# `enc -d` decrypt disclosure is classified by `resolve_openssl` (see the note above pkey).
[[command.sub]]
