[[command]]
name = "openssl"
description = "OpenSSL — cryptography toolkit. Sub-driven CLI with a separate command for each operation. Read-side subs include version, ciphers, list, engine, errstr, and the `-noout`-style read of x509 / pkey / req / crl / pkcs12 / pkcs7 / asn1parse / dgst. Write-side subs include req (with -new), x509 (with -req), genrsa, genpkey, gendsa, ecparam, ca, enc, pkcs12 (with -export), pkcs7, ts, rand, smime, cms, srp, dhparam, dsaparam, gendh. The s_client / s_server / ocsp subs make network connections; speed is a CPU-intensive benchmark; engine subs may invoke external libraries. Mature, ubiquitous."
url = "https://docs.openssl.org/master/man1/openssl/"
researched_version = "OpenSSL 3.x"
bare_flags = ["--help", "-help", "-version", "version"]
examples_safe = [
    "openssl enc -e -in x -out x.enc -k p",
    "openssl x509 -in c.pem -noout -text",
    "openssl genrsa 2048",
    "openssl rsa -in priv.pem -pubout",
    "openssl rsa -in enc.pem -out clean.pem",
]
examples_denied = [
    "openssl enc -d -in x.enc -k p",
    "openssl smime -decrypt -in m.p7 -inkey k.pem",
    "openssl cms -decrypt -in m -inkey k",
    "openssl rsa -in enc.pem -passin pass:x",
    "openssl pkey -in priv.pem",
]

[[command.sub]]
name = "version"
allow_all = true

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "ciphers"
allow_all = true

[[command.sub]]
name = "list"
allow_all = true

[[command.sub]]
name = "engine"
allow_all = true

[[command.sub]]
name = "errstr"
allow_all = true

[[command.sub]]
name = "x509"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "req"
allow_all = true
level = "SafeWrite"

# The private-key subs (pkey/rsa/ec/dsa) dump the private key — decrypting a passphrase-protected one —
# to stdout BY DEFAULT, a secret disclosure to the model. Classified decrypt-read UNLESS the output is
# diverted away from the model: `-pubout` (public key only), `-pubin` (public input → public output),
# `-out FILE` (to disk), or `-noout` (no output). With any of those, the sub is its ordinary SafeWrite.
[[command.sub]]
name = "pkey"
allow_all = true
level = "SafeWrite"
profile = "decrypt-read"
unless_flags = ["-pubout", "-pubin", "-out", "-noout"]
fact = "`openssl pkey -in priv.pem` reads a private key (decrypting it if passphrase-protected) and writes it in plaintext to stdout — the key enters the caller's context; `-pubout`/`-pubin`/`-out`/`-noout` divert it."
source = "https://docs.openssl.org/master/man1/openssl-pkey/"
judgment = "A private key streamed to the model is a secret disclosure; conservative classification is decrypt-to-screen unless the output is diverted."

[[command.sub]]
name = "rsa"
allow_all = true
level = "SafeWrite"
profile = "decrypt-read"
unless_flags = ["-pubout", "-pubin", "-out", "-noout"]
fact = "`openssl rsa -in priv.pem` reads an RSA private key (decrypting it if passphrase-protected) and writes it in plaintext to stdout — the key enters the caller's context; `-pubout`/`-pubin`/`-out`/`-noout` divert it."
source = "https://docs.openssl.org/master/man1/openssl-rsa/"
judgment = "A private key streamed to the model is a secret disclosure; conservative classification is decrypt-to-screen unless the output is diverted."

[[command.sub]]
name = "ec"
allow_all = true
level = "SafeWrite"
profile = "decrypt-read"
unless_flags = ["-pubout", "-pubin", "-out", "-noout"]
fact = "`openssl ec -in priv.pem` reads an EC private key (decrypting it if passphrase-protected) and writes it in plaintext to stdout — the key enters the caller's context; `-pubout`/`-pubin`/`-out`/`-noout` divert it."
source = "https://docs.openssl.org/master/man1/openssl-ec/"
judgment = "A private key streamed to the model is a secret disclosure; conservative classification is decrypt-to-screen unless the output is diverted."

[[command.sub]]
name = "dsa"
allow_all = true
level = "SafeWrite"
profile = "decrypt-read"
unless_flags = ["-pubout", "-pubin", "-out", "-noout"]
fact = "`openssl dsa -in priv.pem` reads a DSA private key (decrypting it if passphrase-protected) and writes it in plaintext to stdout — the key enters the caller's context; `-pubout`/`-pubin`/`-out`/`-noout` divert it."
source = "https://docs.openssl.org/master/man1/openssl-dsa/"
judgment = "A private key streamed to the model is a secret disclosure; conservative classification is decrypt-to-screen unless the output is diverted."

[[command.sub]]
name = "dh"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "dhparam"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "dsaparam"
allow_all = true
