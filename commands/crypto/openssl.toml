allow_all = true
level = "SafeWrite"

# pkcs8/pkcs12 private-key disclosure is classified by `resolve_openssl` (see the note above pkey).
[[command.sub]]
name = "pkcs8"
allow_all = true
level = "SafeWrite"

[[command.sub]]
name = "pkcs12"
allow_all = true
