[[command]]
name = "sha1"
description = "BSD-style SHA-1 utility (macOS/FreeBSD). Reads file contents or strings passed via -s, computes SHA-1 digests, and prints them to stdout. The -c flag compares against a known digest; -p echoes stdin while appending the checksum. Strictly read-only: no file output, no network. Note: SHA-1 has known collision vulnerabilities and should not be relied on for security purposes. The BSD CLI surface is essentially frozen."
url = "https://man.freebsd.org/cgi/man.cgi?query=sha1"
researched_version = "macOS 14 (Sequoia); BSD surface frozen"
level = "Inert"
bare = true
standalone = ["--help", "--passthrough", "--quiet", "--reverse", "--self-test", "--time-trial", "--version", "-V", "-h", "-p", "-q", "-r", "-t", "-x"]
valued = ["--check", "--string", "-c", "-s"]

