[[command]]
name = "dub"
description = "D language package manager and build tool. `init`, `build`, `run`, `test`, `lint`, `format`, `clean`, `dustmite` execute or compile project D code. `fetch`, `add`, `remove`, `upgrade`, `add-path`, `add-local`, `add-override`, `remove-override`, `convert` modify ~/.dub or the project's dub.{json,sdl} (network for fetch). `list`, `search`, `info`, `describe`, `generate`, `gen` are read-only or generate output."
url = "https://dub.pm/commands.html"
researched_version = "dub 1.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "list"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "search"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]
valued = ["--registry"]

[[command.sub]]
name = "describe"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--data-list", "--help", "--import-paths", "-h"]
valued = ["--arch", "--build", "--compiler", "--config", "--data"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "init"
candidate = true

[[command.sub]]
name = "build"
candidate = true

[[command.sub]]
name = "run"
candidate = true

[[command.sub]]
name = "test"
candidate = true

[[command.sub]]
name = "lint"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--help", "-h", "--report", "--syntax-check", "--styleCheck"]
valued = ["--config", "-c", "--build", "-b"]

[[command.sub]]
name = "format"
candidate = true

[[command.sub]]
name = "clean"
candidate = true

[[command.sub]]
name = "fetch"
candidate = true

[[command.sub]]
name = "add"
candidate = true

[[command.sub]]
name = "remove"
candidate = true

[[command.sub]]
name = "upgrade"
candidate = true

[[command.sub]]
name = "convert"
candidate = true

[[command.sub]]
name = "add-path"
candidate = true

[[command.sub]]
name = "add-local"
candidate = true

[[command.sub]]
name = "remove-path"
candidate = true

[[command.sub]]
name = "remove-local"
candidate = true

[[command.sub]]
name = "add-override"
candidate = true

[[command.sub]]
name = "remove-override"
candidate = true

[[command.sub]]
name = "list-overrides"
candidate = true

[[command.sub]]
name = "generate"
candidate = true

[[command.sub]]
name = "gen"
candidate = true

[[command.sub]]
name = "dustmite"
candidate = true

[[command.sub]]
name = "describe"
candidate = true
