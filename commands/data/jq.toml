[[command]]
name = "jq"
description = "Lightweight JSON processor. Pure data transformation — reads JSON, applies filters, writes to stdout. No flag causes side effects. The filter language is Turing-complete but has no I/O primitives, so arbitrary jq programs are safe. Stable and slow-moving; flag coverage is essentially complete."
url = "https://jqlang.github.io/jq/manual/"
level = "Inert"
bare = true
standalone = [
    "--ascii-output", "--color-output", "--compact-output", "--exit-status", "--help",
    "--join-output", "--monochrome-output", "--null-input", "--raw-input",
    "--raw-output", "--raw-output0", "--seq", "--slurp", "--sort-keys", "--tab", "--version",
    "-C", "-M", "-R", "-S", "-V", "-c", "-e", "-g", "-h", "-j", "-n", "-r", "-s",
]
valued = [
    "--arg", "--argjson", "--args", "--from-file",
    "--indent", "--jsonargs", "--rawfile", "--slurpfile",
    "-f",
]
