[[command]]
name = "shuf"
description = "Generates random permutations of input lines, a numeric range, or command-line arguments. Writes to stdout by default; the -o flag can direct output to a file. No network access and no ability to execute commands. Ships with GNU coreutils."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#shuf-invocation"
level = "Inert"
bare = true
standalone = [
    "--echo", "--help", "--repeat", "--version", "--zero-terminated",
    "-V", "-e", "-h", "-r", "-z",
]
valued = ["--head-count", "--input-range", "--random-source", "-i", "-n"]
