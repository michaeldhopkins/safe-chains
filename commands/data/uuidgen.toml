[[command]]
name = "uuidgen"
description = "Generates a new universally unique identifier (UUID) and prints it to stdout. Supports random (v4), time-based (v1), and name-based (v3/v5 via MD5/SHA1) generation. Pure output with no filesystem writes, no network access, and no side effects. Ships with util-linux and macOS."
url = "https://man7.org/linux/man-pages/man1/uuidgen.1.html"
level = "Inert"
bare = true
max_positional = 0
standalone = ["--help", "--random", "--time", "--version", "-V", "-h", "-r", "-t"]
valued = ["--md5", "--name", "--namespace", "--sha1", "-N", "-m", "-n", "-s"]
