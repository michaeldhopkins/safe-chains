[[command]]
name = "mysqldump"
description = "MySQL/MariaDB — dumps databases / tables to SQL. Network read of the server; writes the dump to stdout (or to file via shell redirection). Connection target via -h/-u/-p flags."
url = "https://dev.mysql.com/doc/refman/8.4/en/mysqldump.html"
researched_version = "MySQL 8.x / MariaDB 11.x"
level = "SafeRead"
bare = false
standalone = [
    "--add-drop-database", "--add-drop-table",
    "--add-drop-trigger", "--add-locks",
    "--all-databases", "--allow-keywords",
    "--apply-replica-statements", "--apply-slave-statements",
    "--compatible", "--complete-insert",
    "--compact", "--compress",
    "--create-options", "--databases",
    "--debug", "--debug-check", "--debug-info",
    "--default-character-set", "--delayed-insert",
    "--delete-master-logs", "--disable-keys",
    "--dump-date", "--dump-replica", "--dump-slave",
    "--events", "--extended-insert",
    "--fields-enclosed-by", "--fields-escaped-by",
    "--fields-optionally-enclosed-by",
    "--fields-terminated-by", "--flush-logs",
    "--flush-privileges", "--force",
    "--help", "--hex-blob", "--host",
    "--ignore-error", "--ignore-table",
    "--include-master-host-port",
    "--insert-ignore", "--lines-terminated-by",
    "--lock-all-tables", "--lock-tables",
    "--log-error", "--login-path",
    "--master-data", "--max-allowed-packet",
    "--mysqld-long-query-time", "--net-buffer-length",
    "--no-autocommit", "--no-create-db",
    "--no-create-info", "--no-data",
    "--no-set-names", "--no-tablespaces",
    "--opt", "--order-by-primary",
    "--password", "--pipe", "--port",
    "--protocol", "--quick", "--quote-names",
    "--replace", "--routines", "--set-charset",
    "--set-gtid-purged", "--single-transaction",
    "--show-create-skip-secondary-engine",
    "--skip-add-drop-table", "--skip-add-locks",
    "--skip-comments", "--skip-compact",
    "--skip-disable-keys", "--skip-extended-insert",
    "--skip-lock-tables", "--skip-opt",
    "--skip-quick", "--skip-quote-names",
    "--skip-set-charset", "--skip-triggers",
    "--skip-tz-utc", "--socket",
    "--ssl", "--tab", "--triggers",
    "--tz-utc", "--user", "--verbose",
    "--version", "--where", "--xml",
    "-?", "-A", "-B", "-C", "-D", "-E",
    "-F", "-K", "-N", "-O", "-Q", "-R",
    "-T", "-V", "-X", "-c", "-d", "-e",
    "-f", "-h", "-l", "-n", "-q",
    "-r", "-t", "-u", "-v", "-w", "-x",
]
valued = [
    "--character-sets-dir", "--compatible",
    "--databases", "--default-character-set",
    "--default-auth", "--enable-cleartext-plugin",
    "--exclude-gtids", "--fields-enclosed-by",
    "--fields-escaped-by", "--fields-optionally-enclosed-by",
    "--fields-terminated-by", "--flushlog",
    "--gtid-purged", "--host", "--ignore-error",
    "--ignore-table", "--init-command",
    "--lines-terminated-by", "--login-path",
    "--max-allowed-packet", "--mysqld-long-query-time",
    "--net-buffer-length", "--password", "--pid-file",
    "--plugin-dir", "--port", "--protocol",
    "--result-file", "--secure-auth",
    "--server-public-key-path",
    "--set-gtid-purged", "--socket",
    "--ssl-ca", "--ssl-capath", "--ssl-cert",
    "--ssl-cipher", "--ssl-fips-mode",
    "--ssl-key", "--ssl-mode", "--tab",
    "--user", "--where",
    "-S", "-h", "-p", "-P", "-r", "-u", "-w",
]
