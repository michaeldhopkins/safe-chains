[[command]]
name = "nodetool"
description = "Apache Cassandra cluster admin tool. Read-side: `version`, `status`, `info`, `ring`, `describecluster`, `gossipinfo`, `tablestats`, `tablehistograms`, `cfstats`, `cfhistograms`, `compactionhistory`, `compactionstats`, `tpstats`, `getlogginglevels`, `gettraceprobability`, `getstreamthroughput`, `gettimeout`, `getconcurrentcompactors`, `getsstables`, `getendpoints`, `getseeds`, `viewbuildstatus`. Write-side: `flush`, `compact`, `repair`, `cleanup`, `drain`, `decommission`, `removenode`, `move`, `setlogginglevel`, `settraceprobability`, `bootstrap`, `replaybatchlog`, `truncatehints`, `disablegossip`, `disablethrift`, `enablegossip`, `enablethrift`, `restorehints`, `stopdaemon`."
url = "https://cassandra.apache.org/doc/latest/cassandra/managing/tools/nodetool/nodetool.html"
researched_version = "Apache Cassandra 5.x"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "version"
allow_all = true

[[command.sub]]
name = "status"
allow_all = true
level = "SafeRead"

