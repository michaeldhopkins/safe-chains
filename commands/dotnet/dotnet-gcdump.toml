[[command]]
name = "dotnet-gcdump"
description = "dotnet-gcdump — collect GC heap dumps from .NET processes. `ps` lists running .NET processes (read). `collect` attaches to the target process and writes a heap dump (external attach + project-local SafeWrite). `report` analyses a saved gcdump."
url = "https://learn.microsoft.com/en-us/dotnet/core/diagnostics/dotnet-gcdump"
researched_version = "dotnet-gcdump 8.x"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "ps"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "report"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]
valued = ["--type"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "collect"
candidate = true
