[[command]]
name = "idf.py"
description = "ESP-IDF build helper. Bare invocation runs `idf.py build`. Most subcommands compile / flash / monitor an ESP32 (system-state writes outside this CLI when flashing). Read-side: `--version`, `--help`, `dependencies`, `partition-table`, `size`, `size-components`, `size-files`, `efuse-summary`. Write-side: `build`, `app`, `bootloader`, `flash`, `monitor`, `clean`, `fullclean`, `python-clean`, `set-target`, `reconfigure`, `menuconfig`, `confserver`, `gen_compile_commands`, `merge-bin`, `erase-flash`."
url = "https://docs.espressif.com/projects/esp-idf/en/latest/esp32/api-guides/build-system.html"
researched_version = "ESP-IDF 5.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "dependencies"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "partition-table"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "size"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "size-components"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "size-files"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "efuse-summary"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

