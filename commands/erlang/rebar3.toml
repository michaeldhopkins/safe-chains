[[command]]
name = "rebar3"
description = "Erlang/OTP build tool. `compile`, `clean`, `dialyzer`, `xref`, `eunit`, `ct`, `proper`, `cover` execute or compile Erlang. `release`, `tar`, `escriptize` package outputs (SafeWrite). `as`, `do`, `path`, `tree`, `version`, `help` are read-only diagnostics. `update`, `upgrade`, `deps`, `unlock`, `report`, `pkgs`, `plugins` modify state and may contact Hex.pm (network)."
url = "https://rebar3.org/docs/commands/"
researched_version = "rebar3 3.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "path"
level = "SafeRead"
bare = true
standalone = ["--app", "--base", "--bin", "--ebin", "--help", "--lib", "--priv", "--rel", "--separator", "--src", "-h"]
valued = ["--separator"]

[[command.sub]]
name = "tree"
level = "SafeRead"
bare = true
standalone = ["--help", "--verbose", "-h", "-v"]

[[command.sub]]
name = "report"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "compile"
candidate = true

