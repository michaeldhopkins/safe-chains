[[command]]
name = "basecamp"
description = "CLI for interacting with the Basecamp project management API. The full tool supports creating, updating, and deleting projects, todos, messages, comments, and file uploads, all of which hit the Basecamp API over the network. Read-only subcommands (projects list/show, cards list, files list, todos list, search) query the API without modifying state. The auth subcommand manages API tokens locally. The project is under active development."
url = "https://github.com/basecamp/basecamp-cli"
bare_flags = ["--help", "--version", "-h"]
[command.wrapper]
standalone = ["--agent", "--json", "--quiet"]

[[command.sub]]
name = "auth"
nested_bare = true
[[command.sub.sub]]
name = "token"
profile = "credential-read"
fact = "`basecamp auth token` prints the account's OAuth 2.0 access token to stdout for use in scripts — a bearer credential that enters the caller's context."
source = "https://github.com/basecamp/basecamp-cli"

[[command.sub]]
name = "cards"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "commands"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "doctor"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "files"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "help"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "projects"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "show"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "search"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "todos"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
