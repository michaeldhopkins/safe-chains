[[command]]
name = "glab"
description = "Third-party GitLab CLI (gitlab-org/cli, formerly profclems/glab). Wraps GitLab's REST/GraphQL APIs over authenticated HTTPS. Read-only operations (`glab mr list`, `glab issue view`, `glab ci status`, `glab release list`, etc.) query data; write operations like `glab mr create`, `glab issue close`, etc. are not covered. `glab api` issues arbitrary REST requests and is governed by gh's API sub-handler (read-only methods, header allowlist). Top-level always-safe forms: `glab --version`, `glab -v`, `glab version`, `glab check-update`. Active project with monthly-ish releases."
url = "https://gitlab.com/gitlab-org/cli"
handler = "glab"
researched_version = "glab 1.x (2026)"
doc_body = "Routing: [[command.matrix]] blocks below cover the read-only sub × action grid. Top-level terminal forms `glab version` and `glab check-update` are handled by the handler (no flags allowed). `glab api` delegates to gh's API sub-handler."

# --version / --help / -v / -h at length 2.
[command.fallback]
level = "Inert"
bare = false
max_positional = 0
standalone = ["--help", "--version", "-h", "-v"]

# Always-safe bare subcommand forms: `glab version`, `glab check-update`.
[command.handler_data]
always_safe_bare_subs = ["check-update", "version"]

# Read-only sub × action grid. Same shape for every parent — no
# parent-specific overrides like gh has.
[[command.matrix]]
parents = [
  "ci", "cluster", "deploy-key", "gpg-key", "incident", "issue",
  "iteration", "label", "milestone", "mr", "release", "repo",
  "schedule", "snippet", "ssh-key", "stack", "variable",
]
level = "Inert"
[command.matrix.actions]
diff = "diff"
issues = "list"
list = "list"
status = "simple"
view = "view"

# `auth status` is also a parent × action shape, just with one parent
# and one action.
[[command.matrix]]
parents = ["auth"]
level = "Inert"
[command.matrix.actions]
status = "simple"

[command.handler_policy.list]
bare = true
standalone = [
  "--all", "--closed", "--draft", "--help", "--merged",
  "-A", "-M", "-a", "-c", "-d", "-g", "-h", "-q",
]
valued = [
  "--assignee", "--author", "--group", "--label",
  "--milestone", "--not-label", "--order", "--output",
  "--page", "--per-page", "--repo", "--reviewer",
  "--search", "--sort", "--source-branch", "--state",
  "--target-branch",
  "-F", "-P", "-R", "-S", "-a", "-g", "-l", "-m", "-o", "-p", "-r", "-s", "-t",
]

[command.handler_policy.view]
bare = false
standalone = [
  "--comments", "--help", "--resolved", "--system-logs",
  "--unresolved", "--web",
  "-c", "-h", "-p", "-s", "-w",
]
valued = [
  "--output", "--page", "--per-page", "--repo",
  "-F", "-P", "-R", "-p",
]

[command.handler_policy.diff]
bare = false
standalone = ["--help", "--raw", "-h"]
valued = ["--color", "--repo", "-R"]

[command.handler_policy.simple]
bare = true
standalone = ["--help", "-h", "-q"]
valued = [
  "--output", "--page", "--per-page", "--repo",
  "-F", "-P", "-R", "-p",
]
