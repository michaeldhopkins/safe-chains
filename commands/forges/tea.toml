[[command]]
name = "tea"
description = "CLI for interacting with Gitea instances, covering issues, pull requests, branches, releases, labels, milestones, organizations, and repositories. The full tool supports creating, editing, and closing issues and PRs, which modify remote state via the Gitea API over the network. Read-only subcommands (list, view) query the API without modification. The login subcommand manages server credentials locally. The project follows Gitea's development cycle."
url = "https://gitea.com/gitea/tea"
bare_flags = ["--version", "-v"]

[[command.sub]]
name = "whoami"
max_positional = 0

[[command.sub]]
name = "b"
nested_bare = true

[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = [
    "--fields", "--limit", "--login", "--output",
    "--page", "--repo", "--state",
    "-L", "-R", "-f", "-l", "-o", "-p", "-s",
]

[[command.sub.sub]]
name = "view"
bare = false
standalone = ["--comments", "--help", "-c", "-h"]
valued = ["--login", "--output", "--repo", "-R", "-l", "-o"]

[[command.sub]]
name = "branch"
