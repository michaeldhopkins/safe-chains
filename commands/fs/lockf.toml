[[command]]
name = "lockf"
description = "Acquires an exclusive flock(2)-style lock on a file (creating it if necessary), then executes a command while the lock is held. The lock file is removed on exit unless -k is given. The wrapped command runs with the user's full privileges — the safety of any invocation is governed by the wrapped command, not by lockf itself. BSD-derived utility, surface stable for many years."
url = "https://man.freebsd.org/cgi/man.cgi?lockf"
researched_version = "macOS 14 (Apple stock, BSD-derived)"

[command.wrapper]
standalone = ["-k", "-n", "-s", "-w"]
valued = ["-t"]
positional_skip = 1
