[[command]]
name = "mkfifo"
aliases = ["gmkfifo"]
description = "Creates named pipes (FIFOs) on the local filesystem. -m/--mode sets explicit permission bits, otherwise the umask applies. Does not access the network; creates only the named entries given. BSD and GNU implementations both expose -m; GNU adds long --mode and SELinux/SMACK context flags. Stable utility with a frozen surface."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#mkfifo-invocation"
researched_version = "GNU coreutils 9.7 + BSD mkfifo (macOS 14)"
level = "SafeWrite"
bare = false
standalone = ["--help", "--version", "-Z"]
valued = ["--context", "--mode", "-m"]
