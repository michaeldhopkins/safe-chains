[[command]]
name = "mv"
aliases = ["gmv"]
description = "Renames or moves files and directories on the local filesystem. Cross-filesystem moves are implemented internally via cp(1) + rm(1), so a failed mv can leave a partial copy. Operates under the user's permissions only and does not access the network. BSD mv (macOS) keeps a smaller flag surface than GNU mv; both share -f/-i/-n/-v. Stable utility, frozen surface."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#mv-invocation"
researched_version = "GNU coreutils 9.7 + BSD mv (macOS 14)"
level = "SafeWrite"
bare = false
standalone = [
    "--force", "--help", "--interactive", "--no-clobber",
    "--no-target-directory", "--strip-trailing-slashes",
    "--update", "--verbose", "--version",
    "-T", "-f", "-h", "-i", "-n", "-u", "-v",
]
valued = [
    "--backup", "--suffix", "--target-directory",
    "-S", "-t",
]

# Declarative facet behavior: mv RELOCATES each source (removes it from its old location —
# trivially reversible by moving back) and CREATES the destination (overwriting unless
# --no-clobber), gated at both loci so `mv ~/.aws/creds ./x` and `mv ./x /etc/y` both deny. A
# directory move is one rename, so there is no recursion-into-scale flag. `--backup` takes an
# optional glued arg → BOOLEAN here (distinct from the legacy `valued` above). Replaces
# `resolve_mv`.
[command.behavior]
operation = "create"
positionals = "transfer"
standalone = [
    "--backup", "--force", "--help", "--interactive", "--no-clobber",
    "--no-target-directory", "--strip-trailing-slashes", "--update", "--verbose", "--version",
    "-T", "-f", "-h", "-i", "-n", "-u", "-v",
]
valued = ["-S", "-t", "--suffix", "--target-directory"]
[command.behavior.transfer]
source = "relocate"
no_clobber_flags = ["-n", "--no-clobber"]
