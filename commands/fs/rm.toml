[[command]]
name = "rm"
aliases = ["grm"]
description = "Removes files and (with -r/-R) directory trees from the local filesystem. Operates under the user's permissions and cannot reach remote systems, but is catastrophic when targeted at the wrong path (rm -rf /, rm -rf ~, etc.) — the binary itself doesn't distinguish a safe target from a dangerous one. Coverage is therefore restricted to the two informational forms that never delete anything: --help prints the usage summary; --version prints the binary version. Every form that removes a file remains out of coverage. Extremely stable on both BSD and GNU; flag surface unchanged for years."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#rm-invocation"
researched_version = "GNU coreutils 9.x + BSD rm (macOS 15 / Sequoia)"
level = "Inert"
bare = false
require_any = ["--help", "--version"]
max_positional = 0
standalone = ["--help", "--version"]

# Declarative facet behavior: rm DESTROYS each positional (effortful reversibility — a delete
# is recoverable only from out-of-band backups), gated per-operand by locus so a worktree
# delete projects to the dev level while `rm -rf /etc` denies. `-r`/`-R`/`--recursive` widen
# the scale to unbounded. The behavior grammar is the FULL destructive flag set — distinct from
# the legacy `standalone` above, which stays restricted to `--help`/`--version` so the legacy
# fallback can never fail-open on `rm -rf`. `--no-preserve-root` is intentionally absent, so
# `rm -rf --no-preserve-root /` hits an unrecognized flag and worst-cases. Replaces `resolve_rm`.
[command.behavior]
operation = "destroy"
positionals = "write"
scale = "breadth"
standalone = [
    "-f", "-i", "-I", "-r", "-R", "-d", "-v",
    "--force", "--interactive", "--recursive", "--dir", "--verbose",
    "--one-file-system", "--preserve-root", "--help", "--version",
]
[command.behavior.flags]
"-r" = { scale = "unbounded" }
"-R" = { scale = "unbounded" }
"--recursive" = { scale = "unbounded" }
