[[command]]
name = "rmdir"
aliases = ["grmdir"]
description = "Removes empty directories. Fails with a diagnostic if the directory is non-empty. -p/--parents removes each pathname component bottom-up, stopping at the first non-empty component. Operates only on the local filesystem under the user's permissions and never recursively deletes content. Stable utility on BSD and GNU with a frozen surface."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#rmdir-invocation"
researched_version = "GNU coreutils 9.7 + BSD rmdir (macOS 14)"
level = "SafeWrite"
bare = false
standalone = [
    "--help", "--ignore-fail-on-non-empty", "--parents",
    "--verbose", "--version",
    "-p", "-v",
]
