[[command]]
name = "touch"
aliases = ["gtouch"]
description = "Updates the access and modification timestamps of a file and creates the file if it does not exist. Local-only: operates on the file system under the user's permissions and does not access the network. BSD touch (macOS) and GNU touch (gtouch on macOS) have overlapping but not identical flag surfaces — BSD adds -A (adjust by relative offset), GNU adds --no-create / --no-dereference long forms. Stable utility with a frozen flag surface for years."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#touch-invocation"
researched_version = "GNU coreutils 9.7 + BSD touch (macOS 14)"
level = "SafeWrite"
bare = false
standalone = [
    "--help", "--no-create", "--no-dereference", "--version",
    "-A", "-a", "-c", "-h", "-m",
]
valued = [
    "--date", "--reference", "--time",
    "-d", "-r", "-t",
]

# Declarative facet behavior: touch CREATES each file operand (or updates its timestamps),
# trivially reversible, gated per-operand by locus. `-r`/`-t`/`-d` and their long forms take a
# value. Replaces `resolve_touch`.
[command.behavior]
operation = "create"
positionals = "write"
scale = "breadth"
standalone = [
    "--help", "--no-create", "--no-dereference", "--version",
    "-A", "-a", "-c", "-h", "-m",
]
valued = [
    "--date", "--reference", "--time",
    "-d", "-r", "-t",
]
# `-r`/`--reference REF` sets the target's timestamps from REF — a read of REF, gated by its
# locus so `touch -r /etc/shadow ./x` denies (an out-of-workspace mtime oracle) while a worktree
# reference is fine. `-d`/`-t` take a date/time literal, not a path, so they are not gated.
[command.behavior.flags]
"-r" = { kind = "read" }
"--reference" = { kind = "read" }
