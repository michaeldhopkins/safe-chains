[[command]]
name = "peco"
description = "Interactive filtering tool that reads lines from stdin, lets the user fuzzy-search and select items, and prints selections to stdout. Strictly read-only: reads from stdin and writes to stdout. Does not modify files or access the network. Written in Go. The CLI surface is small and stable."
url = "https://github.com/peco/peco"
level = "Inert"
bare = true
standalone = ["--help", "--null", "--print-query", "--select-1", "--version", "-h", "-v"]
valued = [
    "--buffer-size", "--initial-filter", "--initial-index",
    "--layout", "--on-cancel", "--prompt", "--query", "--selection-prefix",
    "-b",
]
