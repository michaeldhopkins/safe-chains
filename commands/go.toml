[[command]]
name = "go"
description = "Go programming language toolchain. The go command has a large surface area covering compilation, testing, dependency management, and code generation. 'go build' compiles code and writes binaries to disk. 'go test' compiles and executes test code, which can have arbitrary side effects. 'go mod download' fetches modules from the network. Read-only subcommands like 'go doc', 'go env', 'go list', 'go version', and 'go vet' inspect code or configuration without filesystem writes (though vet does compile code). Go releases on a predictable 6-month cadence (February and August), with the CLI surface growing steadily."
url = "https://pkg.go.dev/cmd/go"
researched_version = "go1.26.5"
bare_flags = ["--help", "--version", "-V", "-h"]
examples_safe = [
  "go run .",
  "go run ./cmd/tool",
  "go run -race ./cmd",
  "go run main.go",
  "go build ./...",
  "go test ./...",
]
examples_denied = [
  "go run ~/evil.go",
  "go run /tmp/x.go",
  "go run rsc.io/goversion@latest",
  "go run github.com/evil/x@latest",
  "go run bin/tool",
]

[command.path_gate]
flags = { "-o" = "write" }

[[command.sub]]
name = "build"
level = "SafeWrite"
bare = false
standalone = [
    "--help",
    "-a", "-asan", "-cover", "-h", "-linkshared", "-modcacherw",
    "-msan", "-n", "-race", "-trimpath", "-v", "-work", "-x",
]
valued = [
    "-asmflags", "-buildmode", "-buildvcs", "-compiler", "-covermode",
    "-coverpkg", "-gccgoflags", "-gcflags", "-installsuffix",
    "-ldflags", "-mod", "-modfile", "-o", "-overlay", "-p",
    "-pgo", "-pkgdir", "-tags",
]

[[command.sub]]
name = "doc"
standalone = ["--help", "-all", "-c", "-cmd", "-h", "-short", "-src", "-u"]

[[command.sub]]
name = "env"
standalone = ["--help", "-h", "-json"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "list"
standalone = [
    "--help",
    "-a", "-asan", "-compiled", "-cover", "-deps", "-e", "-export",
    "-find", "-h", "-linkshared", "-m", "-modcacherw", "-msan", "-n",
    "-race", "-retract", "-test", "-trimpath", "-u", "-v",
    "-versions", "-work", "-x",
]
valued = [
    "-asmflags", "-buildmode", "-buildvcs", "-compiler", "-covermode",
    "-coverpkg", "-f", "-gccgoflags", "-gcflags", "-installsuffix",
    "-json", "-ldflags", "-mod", "-modfile", "-overlay", "-p",
    "-pgo", "-pkgdir", "-reuse", "-tags",
]

[[command.sub]]
name = "mod"
[[command.sub.sub]]
name = "graph"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "verify"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "why"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--m", "--vendor", "-h"]

# `go run PKG` compiles and runs a package — the executor is the PACKAGE PATH. `positional_shape`
# requires a LOCAL path (`.`, `./cmd/tool`, `/abs`, `*.go`): a bare import path (`rsc.io/x@latest`,
# `example.com/cmd`) is module-resolved and, with `@version`, DOWNLOADS AND RUNS remote code, so it
# is not a worktree executor and denies. A local package is then locus-gated: worktree allows,
# foreign (`go run ~/x.go`, `/tmp/x.go`) denies. Tokens after the package are the program's args.
[[command.sub]]
name = "run"
executor = "file"
positional_shape = "go-package"
bare = false
standalone = [
    "--help",
    "-a", "-asan", "-cover", "-h", "-linkshared", "-modcacherw",
    "-msan", "-n", "-race", "-trimpath", "-v", "-work", "-x",
]
valued = [
    "-asmflags", "-buildmode", "-buildvcs", "-compiler", "-covermode",
    "-coverpkg", "-gccgoflags", "-gcflags", "-installsuffix",
    "-ldflags", "-mod", "-modfile", "-overlay", "-p",
    "-pgo", "-pkgdir", "-tags",
]

[[command.sub]]
name = "test"
level = "SafeRead"
bare = false
standalone = [
    "--help",
    "-a", "-asan", "-benchmem", "-cover", "-failfast", "-h", "-json",
    "-linkshared", "-modcacherw", "-msan", "-n", "-race",
    "-short", "-trimpath", "-v", "-work", "-x",
]
valued = [
    "-asmflags", "-bench", "-benchtime", "-blockprofile",
    "-blockprofilerate", "-buildmode", "-buildvcs", "-compiler",
    "-count", "-covermode", "-coverpkg", "-coverprofile",
    "-cpu", "-cpuprofile", "-fuzz", "-fuzzminimizetime", "-fuzztime",
    "-gccgoflags", "-gcflags", "-installsuffix",
    "-ldflags", "-list", "-memprofile", "-memprofilerate",
    "-mod", "-modfile", "-mutexprofile", "-mutexprofilefraction",
    "-o", "-outputdir", "-overlay", "-p", "-parallel",
    "-pgo", "-pkgdir", "-run", "-shuffle", "-skip",
    "-tags", "-timeout", "-trace",
]

[[command.sub]]
name = "version"
standalone = ["--help", "-h", "-m", "-v"]

[[command.sub]]
name = "vet"
level = "SafeRead"
standalone = [
    "--help",
    "-a", "-asan", "-cover", "-h", "-json", "-linkshared", "-modcacherw",
    "-msan", "-n", "-race", "-trimpath", "-v", "-work", "-x",
]
valued = [
    "-asmflags", "-buildmode", "-buildvcs", "-c", "-compiler",
    "-covermode", "-coverpkg", "-gccgoflags", "-gcflags",
    "-installsuffix", "-ldflags", "-mod", "-modfile", "-overlay",
    "-p", "-pgo", "-pkgdir", "-tags",
]
