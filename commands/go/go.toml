[[command]]
name = "go"
description = "Go programming language toolchain. The go command has a large surface area covering compilation, testing, dependency management, and code generation. 'go build' compiles code and writes binaries to disk. 'go test' compiles and executes test code, which can have arbitrary side effects. 'go mod download' fetches modules from the network. Read-only subcommands like 'go mod graph', 'go mod verify', 'go mod why', 'go doc', 'go env', and 'go list' inspect local state without modification. Go releases on a predictable 6-month cadence (February and August), with the CLI surface growing steadily."
url = "https://pkg.go.dev/cmd/go"
bare_flags = ["--help", "-h", "help", "version"]

[[command.sub]]
name = "mod"
[[command.sub.sub]]
name = "graph"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "verify"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "why"
bare = false
positional_style = true
standalone = ["--help", "--m", "--vendor", "-h"]
