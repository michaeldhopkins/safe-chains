[[command]]
name = "sha1sum"
description = "Computes or verifies SHA-1 cryptographic checksums. Strictly read-only: reads file contents, computes hashes, and prints results to stdout. The --check flag reads a checksum file and verifies listed files against their recorded hashes. Does not modify files or access the network. Note: SHA-1 has known collision vulnerabilities and should not be relied on for security purposes. Part of GNU coreutils with a very stable CLI surface."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#sha1sum-invocation"
level = "Inert"
bare = true
standalone = [
    "--binary", "--check", "--help", "--ignore-missing", "--quiet",
    "--status", "--strict", "--tag", "--text", "--version", "--warn",
    "--zero",
    "-V", "-b", "-c", "-h", "-t", "-w", "-z",
]
