[[command]]
name = "shasum"
description = "Perl-based SHA checksum utility with selectable algorithm (SHA-1, SHA-224, SHA-256, SHA-384, SHA-512 via --algorithm). Strictly read-only: reads file contents, computes hashes, and prints results to stdout. The --check flag verifies files against recorded checksums. Does not modify files or access the network. Commonly the default SHA tool on macOS. The CLI surface is very stable."
url = "https://perldoc.perl.org/shasum"
level = "Inert"
bare = true
standalone = [
    "--binary", "--check", "--help", "--portable", "--status",
    "--strict", "--tag", "--text", "--version", "--warn",
    "-0", "-V", "-b", "-c", "-h", "-p", "-s", "-t",
]
valued = ["--algorithm", "-a"]
