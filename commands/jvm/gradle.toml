[[command]]
name = "gradle"
description = "General-purpose build automation tool for JVM projects. Gradle executes arbitrary code: build scripts (build.gradle, build.gradle.kts) are full Groovy or Kotlin programs that run during configuration and execution phases. Even read-only-sounding tasks like 'dependencies' or 'tasks' trigger script evaluation, which can download artifacts, run plugins, or execute shell commands. The 'build' task compiles code, runs tests, and produces artifacts (local filesystem writes). The '--scan' flag uploads build data to Gradle's servers. Gradle releases roughly every 6 weeks with new features, flags, and deprecations; the CLI surface changes frequently and needs periodic review."
aliases = ["gradlew"]
url = "https://docs.gradle.org/current/userguide/command_line_interface.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "build"
level = "SafeWrite"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]

[[command.sub]]
name = "check"
level = "SafeRead"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]

[[command.sub]]
name = "dependencies"
standalone = [
    "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--configuration"]

[[command.sub]]
name = "properties"
standalone = [
    "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]

[[command.sub]]
name = "tasks"
standalone = [
    "--all", "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--group"]

[[command.sub]]
name = "test"
level = "SafeRead"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]
