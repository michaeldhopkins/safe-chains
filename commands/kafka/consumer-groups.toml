[[command]]
name = "kafka-consumer-groups"
description = "Manages Apache Kafka consumer groups. Connects to Kafka brokers over the network via --bootstrap-server. The --list and --describe operations are read-only, querying consumer group metadata and offset positions. The --reset-offsets and --delete-offsets operations modify server-side state, potentially causing message re-consumption or data loss. The --delete operation removes a consumer group entirely. Part of the Apache Kafka distribution, which releases roughly every four months."
url = "https://kafka.apache.org/documentation/#basic_ops_consumer_group"
bare_flags = ["--help", "-h", "--version"]

[command.wrapper]
standalone = ["--all-groups", "--members", "--offsets", "--state", "--verbose"]
valued = [
    "--bootstrap-server", "--command-config",
    "--group", "--timeout",
]

[[command.sub]]
name = "--list"
bare = true
standalone = ["--help", "-h"]
valued = ["--bootstrap-server", "--command-config", "--state"]

[[command.sub]]
name = "--describe"
bare = true
standalone = [
    "--help", "-h",
    "--all-groups",
    "--members", "--offsets", "--state",
    "--verbose",
]
valued = [
    "--bootstrap-server", "--command-config",
    "--group", "--timeout",
]
