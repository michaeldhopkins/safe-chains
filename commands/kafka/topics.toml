[[command]]
name = "kafka-topics"
description = "Manages Apache Kafka topics. Connects to Kafka brokers over the network via --bootstrap-server. The --list and --describe operations are read-only, querying topic names, partition counts, replication factors, and configuration. The --create, --delete, and --alter operations modify cluster state: creating or removing topics or changing their configuration. Part of the Apache Kafka distribution, which releases roughly every four months."
url = "https://kafka.apache.org/documentation/#basic_ops_add_topic"
bare_flags = ["--help", "-h", "--version"]

[command.wrapper]
standalone = ["--exclude-internal"]
valued = [
    "--bootstrap-server", "--command-config",
    "--topic", "--topic-id", "--topic-id-type",
    "--exclude-topic",
]

[[command.sub]]
name = "--list"
bare = true
standalone = ["--help", "-h", "--exclude-internal"]
valued = [
    "--bootstrap-server", "--command-config",
    "--topic", "--topic-id", "--topic-id-type",
    "--exclude-topic",
]

[[command.sub]]
name = "--describe"
bare = true
standalone = [
    "--help", "-h",
    "--unavailable-partitions", "--under-replicated-partitions",
    "--under-min-isr-partitions", "--at-min-isr-partitions",
    "--exclude-internal",
]
valued = [
    "--bootstrap-server", "--command-config",
    "--topic", "--topic-id", "--topic-id-type",
    "--exclude-topic",
    "--partition",
]
