[[command]]
name = "magick"
url = "https://imagemagick.org/script/command-line-tools.php"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "compare"
level = "SafeWrite"
positional_style = true
bare = false

[[command.sub]]
name = "composite"
level = "SafeWrite"
positional_style = true
bare = false

[[command.sub]]
name = "convert"
level = "SafeWrite"
positional_style = true
bare = false

[[command.sub]]
name = "identify"
bare = false
standalone = [
    "--help",
    "-h", "-matte", "-moments", "-ping", "-quiet",
    "-regard-warnings", "-unique", "-verbose",
]
valued = [
    "-alpha", "-colorspace", "-define", "-density",
    "-depth", "-endian", "-format", "-interlace",
    "-limit", "-precision", "-sampling-factor",
    "-size", "-units", "-virtual-pixel",
]

[[command.sub]]
name = "mogrify"
level = "SafeWrite"
positional_style = true
bare = false

[[command.sub]]
name = "montage"
level = "SafeWrite"
positional_style = true
bare = false

[[command.sub]]
name = "stream"
level = "SafeWrite"
positional_style = true
bare = false
