[[command]]
name = "ffprobe"
description = "Multimedia stream inspector — companion to ffmpeg. Reads media files or URLs and prints metadata in flat / JSON / XML / CSV / INI formats to stdout. Network reads when the input is a URL. Stable surface."
url = "https://ffmpeg.org/ffprobe.html"
researched_version = "ffprobe 7.x"
level = "SafeRead"
bare = false
standalone = [
    "--help", "-bitexact", "-byte_binary_prefix",
    "-find_stream_info", "-h", "-hide_banner",
    "-no_unit", "-of", "-output_format",
    "-pretty", "-print_format", "-show_chapters",
    "-show_data", "-show_data_hash", "-show_entries",
    "-show_error", "-show_format", "-show_format_entry",
    "-show_frames", "-show_log", "-show_packets",
    "-show_pixel_formats", "-show_private_data",
    "-show_program_version", "-show_programs",
    "-show_streams", "-show_versions",
    "-sexagesimal", "-unit", "-version",
    "-v", "-loglevel",
]
valued = [
    "-count_frames", "-count_packets",
    "-fflags", "-i", "-loglevel",
    "-of", "-output_format",
    "-print_format", "-probesize",
    "-read_intervals", "-select_streams",
    "-show_entries", "-show_format_entry",
    "-show_streams_info",
    "-stream_specifier",
]
