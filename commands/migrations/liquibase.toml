[[command]]
name = "liquibase"
description = "Liquibase database migration tool. Subcommands: `update`, `update-count`, `update-to-tag`, `update-sql`, `update-testing-rollback`, `rollback`, `rollback-count`, `rollback-to-date`, `rollback-sql`, `status`, `history`, `tag`, `tag-exists`, `db-doc`, `diff`, `diff-changelog`, `generate-changelog`, `clear-checksums`, `release-locks`, `validate`, `changelog-sync`, `mark-next-changeset-ran`, `drop-all`, `version`, `init`, `help`. Read-side: `version`, `status`, `history`, `validate`, `diff`, `diff-changelog --output-file=-`, `db-doc`, `tag-exists`."
url = "https://docs.liquibase.com/commands/home.html"
researched_version = "Liquibase 4.x"
bare_flags = ["--help", "--version", "-h"]

