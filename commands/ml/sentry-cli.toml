[[command]]
name = "sentry-cli"
description = "Sentry CLI — manages releases, source maps, and crash artifacts. Most subcommands contact a Sentry server (network). Read-side: `info`, `login`, `releases list`, `releases info`, `releases files <release> list`, `organizations list`, `projects list`, `monitors list`, `events list`. Write-side: `releases new/finalize/delete/set-commits/files <release> upload/delete`, `sourcemaps upload/inject/explain`, `debug-files upload/check/find`, `send-event`, `send-envelope`, `mcp-server`, `monitors run/event/status`, `update`."
url = "https://docs.sentry.io/cli/"
researched_version = "sentry-cli 2.x"
bare_flags = ["--help", "--version", "-h", "-V"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = true
standalone = ["--config-status-json", "--help", "-h"]

[[command.sub]]
name = "completions"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

