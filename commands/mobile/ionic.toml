[[command]]
name = "ionic"
description = "Ionic Framework CLI. Subcommands: `start`, `serve`, `build`, `generate`, `init`, `info`, `doctor`, `link`, `login`, `logout`, `whoami`, `signup`, `cordova`, `capacitor`, `cap`, `monitoring`, `ssl`, `enterprise`, `config`, `lab`, `tail`, `repair`. Most subcommands run user code, build, or contact Ionic / cloud services. Read-side: `info`, `doctor`, `whoami`, `config get/print`, `--version`, `--help`."
url = "https://ionicframework.com/docs/cli"
researched_version = "@ionic/cli 7.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = true
standalone = ["--help", "--json", "-h"]

[[command.sub]]
name = "doctor"
nested_bare = true

[[command.sub.sub]]
name = "check"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "ignore"
candidate = true

[[command.sub.sub]]
name = "treat"
candidate = true

[[command.sub]]
name = "whoami"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "config"
nested_bare = false

[[command.sub.sub]]
name = "get"
standalone = ["--global", "--help", "--json", "-g", "-h"]

[[command.sub.sub]]
name = "print"
standalone = ["--global", "--help", "--json", "-g", "-h"]

[[command.sub.sub]]
name = "set"
candidate = true

[[command.sub.sub]]
name = "unset"
candidate = true

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

