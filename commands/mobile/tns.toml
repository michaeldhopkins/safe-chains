[[command]]
name = "tns"
aliases = ["ns", "nativescript"]
description = "NativeScript CLI. Subcommands: `create`, `add`, `run`, `build`, `prepare`, `deploy`, `debug`, `device`, `test`, `update`, `migrate`, `clean`, `info`, `doctor`, `package-manager`, `extension`, `setup`, `dev-test`, `config`, `proxy`, `usage-reports`. Most subcommands build / run on devices. Read-side: `info`, `doctor`, `--version`, `--help`."
url = "https://docs.nativescript.org/CLI"
researched_version = "NativeScript 8.x"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = true
