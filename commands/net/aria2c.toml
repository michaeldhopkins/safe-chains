[[command]]
name = "aria2c"
description = "Multi-protocol multi-source download utility (HTTP/HTTPS/FTP/BitTorrent/Metalink). Network read; writes downloaded files (project-local SafeWrite). The flag surface is huge; common use is `aria2c URL [-o OUT]`."
url = "https://aria2.github.io/manual/en/html/aria2c.html"
researched_version = "aria2 1.x"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = [
    "--all-proxy", "--allow-overwrite",
    "--allow-piece-length-change",
    "--always-resume", "--async-dns",
    "--auto-file-renaming", "--auto-save-interval",
    "--bt-detach-seed-only", "--bt-enable-hook-after-hash-check",
    "--bt-enable-lpd", "--bt-exclude-tracker",
    "--bt-force-encryption", "--bt-hash-check-seed",
    "--bt-load-saved-metadata", "--bt-meta-data",
    "--bt-metadata-only", "--bt-min-crypto-level",
    "--bt-prioritize-piece", "--bt-remove-unselected-file",
    "--bt-request-peer-speed-limit", "--bt-require-crypto",
    "--bt-save-metadata", "--bt-seed-unverified",
    "--bt-stop-timeout", "--bt-tracker",
    "--bt-tracker-connect-timeout",
    "--bt-tracker-interval", "--bt-tracker-timeout",
    "--ca-certificate", "--certificate", "--check-certificate",
    "--check-integrity", "--checksum",
    "--conditional-get", "--conf-path",
    "--connect-timeout", "--console-log-level",
    "--content-disposition-default-utf8",
    "--continue", "--daemon",
    "--deferred-input", "--dht-entry-point",
    "--dht-entry-point6", "--dht-file-path",
    "--dht-file-path6", "--dht-listen-addr6",
    "--dht-listen-port", "--dht-message-timeout",
    "--dir", "--disable-ipv6", "--disk-cache",
    "--dns-timeout", "--download-result",
    "--dscp", "--enable-async-dns", "--enable-color",
    "--enable-dht", "--enable-dht6", "--enable-http-keep-alive",
    "--enable-http-pipelining", "--enable-mmap",
    "--enable-peer-exchange", "--enable-rpc",
    "--event-poll", "--exclude-domains",
    "--exclude-paths", "--ftp-passwd",
    "--ftp-pasv", "--ftp-proxy", "--ftp-user",
    "--header", "--help", "--http-accept-gzip",
    "--http-auth-challenge", "--http-no-cache",
    "--http-passwd", "--http-proxy", "--http-user",
    "--https-proxy", "--human-readable",
    "--index-out", "--input-file", "--keep-unfinished-download-result",
    "--listen-port", "--load-cookies", "--log",
    "--log-level", "--lowest-speed-limit",
    "--max-concurrent-downloads", "--max-connection-per-server",
    "--max-download-limit", "--max-download-result",
    "--max-file-not-found", "--max-mmap-limit",
    "--max-overall-download-limit", "--max-overall-upload-limit",
    "--max-resume-failure-tries", "--max-tries",
    "--max-upload-limit", "--metalink-base-uri",
    "--metalink-enable-unique-protocol",
    "--metalink-file", "--metalink-language",
    "--metalink-location", "--metalink-os",
    "--metalink-preferred-protocol",
    "--metalink-server", "--metalink-version",
    "--min-split-size", "--min-tls-version",
    "--multiple-interface", "--netrc-path",
    "--no-conf", "--no-file-allocation-limit",
    "--no-netrc", "--no-want-digest-header", "--on-bt-download-complete",
    "--on-download-complete", "--on-download-error",
    "--on-download-pause", "--on-download-start",
    "--on-download-stop", "--out", "--parameterized-uri",
    "--pause", "--pause-metadata", "--peer-id-prefix",
    "--peer-agent", "--piece-length",
    "--private-key", "--proxy-method",
    "--quiet", "--realtime-chunk-checksum",
    "--referer", "--remote-time", "--remove-control-file",
    "--retry-wait", "--reuse-uri",
    "--rpc-allow-origin-all", "--rpc-listen-all",
    "--rpc-listen-port", "--rpc-max-request-size",
    "--rpc-passwd", "--rpc-save-upload-metadata",
    "--rpc-secret", "--rpc-secure", "--rpc-user",
    "--save-cookies", "--save-not-found",
    "--save-session", "--save-session-interval",
    "--seed-ratio", "--seed-time", "--select-file",
    "--server-stat-of", "--server-stat-timeout",
    "--show-console-readout", "--show-files",
    "--socket-recv-buffer-size", "--ssh-host-key-md",
    "--split", "--stderr",
    "--stop", "--stop-with-process",
    "--stream-piece-selector", "--summary-interval",
    "--timeout", "--torrent-file",
    "--truncate-console-readout", "--uri-selector",
    "--use-head", "--user-agent", "--version",
    "-D", "-V", "-Z", "-c", "-d", "-h", "-i",
    "-j", "-l", "-m", "-n", "-o", "-q", "-s",
    "-t", "-v", "-x",
]
valued = [
    "--all-proxy", "--all-proxy-passwd",
    "--all-proxy-user", "--bt-tracker",
    "--ca-certificate", "--certificate",
    "--checksum", "--conf-path",
    "--connect-timeout", "--console-log-level",
    "--continue", "--dht-entry-point",
    "--dht-file-path", "--dir", "--disk-cache",
    "--dns-timeout", "--exclude-paths",
    "--ftp-passwd", "--ftp-proxy", "--ftp-user",
    "--header", "--http-passwd", "--http-proxy",
    "--http-user", "--https-proxy",
    "--index-out", "--input-file",
    "--listen-port", "--load-cookies", "--log",
    "--log-level", "--lowest-speed-limit",
    "--max-concurrent-downloads",
    "--max-connection-per-server",
    "--max-download-limit", "--max-overall-download-limit",
    "--max-overall-upload-limit",
    "--max-tries", "--max-upload-limit",
    "--metalink-file", "--min-split-size",
    "--out", "--parameterized-uri",
    "--proxy-method", "--referer",
    "--retry-wait", "--rpc-listen-port",
    "--rpc-passwd", "--rpc-secret", "--rpc-user",
    "--save-cookies", "--save-session",
    "--seed-ratio", "--seed-time",
    "--select-file", "--server-stat-of",
    "--split", "--stderr",
    "--summary-interval", "--timeout",
    "--torrent-file", "--uri-selector",
    "--user-agent",
    "-T", "-U", "-c", "-d", "-i", "-j",
    "-l", "-m", "-n", "-o", "-s", "-t", "-x",
]

[command.path_gate]
flags = { "--input-file" = "read" }
