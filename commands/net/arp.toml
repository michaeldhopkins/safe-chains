[[command]]
name = "arp"
description = "Manipulate the ARP table. -n / -a list (read). -d / -s modify the table (root needed)."
url = "https://man7.org/linux/man-pages/man8/arp.8.html"
researched_version = "net-tools 2.x"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = [
    "--help", "--version", "-?", "-D",
    "-H", "-I", "-N", "-V", "-a", "-d",
    "-e", "-i", "-n", "-s", "-v",
]
valued = ["-A", "-H", "-I", "-f", "-i", "-s"]
