[[command]]
name = "host"
description = "Simple DNS lookup utility that performs forward and reverse DNS queries over the network. A simpler interface than dig, outputting results in a human-readable format. Read-only from a local filesystem perspective, but every invocation generates network traffic to DNS servers. Part of ISC BIND, with a very stable CLI surface."
url = "https://man7.org/linux/man-pages/man1/host.1.html"
level = "Inert"
bare = false
standalone = [
    "--help", "--version",
    "-4", "-6", "-C", "-V", "-a", "-c", "-d", "-h", "-l", "-r", "-s", "-v",
]
valued = ["-D", "-N", "-R", "-T", "-W", "-i", "-m", "-t"]
