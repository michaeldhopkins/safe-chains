[[command]]
name = "hurl"
description = "Hurl — runs HTTP requests defined in plain-text .hurl files. Bare invocation reads the .hurl file(s) and makes the requests (network read). --test runs assertions and exits non-zero on failure. --output / --report-html / --report-junit / --report-tap write reports."
url = "https://hurl.dev/docs/manual.html"
researched_version = "Hurl 8.0.1 (2026-04-29)"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = [
    "--color", "--compressed",
    "--connect-to", "--continue-on-error",
    "--cookie-jar", "--curl",
    "--debug", "--digest",
    "--error-format", "--file-root",
    "--from-entry", "--glob", "--help",
    "--http1.0", "--http1.1", "--http2", "--http3",
    "--include", "--insecure", "--interactive",
    "--ipv4", "--ipv6", "--json",
    "--location", "--location-trusted",
    "--max-filesize", "--max-redirs",
    "--max-time", "--negotiate",
    "--netrc", "--netrc-file", "--netrc-optional",
    "--no-assert", "--no-color",
    "--no-cookie-store", "--no-output",
    "--no-pretty", "--ntlm",
    "--output", "--parallel", "--path-as-is",
    "--pretty", "--progress-bar",
    "--proxy", "--report-html", "--report-json",
    "--report-junit", "--report-tap",
    "--repeat", "--report-html-history",
    "--resolve", "--retry", "--retry-interval",
    "--ssl-no-revoke", "--summary",
    "--test", "--to-entry", "--unix-socket",
    "--user", "--user-agent", "--variable",
    "--variables-file", "--verbose",
    "--very-verbose", "--version",
    "-0", "-?", "-4", "-6", "-A", "-H", "-L",
    "-M", "-V", "-X", "-b", "-c", "-d",
    "-h", "-i", "-k", "-l", "-m", "-n",
    "-o", "-q", "-r", "-s", "-u",
    "-v", "-vv",
]
valued = [
    "--aws-sigv4",
    "--cacert", "--cert", "--connect-timeout",
    "--connect-to",
    "--cookie", "--cookie-jar",
    "--delay", "--error-format",
    "--file-root", "--from-entry", "--glob",
    "--jobs", "--key", "--limit-rate",
    "--max-filesize", "--max-redirs",
    "--max-time", "--netrc-file",
    "--no-proxy", "--output", "--parallel",
    "--pinnedpubkey", "--proxy",
    "--report-html",
    "--report-junit", "--report-tap",
    "--repeat", "--resolve", "--retry",
    "--retry-interval",
    "--secret", "--secrets-file",
    "--socks5",
    "--to-entry", "--unix-socket",
    "--user", "--user-agent", "--variable",
    "--variables-file", "--verbosity",
    "--workers",
    "-A", "-E", "-H", "-X",
    "-b", "-c", "-d", "-m",
    "-o", "-r", "-u", "-x",
]

[command.path_gate]
flags = { "--cacert" = "read" }
