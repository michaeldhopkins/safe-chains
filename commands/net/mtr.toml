[[command]]
name = "mtr"
description = "Network diagnostic tool that combines traceroute and ping into a single interface. Sends ICMP or UDP probe packets over the network to trace the route to a destination and measure per-hop latency and packet loss. Read-only from a filesystem perspective, but generates network traffic with each invocation. Without --report, runs interactively and continuously. May require root or setuid for raw socket access. The CLI surface is stable."
url = "https://man7.org/linux/man-pages/man8/mtr.8.html"
level = "Inert"
bare = false
standalone = [
    "--help", "--no-dns", "--report", "--report-wide",
    "--show-ips", "--version",
    "-4", "-6", "-V", "-b", "-h", "-n", "-r", "-w",
]
valued = [
    "--address", "--count", "--interval", "--max-ttl",
    "--psize", "--report-cycles", "--type",
    "-I", "-a", "-c", "-i", "-m", "-s",
]
