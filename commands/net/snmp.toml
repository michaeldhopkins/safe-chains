[[command]]
name = "snmptest"
description = "Interactive SNMP request tool. Prompts for variables to query and sends GET/GETNEXT/SET requests to an agent. The interactive prompt can issue SET requests, which write to the remote agent; misuse depends on the user's choices at the prompt. Read-only on the local filesystem. Generates network traffic. Part of Net-SNMP; the common-options surface is documented in snmpcmd(1)."
url = "https://net-snmp.sourceforge.io/docs/man/snmptest.html"
researched_version = "Net-SNMP 5.9.4"
level = "Inert"
bare = false
