[[command]]
name = "snmpbulkget"
description = "Issues an SNMP GETBULK request to a network entity and prints the returned variables. Read-only at the agent level (GETBULK is a query). Generates network traffic. SNMPv3 authentication and privacy passphrases may appear on the command line. Part of Net-SNMP; the common-options surface is documented in snmpcmd(1) and is shared across all Net-SNMP query tools. Releases roughly yearly."
url = "https://net-snmp.sourceforge.io/docs/man/snmpbulkget.html"
researched_version = "Net-SNMP 5.9.4"
level = "Inert"
bare = false
standalone = [
    "-d", "-h", "--help", "-H", "-V", "--version",
]
valued = [
    "-D", "-I", "-L", "-m", "-M", "-O", "-P", "-r", "-t", "-v", "-Y",
    "-l", "-n",
    "-a", "-A", "-e", "-E", "-u", "-x", "-X", "-Z",
    "-c",
    "-Cn", "-Cr",
]

[[command]]
name = "snmpbulkwalk"
description = "Walks an OID subtree by issuing SNMP GETBULK requests, printing each variable encountered. Read-only at the agent level. Generates network traffic. SNMPv3 authentication and privacy passphrases may appear on the command line. Part of Net-SNMP; the common-options surface is documented in snmpcmd(1)."
url = "https://net-snmp.sourceforge.io/docs/man/snmpbulkwalk.html"
researched_version = "Net-SNMP 5.9.4"
level = "Inert"
bare = false
standalone = [
    "-d", "-h", "--help", "-H", "-V", "--version",
    "-Cc", "-Ci", "-Cp",
]
valued = [
    "-D", "-I", "-L", "-m", "-M", "-O", "-P", "-r", "-t", "-v", "-Y",
    "-l", "-n",
    "-a", "-A", "-e", "-E", "-u", "-x", "-X", "-Z",
    "-c",
    "-Cn", "-Cr",
]

[[command]]
name = "snmpdelta"
description = "Polls integer OIDs over SNMP at intervals and reports deltas between successive readings. Read-only at the agent level. Generates repeated network traffic for the duration of the run. The -Cl flag would write per-instance config files to the current working directory and is excluded here. Part of Net-SNMP; the common-options surface is documented in snmpcmd(1)."
url = "https://net-snmp.sourceforge.io/docs/man/snmpdelta.html"
researched_version = "Net-SNMP 5.9.4"
level = "Inert"
bare = false
standalone = [
    "-d", "-h", "--help", "-H", "-V", "--version",
    "-Cf", "-Ct", "-Cs", "-CS", "-Cm", "-Ck", "-CT",
]
valued = [
    "-D", "-I", "-L", "-m", "-M", "-O", "-P", "-r", "-t", "-v", "-Y",
    "-l", "-n",
    "-a", "-A", "-e", "-E", "-u", "-x", "-X", "-Z",
    "-c",
    "-CF", "-Cp", "-CP", "-Cv",
]

[[command]]
name = "snmpdf"
description = "Networked df: queries a remote SNMP agent's hrStorageTable (or dskTable with -Cu) and prints disk usage on the remote host. Read-only at the agent level. Generates network traffic. Part of Net-SNMP; the common-options surface is documented in snmpcmd(1)."
