[[command]]
name = "snmptranslate"
description = "Local MIB translation tool. Converts SNMP OIDs between numeric and symbolic forms, dumps MIB structure, and prints details about MIB objects. Does not connect to any agent — all work is local against the loaded MIB modules. Read-only on the local filesystem. Part of Net-SNMP."
url = "https://net-snmp.sourceforge.io/docs/man/snmptranslate.html"
researched_version = "Net-SNMP 5.9.4"
level = "Inert"
bare = true
standalone = [
    "-h", "--help", "-V", "--version",
    "-Td", "-Tp", "-Ta", "-Tl", "-To", "-Ts", "-Tt", "-Tz", "-Tb", "-Tn",
    "-On", "-Of", "-Os", "-OS", "-OU",
]
valued = [
    "-D", "-I", "-L", "-m", "-M", "-O", "-P", "-w",
]

