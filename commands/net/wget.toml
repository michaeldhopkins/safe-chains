[[command]]
name = "wget"
description = "Non-interactive HTTP/HTTPS/FTP downloader. Network read; writes downloaded files locally (project-local SafeWrite). Many flags control mirror / continuation / cookies / ssl / proxies. Mature, ubiquitous tool."
