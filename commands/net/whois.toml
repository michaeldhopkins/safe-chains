[[command]]
name = "whois"
description = "Queries WHOIS databases to retrieve domain name, IP address, and AS number registration information. Connects to WHOIS servers over the network (port 43) for each query. Read-only from a filesystem perspective, but generates network traffic. Results include registrant contact information, registration dates, and nameserver details. The CLI surface is very stable and essentially frozen."
url = "https://man7.org/linux/man-pages/man1/whois.1.html"
level = "Inert"
bare = false
standalone = [
    "--help", "--version",
    "-A", "-B", "-G", "-H", "-I", "-K", "-L",
    "-M", "-Q", "-R", "-S", "-a", "-b", "-c",
    "-d", "-f", "-g", "-l", "-m", "-r", "-x",
]
valued = ["-T", "-V", "-h", "-i", "-p", "-s", "-t"]
