[[command]]
name = "yt-dlp"
aliases = ["youtube-dl"]
description = "yt-dlp — feature-rich YouTube-DL fork that downloads video and audio from a vast list of sites. Reads from a URL positional (or `--batch-file`), writes the media to a project-local filename (default derived from title and ID, customizable via `-o <template>`). Supports format selection (`-f`, `--format`, `--format-sort`), audio extraction (`-x`, `--audio-format`, `--audio-quality`), playlist ranges (`--playlist-items`, `--max-downloads`), download archive tracking (`--download-archive`), subtitle and thumbnail handling (`--write-subs`, `--embed-subs`, `--sub-langs`, `--embed-thumbnail`), metadata embedding (`--add-metadata`, `--embed-metadata`, `--embed-chapters`), HTTP / proxy / cookie controls (`--proxy`, `--cookies`, `--cookies-from-browser`, `--user-agent`, `--referer`, `--add-headers`), and inspection modes (`-F`, `-j`, `-J`, `--simulate`, `--skip-download`, `--get-*`, `--print`, `--list-formats`). yt-dlp also exposes several arbitrary-code entry points: `--exec` / `--exec-before-download` run shell commands per download; `--downloader` and `--downloader-args` plug in a custom downloader binary; `--postprocessor-args` forward shell args to user-named postprocessors; `--plugin-dirs` loads Python plugins from a path; `--use-extractors`, `--js-runtimes`, and `--remote-components` swap in custom Python / JavaScript engines; `--netrc-cmd` runs a shell command to fetch credentials; `--config-location` loads a config file whose contents are re-parsed as CLI flags; `--alias` defines a CLI alias that re-parses arbitrary substitutions; `--update` and `--update-to` self-replace the installed yt-dlp binary."
url = "https://github.com/yt-dlp/yt-dlp"
researched_version = "yt-dlp 2026.06.09"
level = "SafeWrite"
bare = false
