examples_safe = [
    "yt-dlp https://example.com/v",
    "yt-dlp -f best https://example.com/v",
    "yt-dlp -x --audio-format mp3 https://example.com/v",
    "yt-dlp --write-subs --sub-langs en https://example.com/v",
