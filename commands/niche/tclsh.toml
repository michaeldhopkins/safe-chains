[[command]]
name = "tclsh"
aliases = ["wish"]
description = "Tcl shell — bare invocation drops into REPL; passing a script runs it (arbitrary Tcl code). wish adds Tk GUI. Carve-out: --version / --help only."
url = "https://www.tcl-lang.org/man/tcl/UserCmd/tclsh.htm"
researched_version = "Tcl 8.x / 9.x"
level = "Inert"
bare = false
max_positional = 0
standalone = ["--help", "--version", "-h"]
