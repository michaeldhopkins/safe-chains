[[command]]
name = "unbuffer"
description = "Expect helper — disables output buffering of the wrapped command. Each invocation runs an arbitrary command (the positional arguments). Carve-out: --help only."
url = "https://core.tcl-lang.org/expect/"
researched_version = "Expect 5.x"
level = "Inert"
bare = false
max_positional = 0
standalone = ["--help", "-h"]
