[[command]]
name = "nix"
description = "Nix unified flake-based CLI. Many subcommands. Read-side: `version`, `eval`, `repl`, `doctor`, `derivation show`, `flake metadata`, `flake show`, `flake check`, `flake info`, `path-info`, `show-derivation`, `store ls`, `store cat`, `store dump-path`, `store ping`, `store info`, `store optimise --help`, `why-depends`, `search`, `registry list`. Write-side: `build`, `develop`, `shell`, `run`, `profile install/remove/list/upgrade/diff-closures/wipe-history`, `flake init/clone/lock/update/new`, `copy`, `store add-file/add-path/copy-log/delete/diff-closures/gc/repair-path/sign-paths/verify`, `bundle`, `daemon`, `key generate-secret`. Network: `flake update`, `copy`, `build` of network-fetched flake refs, `registry pin`."
url = "https://nix.dev/manual/nix/latest/command-ref/new-cli/nix.html"
researched_version = "Nix 2.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "doctor"
level = "Inert"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "eval"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--apply", "--debug", "--debugger", "--expr", "--file", "--help", "--ignore-try", "--impure", "--json", "--no-net", "--print-build-logs", "--quiet", "--raw", "--read-only", "--refresh", "--store", "--strict", "--write-lock-file", "-L", "-f", "-h", "--help", "-q"]
valued = ["--arg", "--argstr", "--expr", "--file", "--include", "--option", "--store", "-I", "-f"]

[[command.sub]]
name = "search"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--debug", "--exclude", "--help", "--inputs-from", "--json", "--no-update-lock-file", "--no-write-lock-file", "--print-build-logs", "--quiet", "--refresh", "-L", "-h", "-q"]
valued = ["--exclude", "--inputs-from", "--option", "--override-flake", "--override-input", "--store", "-e"]

[[command.sub]]
name = "show-derivation"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--debug", "--help", "--json", "--no-net", "--quiet", "--recursive", "-h", "-q", "-r"]

[[command.sub]]
name = "derivation"
nested_bare = false

[[command.sub.sub]]
name = "show"
standalone = ["--debug", "--help", "-h"]
valued = ["--store"]

[[command.sub]]
name = "path-info"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--all", "--closure-size", "--debug", "--help", "--human-readable", "--json", "--quiet", "--recursive", "--sigs", "--size", "-S", "-c", "-h", "-q", "-r", "-s"]
valued = ["--store", "--from"]

[[command.sub]]
name = "why-depends"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--all", "--help", "--precise", "-a", "-h"]
valued = ["--derivation", "--store"]

[[command.sub]]
name = "store"
nested_bare = true

[[command.sub.sub]]
name = "ls"
standalone = ["--debug", "--help", "--human-readable", "--json", "--long", "--quiet", "--recursive", "-d", "-h", "-l", "-q", "-r"]
valued = ["--store"]

[[command.sub.sub]]
name = "cat"
standalone = ["--help", "-h"]
valued = ["--store"]

[[command.sub.sub]]
name = "dump-path"
standalone = ["--help", "-h"]
valued = ["--store"]

[[command.sub.sub]]
name = "ping"
standalone = ["--help", "-h"]
valued = ["--store"]

[[command.sub.sub]]
name = "info"
standalone = ["--help", "-h"]
valued = ["--store"]

[[command.sub.sub]]
name = "verify"
standalone = ["--all", "--help", "-a", "-h"]
valued = ["--store"]

[[command.sub.sub]]
name = "diff-closures"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "delete"
candidate = true

[[command.sub.sub]]
name = "gc"
