[[command.sub]]
name = "current"
level = "Inert"
standalone = ["--help", "-h"]

[[command.sub]]
name = "default"
level = "Inert"
standalone = ["--help", "-h"]

[[command.sub]]
name = "list"
level = "Inert"
standalone = ["--help", "-h"]

[[command.sub]]
