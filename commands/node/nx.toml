[[command]]
name = "nx"
description = "Monorepo build orchestrator and task runner for JavaScript/TypeScript projects. graph, list, show, report, and print-affected are read-only commands that analyze the project dependency graph without executing tasks. format with --check performs a dry-run style formatting check without modifying files. None of these subcommands execute project build/test tasks or modify source code. Actively developed with frequent releases; the subcommand surface area grows regularly."
url = "https://nx.dev/reference/commands"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "graph"
standalone = ["--affected", "--help", "--open", "--watch", "-h"]
valued = ["--file", "--focus", "--groupByFolder", "--host", "--port", "--targets", "--view"]

[[command.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--plugin"]

[[command.sub]]
name = "show"
bare = false
standalone = ["--help", "--json", "-h"]
valued = ["--projects", "--type", "--web"]

[[command.sub]]
name = "report"
standalone = ["--help", "-h"]

[[command.sub]]
name = "format"
guard = "--check"
standalone = ["--all", "--base", "--check", "--head", "--help", "--uncommitted", "--untracked", "-h"]
valued = ["--exclude", "--files", "--projects"]

[[command.sub]]
name = "print-affected"
standalone = ["--all", "--base", "--head", "--help", "--select", "--uncommitted", "--untracked", "-h"]
valued = ["--exclude", "--files", "--type"]
