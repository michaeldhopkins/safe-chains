[[command]]
name = "mutool"
description = "MuPDF's command-line companion — a Swiss-army knife for inspecting and transforming PDFs, XPS, EPUB, and CBZ documents. Dispatches to per-task subcommands: read-only diagnostics (audit, grep, info, show, trace) and conversion / transform subs (bake, barcode, clean, convert, create, draw, extract, merge, pages, poster, recolor, sign, trim). The `run` subcommand executes arbitrary JavaScript and is recorded as candidate (deliberately uncovered). Active project — MuPDF 1.27.x cadence."
url = "https://mupdf.readthedocs.io/"
researched_version = "MuPDF 1.27.2"
bare_flags = ["--help", "--version", "-h", "-V"]

# --- Read-only diagnostics --------------------------------------------

[[command.sub]]
name = "audit"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h", "-?"]

[[command.sub]]
name = "grep"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h", "-?"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h", "-?"]

[[command.sub]]
name = "show"
