bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h", "-?"]

[[command.sub]]
name = "trace"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h", "-?"]

