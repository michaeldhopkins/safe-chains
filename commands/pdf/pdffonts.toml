[[command]]
name = "pdffonts"
description = "Poppler — lists fonts used in a PDF. Pure read."
url = "https://manpages.ubuntu.com/manpages/jammy/en/man1/pdffonts.1.html"
researched_version = "Poppler 25.x"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["-help", "-q", "-subst", "-v", "--help", "-?"]
valued = ["-f", "-l", "-opw", "-upw"]
