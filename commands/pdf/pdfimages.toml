[[command]]
name = "pdfimages"
description = "Poppler — extracts images from a PDF to PPM/PBM/JPEG/JPX/CCITT files. Reads PDF, writes image files."
url = "https://manpages.ubuntu.com/manpages/jammy/en/man1/pdfimages.1.html"
researched_version = "Poppler 24.x"
level = "SafeWrite"
bare = false
positional_style = true
standalone = [
    "-all", "-ccitt", "-help", "-j", "-jp2",
    "-jbig2", "-list", "-png", "-print-filenames",
    "-q", "-tiff", "-v",
    "--help", "-?",
]
valued = ["-f", "-l", "-opw", "-upw"]
