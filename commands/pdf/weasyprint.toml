[[command]]
name = "weasyprint"
description = "Renders HTML/CSS to PDF (and PNG). Reads HTML or URL, writes PDF/PNG to the second positional argument. Network reads when input is a URL."
url = "https://doc.courtbouillon.org/weasyprint/stable/first_steps.html#command-line-api"
researched_version = "WeasyPrint 67.x"
level = "SafeWrite"
bare = false
tolerate_unknown_short = true
standalone = [
    "--custom-metadata", "--debug",
    "--encoding", "--fail-on-http-errors",
    "--full-fonts", "--help", "--hinting",
    "--info", "--media-type",
    "--no-http-redirects",
    "--optimize-images", "--pdf-forms",
    "--pdf-identifier", "--pdf-tags", "--pdf-variant",
    "--pdf-version", "--presentational-hints",
    "--quiet", "--srgb", "--timeout",
    "--uncompressed-pdf", "--verbose", "--version",
    "-D", "-c", "-d", "-e", "-f", "-h",
    "-m", "-n", "-O", "-o", "-p", "-q",
    "-s", "-t", "-u", "-v",
]
valued = [
    "--allowed-protocols",
    "--attachment", "--attachment-relationship",
    "--base-url", "--cache-folder",
    "--dpi", "--encoding",
    "--jpeg-quality",
    "--media-type", "--optimize-size",
    "--output-intent",
    "--pdf-identifier", "--pdf-variant",
    "--pdf-version", "--stylesheet",
    "--timeout", "--xmp-metadata",
    "-D", "-a", "-c", "-e", "-f", "-j",
    "-m", "-O", "-o", "-s", "-t", "-u",
]
