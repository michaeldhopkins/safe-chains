[[command]]
name = "jira"
description = "Third-party CLI client for Atlassian Jira (jira-cli by ankitpokhrel). issue list, issue view, sprint list, and me are read-only API queries that fetch data from the Jira REST API over HTTPS. init writes a local configuration file with authentication credentials. completion generates shell completions locally. All API-facing subcommands require prior authentication and make network requests to the configured Jira instance. Moderately active project with a few releases per year."
url = "https://github.com/ankitpokhrel/jira-cli"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "completion"
positional_style = true

[[command.sub]]
name = "init"
level = "SafeWrite"
positional_style = true

[[command.sub]]
name = "issue"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "view"
positional_style = true

[[command.sub]]
name = "me"
positional_style = true

[[command.sub]]
name = "sprint"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
