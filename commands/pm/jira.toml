[[command]]
name = "jira"
url = "https://github.com/ankitpokhrel/jira-cli"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "completion"
positional_style = true

[[command.sub]]
name = "init"
level = "SafeWrite"
positional_style = true

[[command.sub]]
name = "issue"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "view"
positional_style = true

[[command.sub]]
name = "me"
positional_style = true

[[command.sub]]
name = "sprint"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
