[[command]]
name = "linear"
description = "CLI client for the Linear issue tracker (linear-cli by schpet). All exposed subcommands (issue list/view/query/id/title/url, issue comment list, milestone list/view, project list/view, team list/id/members) are read-only queries against the Linear GraphQL API over HTTPS. completions generates shell completions locally. Every API-facing command makes network requests and requires a stored API key. Actively developed with frequent releases."
url = "https://github.com/schpet/linear-cli"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "completions"
tolerate_unknown_short = true

[[command.sub]]
name = "issue"
nested_bare = true
[[command.sub.sub]]
name = "comment"
nested_bare = true
[[command.sub.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "id"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "query"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "title"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "url"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "view"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
