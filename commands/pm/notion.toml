name = "db"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "open"
positional_style = true
[[command.sub.sub]]
name = "query"
positional_style = true
[[command.sub.sub]]
name = "view"
positional_style = true

[[command.sub]]
name = "doctor"
positional_style = true

[[command.sub]]
name = "file"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
