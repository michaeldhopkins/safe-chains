[[command]]
name = "todoist"
aliases = ["td"]
url = "https://github.com/Doist/todoist-cli"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "auth"
nested_bare = true
[[command.sub.sub]]
name = "status"
positional_style = true

[[command.sub]]
name = "inbox"
positional_style = true

[[command.sub]]
name = "project"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "skill"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "task"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "view"
positional_style = true

[[command.sub]]
name = "today"
positional_style = true
