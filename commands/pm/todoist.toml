[[command]]
name = "todoist"
description = "Official CLI client for Todoist (by Doist). All exposed subcommands (task list/view, project list, skill list, inbox, today) are read-only queries against the Todoist Sync API over HTTPS. auth status checks local credential validity without modifying state. Every API-facing command requires stored authentication and makes network requests. Actively maintained by the Todoist team with regular releases."
aliases = ["td"]
url = "https://github.com/Doist/todoist-cli"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "auth"
nested_bare = true
[[command.sub.sub]]
name = "status"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "inbox"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "project"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "skill"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "task"
nested_bare = true
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "view"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "today"
tolerate_unknown_short = true
tolerate_unknown_long = true
