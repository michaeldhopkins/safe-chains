[[command]]
name = "pip"
description = "Python package installer and manager. list, show, freeze, check, debug, inspect, and help are read-only queries against locally installed packages. config get/list reads pip configuration. install with --dry-run resolves dependencies over the network but does not modify the environment; without --dry-run, install downloads and installs packages which can execute arbitrary setup.py code. download fetches packages from PyPI to a local directory without installing them. index queries the package index over the network. Mature, stable project maintained by the PyPA."
aliases = ["pip3"]
url = "https://pip.pypa.io/en/stable/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "list"
standalone = [
    "--editable", "--exclude-editable", "--help", "--include-editable",
    "--local", "--not-required", "--outdated", "--pre",
    "--uptodate", "--user",
    "-e", "-h", "-i", "-l", "-o",
]
valued = ["--exclude", "--format", "--index-url", "--path"]

[[command.sub]]
name = "show"
bare = false
standalone = ["--files", "--help", "--verbose", "-f", "-h", "-v"]

[[command.sub]]
name = "freeze"
standalone = [
    "--all", "--exclude-editable", "--help", "--local", "--user",
    "-h", "-l",
]
valued = ["--exclude", "--path"]

[[command.sub]]
name = "check"
standalone = ["--help", "-h"]

[[command.sub]]
name = "config"
[[command.sub.sub]]
name = "get"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "debug"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]

[[command.sub]]
name = "index"
standalone = ["--help", "-h"]

[[command.sub]]
name = "inspect"
standalone = ["--help", "-h"]

[[command.sub]]
name = "install"
guard = "--dry-run"
level = "Inert"
bare = false
standalone = [
    "--dry-run", "--help", "--no-deps", "--pre", "--quiet",
    "--require-hashes", "--user", "--verbose",
    "-U", "-h", "-q", "-v",
]
valued = [
    "--constraint", "--extra-index-url", "--find-links",
    "--index-url", "--no-binary", "--only-binary",
    "--platform", "--python-version", "--requirement",
    "--target", "--upgrade-strategy",
    "-c", "-f", "-i", "-r", "-t",
]

[[command.sub]]
name = "download"
standalone = [
    "--help", "--no-deps", "--pre", "--quiet",
    "--require-hashes", "--verbose",
    "-h", "-q", "-v",
]
valued = [
    "--constraint", "--dest", "--extra-index-url", "--find-links",
    "--index-url", "--no-binary", "--only-binary",
    "--platform", "--python-version", "--requirement",
    "-c", "-d", "-f", "-i", "-r",
]
