[[command]]
name = "poetry"
description = "Python dependency manager and build tool. poetry show is a read-only query that inspects installed packages; with --outdated or --latest it contacts PyPI over the network. poetry check validates pyproject.toml without modifying anything. env info and env list are read-only queries about local virtual environments. None of these subcommands install packages or execute arbitrary code. Actively maintained with regular releases."
url = "https://python-poetry.org/docs/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "show"
standalone = [
    "--all", "--help", "--latest", "--no-dev", "--outdated",
    "--top-level", "--tree",
    "-T", "-h", "-l", "-o",
]
valued = ["--why"]

[[command.sub]]
name = "check"
standalone = ["--help", "--lock", "-h"]

[[command.sub]]
name = "env"
[[command.sub.sub]]
name = "info"
standalone = ["--full-path", "--help", "-h"]
[[command.sub.sub]]
name = "list"
standalone = ["--full-path", "--help", "-h"]
