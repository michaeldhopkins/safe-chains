
[[command]]
name = "ruby"
url = "https://www.ruby-lang.org/en/documentation/"
level = "Inert"
bare = false
max_positional = 0
standalone = ["--help", "--version", "-V", "-h", "-v"]

[[command]]
name = "ri"
url = "https://ruby.github.io/rdoc/RI_md.html"
level = "Inert"
bare = true
standalone = ["--all", "--interactive", "--list", "--no-pager", "-a", "-i", "-l"]
valued = ["--format", "--width", "-f", "-w"]

[[command]]
name = "gem"
url = "https://guides.rubygems.org/command-reference/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "contents"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "dependency"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "environment"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "help"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "info"
standalone = ["--help", "--installed", "--prerelease", "-h", "-i"]
valued = ["--version", "-v"]

[[command.sub]]
name = "list"
standalone = [
    "--all", "--help", "--installed", "--local", "--no-details",
    "--no-versions", "--prerelease", "--remote", "--versions",
    "-a", "-d", "-h", "-i", "-l", "-r",
]

[[command.sub]]
name = "outdated"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "pristine"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "search"
standalone = [
    "--all", "--details", "--exact", "--help", "--local",
    "--prerelease", "--remote", "--versions",
    "-a", "-d", "-e", "-h", "-i", "-l", "-r",
]

[[command.sub]]
name = "sources"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "specification"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "stale"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command.sub]]
name = "which"
standalone = [
    "--all", "--help", "--local", "--prerelease", "--remote", "--versions",
    "-a", "-h", "-i", "-l", "-r",
]
valued = ["--version", "-v"]

[[command]]
name = "importmap"
url = "https://github.com/rails/importmap-rails"
bare_flags = ["--help", "-h"]

[[command.sub]]
name = "audit"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "json"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "outdated"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "packages"
standalone = ["--help", "-h"]
max_positional = 0

[[command]]
name = "rbenv"
url = "https://github.com/rbenv/rbenv#readme"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]

[[command.sub]]
name = "root"
standalone = ["--help", "-h"]

[[command.sub]]
name = "shims"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "versions"
standalone = ["--help", "-h"]

[[command.sub]]
name = "which"
standalone = ["--help", "-h"]

[[command]]
name = "bundle"
url = "https://bundler.io/man/bundle.1.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "check"
standalone = ["--dry-run", "--help", "-h"]
valued = ["--gemfile", "--path"]

[[command.sub]]
name = "config"
handler = "bundle_config"

[[command.sub]]
name = "exec"
handler = "bundle_exec"

[[command.sub]]
name = "info"
standalone = ["--help", "--path", "-h"]

[[command.sub]]
name = "list"
standalone = ["--help", "--name-only", "--paths", "-h"]

[[command.sub]]
name = "show"
standalone = ["--help", "--paths", "-h"]
