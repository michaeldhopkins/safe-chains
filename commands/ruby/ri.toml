[[command]]
name = "ri"
description = "Ruby documentation viewer; displays API docs for classes, modules, and methods from the terminal."
url = "https://ruby.github.io/rdoc/RI_md.html"
level = "Inert"
bare = true
standalone = ["--all", "--interactive", "--list", "--no-pager", "-a", "-i", "-l"]
valued = ["--format", "--width", "-f", "-w"]
