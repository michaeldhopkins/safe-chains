[[command]]
name = "atuin"
description = "Magical shell history. `search` queries history (read). `import auto/zsh/bash/fish` reads a shell history file and writes to atuin's local DB. `stats` shows aggregate counts. `sync`, `sync-status`, `register`, `login`, `logout`, `key`, `account` contact a sync server (network). `history start/end/list` modify the local DB. `daemon` runs a long-running background sync server. `init` prints shell init code. The carve-out covers read-only diagnostic forms."
url = "https://atuin.sh/"
researched_version = "v18.16.1 (2026-05-12)"
bare_flags = ["--help", "--version", "-h", "-V"]
examples_safe = [
    "atuin doctor",
    "atuin default-config",
    "atuin uuid",
    "atuin info",
    "atuin stats",
    "atuin search foo",
    "eval \"$(atuin init bash)\"",
    "eval \"$(atuin init zsh --disable-ctrl-r --disable-up-arrow)\"",
    "eval \"$(atuin init fish --disable-ai)\"",
]
examples_denied = [
    "atuin sync",
    "atuin login",
    "atuin import auto",
    "eval \"$(atuin init --help)\"",
    "eval \"$(atuin init bash --disable-ai=$VAR)\"",
    "eval \"$(atuin search foo)\"",
]

[[command.sub]]
name = "init"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--disable-ai", "--disable-ctrl-r", "--disable-up-arrow", "--help", "-h"]
eval_safe = true
eval_safe_flags = ["--disable-ai", "--disable-ctrl-r", "--disable-up-arrow"]

[[command.sub]]
name = "info"
level = "Inert"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "stats"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--help", "-h"]
valued = ["--count", "--ngram"]

[[command.sub]]
name = "search"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = [
    "--cmd-only", "--exit", "--exit",
    "--filter-mode", "--help",
    "--human", "--inline-height",
    "--interactive", "--keymap-mode",
    "--reverse", "--shell-up-key-binding",
    "--cwd", "--exclude-cwd", "--exclude-exit",
    "--exit", "--limit",
    "-h", "-i", "-r",
]
valued = [
    "--after", "--before", "--cmd-only",
    "--cwd", "--delete", "--delete-it-all",
    "--exit", "--filter-mode", "--format",
    "--limit", "--offset",
    "--search-mode", "--session",
    "--user",
    "-c", "-e", "-f",
]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

