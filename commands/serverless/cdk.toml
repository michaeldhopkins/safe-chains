candidate = true

[[command.sub]]
name = "metadata"
candidate = true

[[command.sub]]
name = "context"
candidate = true

[[command.sub]]
name = "drift"
candidate = true

[[command.sub]]
name = "acknowledge"
candidate = true

[[command.sub]]
name = "ack"
