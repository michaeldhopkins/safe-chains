[[command]]
name = "cal"
description = "Displays a calendar; supported with date selection, formatting, and range flags."
url = "https://man7.org/linux/man-pages/man1/cal.1.html"
level = "Inert"
bare = true
max_positional = 2
standalone = [
    "--help", "--monday", "--sunday", "--three", "--version", "--year",
    "-1", "-3", "-V", "-h", "-j", "-m", "-s", "-w", "-y",
]
valued = ["-A", "-B", "-d", "-n"]
