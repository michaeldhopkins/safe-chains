[[command]]
name = "findmnt"
description = "Lists mounted filesystems by reading /proc/self/mountinfo, /etc/mtab, or /etc/fstab. Read-only: it has no flag that mounts, unmounts, or otherwise modifies kernel state. Accepts an optional positional path (target mountpoint or source device) to filter the output. Ships with util-linux on Linux only; not available on macOS by default. Flag surface is very stable."
url = "https://man7.org/linux/man-pages/man8/findmnt.8.html"
researched_version = "util-linux 2.40 (2024)"
level = "Inert"
bare = true
max_positional = 1
standalone = [
    "--all", "--ascii", "--bytes", "--canonicalize", "--df",
    "--evaluate", "--first-only", "--fstab", "--help", "--invert",
    "--json", "--kernel", "--list", "--mtab", "--no-canonicalize",
    "--noheadings", "--notruncate", "--nofsroot", "--pairs", "--poll",
    "--raw", "--shell", "--submounts", "--verbose", "--verify",
    "--version",
    "-A", "-C", "-D", "-J", "-P", "-R", "-V",
    "-a", "-b", "-c", "-e", "-f", "-h", "-i", "-k", "-l", "-m",
    "-n", "-p", "-r", "-s", "-u", "-v", "-x", "-y",
]
valued = [
    "--direction", "--mountpoint", "--options", "--output",
    "--source", "--tab-file", "--target", "--task", "--timeout",
    "--types",
    "-F", "-M", "-N", "-O", "-S", "-T", "-d", "-o", "-t", "-w",
]
