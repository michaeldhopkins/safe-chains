[[command]]
name = "free"
description = "Displays system memory usage; supported with unit, format, and repeat-interval flags."
url = "https://man7.org/linux/man-pages/man1/free.1.html"
level = "Inert"
bare = true
max_positional = 0
standalone = [
    "--bytes", "--gibi", "--giga", "--help", "--human", "--kibi", "--kilo",
    "--lohi", "--mebi", "--mega", "--si", "--tebi", "--tera",
    "--total", "--version", "--wide",
    "-V", "-b", "-g", "-h", "-k", "-l", "-m", "-t", "-v", "-w",
]
valued = ["--count", "--seconds", "-c", "-s"]
