[[command]]
name = "htop"
description = "Interactive process viewer; supported with sort, filter, user, and display flags."
url = "https://htop.dev/"
level = "Inert"
bare = true
max_positional = 0
standalone = [
    "--help", "--no-color", "--no-mouse", "--no-unicode", "--tree", "--version",
    "-C", "-H", "-M", "-V", "-h", "-t",
]
valued = [
    "--delay", "--filter", "--highlight-changes", "--pid", "--sort-key", "--user",
    "-F", "-d", "-p", "-s", "-u",
]
