[[command]]
name = "id"
description = "Prints user and group identity information; supported with output-selection flags and one optional username."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#id-invocation"
level = "Inert"
bare = true
max_positional = 1
standalone = [
    "--context", "--group", "--groups", "--help", "--name",
    "--real", "--user", "--version", "--zero",
    "-G", "-V", "-Z", "-g", "-h", "-n", "-p", "-r", "-u", "-z",
]
