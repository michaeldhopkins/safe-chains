[[command]]
name = "lastlog"
description = "Reports most recent login for all users; supported with user, time, and before filters."
url = "https://man7.org/linux/man-pages/man8/lastlog.8.html"
level = "Inert"
bare = true
max_positional = 0
standalone = ["--help", "--version", "-V", "-h"]
valued = ["--before", "--time", "--user", "-b", "-t", "-u"]
