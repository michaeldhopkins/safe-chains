[[command]]
name = "procs"
description = "Modern process viewer with tree and color support; supported with sort, filter, and display flags."
url = "https://github.com/dalance/procs#readme"
level = "Inert"
bare = true
standalone = [
    "--help", "--no-header", "--or", "--tree", "--version", "--watch-interval",
    "-V", "-h", "-l", "-t",
]
valued = [
    "--color", "--completion", "--config", "--gen-completion",
    "--insert", "--only", "--pager", "--sorta", "--sortd", "--theme",
    "-i", "-w",
]
