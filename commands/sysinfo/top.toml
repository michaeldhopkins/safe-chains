[[command]]
name = "top"
description = "Real-time process and system resource monitor; supported with batch mode, sort, filter, and display flags."
url = "https://man7.org/linux/man-pages/man1/top.1.html"
level = "Inert"
bare = true
standalone = [
    "--help", "--version",
    "-1", "-B", "-E", "-H", "-S", "-V", "-b", "-c", "-e", "-h", "-i",
]
valued = ["-F", "-O", "-U", "-d", "-f", "-l", "-n", "-o", "-p", "-s", "-u", "-w"]
