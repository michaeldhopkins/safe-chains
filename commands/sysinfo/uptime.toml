[[command]]
name = "uptime"
description = "Shows how long the system has been running and load averages; supported with pretty and since flags."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#uptime-invocation"
level = "Inert"
bare = true
max_positional = 0
standalone = ["--help", "--pretty", "--since", "--version", "-V", "-h", "-p", "-s"]
