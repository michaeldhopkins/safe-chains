[[command]]
name = "w"
description = "Shows who is logged in and what they are doing; supported with header and format flags."
url = "https://man7.org/linux/man-pages/man1/w.1.html"
level = "Inert"
bare = true
max_positional = 1
standalone = [
    "--from", "--help", "--ip-addr", "--no-current", "--no-header",
    "--old-style", "--short", "--version",
    "-V", "-f", "-h", "-i", "-o", "-s", "-u",
]
