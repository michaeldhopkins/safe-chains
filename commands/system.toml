standalone = ["--help", "-h"]

[[command.sub]]
name = "quota"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "plugins"
standalone = ["--checksum", "--help", "--outdated", "-h"]

[[command.sub]]
name = "feature-flags"
standalone = ["--help", "-h"]

[[command.sub]]
name = "feature-flag"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "security-groups"
standalone = ["--help", "-h"]

[[command.sub]]
name = "security-group"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "logs"
bare = false
guard = "--recent"
standalone = ["--help", "--recent", "-h"]

[[command]]
name = "newrelic"
url = "https://github.com/newrelic/newrelic-cli"
bare_flags = ["--help", "--version", "-h"]
[command.wrapper]
standalone = ["--debug", "--trace"]
valued = ["--format", "--plain"]

[[command.sub]]
name = "version"

[[command.sub]]
name = "entity"
[[command.sub.sub]]
name = "search"
bare = false
positional_style = true
standalone = ["--help", "-h"]
valued = ["--fields-filter", "--type"]
[[command.sub.sub]]
name = "tags"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "nrql"
[[command.sub.sub]]
name = "query"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--query", "-a", "-q"]

[[command.sub]]
name = "apm"
[[command.sub.sub]]
name = "application"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--guid", "--name", "-a"]

[[command.sub]]
name = "workload"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--accountId", "-a"]
[[command.sub.sub]]
name = "get"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--guid", "-a"]

[[command.sub]]
name = "profile"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command]]
name = "pg_dump"
url = "https://www.postgresql.org/docs/current/app-pgdump.html"
level = "Inert"
bare = false
require_any = ["--schema-only", "-s"]
standalone = [
    "--help", "--no-comments", "--no-owner",
    "--no-privileges", "--no-tablespaces", "--schema-only",
    "--verbose", "--version",
    "-V", "-h", "-s", "-v",
]
valued = [
    "--dbname", "--encoding", "--file", "--format",
    "--host", "--port", "--schema", "--table",
    "--username",
    "-E", "-F", "-U", "-d", "-f", "-n", "-p", "-t",
]

[[command]]
name = "bazel"
url = "https://bazel.build/reference/command-line-reference"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "query"
bare = false
standalone = ["--help", "--keep_going", "--nohost_deps", "--noimplicit_deps", "--order_output", "-h", "-k"]
valued = ["--output", "--universe_scope"]

[[command.sub]]
name = "cquery"
bare = false
standalone = ["--help", "--keep_going", "-h", "-k"]
valued = ["--output", "--universe_scope"]

[[command.sub]]
name = "aquery"
bare = false
standalone = ["--help", "--keep_going", "-h", "-k"]
valued = ["--output", "--universe_scope"]

[[command.sub]]
name = "info"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command]]
name = "meson"
url = "https://mesonbuild.com/Commands.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "introspect"
standalone = [
    "--all", "--benchmarks", "--buildoptions", "--buildsystem-files",
    "--dependencies", "--help", "--installed",
    "--projectinfo", "--targets", "--tests",
    "-a", "-h",
]
valued = ["--backend", "--indent"]

[[command.sub]]
name = "configure"
standalone = ["--help", "-h"]

[[command.sub]]
name = "info"
standalone = ["--help", "-h"]

[[command]]
name = "ninja"
url = "https://ninja-build.org/manual.html"
level = "Inert"
bare = false
require_any = ["-t", "-n"]
standalone = [
    "--help", "--version", "-n", "-v", "-V",
    "-h",
]
valued = [
    "-C", "-f", "-j", "-k", "-l", "-t",
]
