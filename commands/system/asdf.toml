[[command]]
name = "asdf"
description = "Extendable tool version manager that manages per-project runtime versions via a plugin system and .tool-versions files. The covered subcommands (current, list, which, info, plugin list) are purely read-only queries against locally installed versions and plugin metadata with no side effects. Mutating operations like install, plugin add, and reshim are outside coverage. The plugin system is a security-relevant surface: plugins are arbitrary shell scripts fetched from third-party Git repos, and asdf does not pin plugin versions by default, so a compromised plugin can execute arbitrary code during install. The project releases infrequently and has a stable subcommand surface."
url = "https://asdf-vm.com/manage/commands.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "current"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]

[[command.sub]]
name = "info"
standalone = ["--help", "-h"]

[[command.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "which"
standalone = ["--help", "-h"]

[[command.sub]]
name = "plugin"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "plugin-list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "plugin-list-all"
standalone = ["--help", "-h"]
