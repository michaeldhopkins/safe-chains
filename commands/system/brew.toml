[[command]]
name = "brew"
description = "The macOS (and Linux) package manager that installs, upgrades, and removes software formulae and casks. The covered subcommands (list, info, search, deps, outdated, config, doctor, leaves, uses, tap-info, services list/info, bundle check/list, and dry-run variants of upgrade/cleanup) are read-only queries against the local package database and upstream metadata, performing no installations or filesystem modifications. The uncovered install, upgrade (without --dry-run), uninstall, and tap subcommands download and execute code from formula/cask definitions and modify /usr/local or /opt/homebrew. Homebrew releases frequently with patch versions every few weeks and minor versions every few months; new subcommands and flags appear regularly."
url = "https://docs.brew.sh/Manpage"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "list"
standalone = [
    "--cask", "--formula", "--full-name", "--help", "--multiple",
    "--pinned", "--versions",
    "-1", "-h", "-l", "-r", "-t",
]

[[command.sub]]
name = "ls"
standalone = [
    "--cask", "--formula", "--full-name", "--help", "--multiple",
    "--pinned", "--versions",
    "-1", "-h", "-l", "-r", "-t",
]

[[command.sub]]
name = "info"
standalone = [
    "--analytics", "--cask", "--formula", "--help", "--installed", "--json",
    "-h", "-v",
]
valued = ["--days"]

[[command.sub]]
name = "abv"
standalone = [
    "--analytics", "--cask", "--formula", "--help", "--installed", "--json",
    "-h", "-v",
]
valued = ["--days"]

[[command.sub]]
name = "search"
bare = false
standalone = [
    "--cask", "--closed", "--debian", "--desc", "--fedora",
    "--fink", "--formula", "--help", "--macports", "--open",
    "--opensuse", "--pull-request", "--repology", "--ubuntu",
    "-h",
]

[[command.sub]]
name = "deps"
standalone = [
    "--1", "--annotate", "--cask", "--direct", "--for-each",
    "--formula", "--full-name", "--graph", "--help", "--include-build",
    "--include-optional", "--include-test", "--installed", "--missing",
    "--skip-recommended", "--tree", "--union",
    "-h", "-n",
]

[[command.sub]]
name = "uses"
bare = false
standalone = [
    "--cask", "--formula", "--help", "--include-build", "--include-optional",
    "--include-test", "--installed", "--missing",
    "--recursive", "--skip-recommended",
    "-h",
]

[[command.sub]]
name = "outdated"
standalone = [
    "--cask", "--fetch-HEAD", "--formula", "--greedy",
    "--greedy-auto-updates", "--greedy-latest", "--help", "--json",
    "-d", "-h", "-q", "-v",
]

[[command.sub]]
name = "desc"
bare = false
standalone = [
    "--cask", "--description", "--eval-all", "--formula",
    "--help", "--name", "--search",
    "-d", "-h", "-n", "-s",
]

[[command.sub]]
name = "log"
bare = false
standalone = ["--cask", "--formula", "--help", "--oneline", "-1", "-h"]
valued = ["--max-count", "-n"]

[[command.sub]]
name = "cat"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "casks"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "config"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "doctor"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "formulae"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "home"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "leaves"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "shellenv"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "tap"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "--prefix"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "--repository"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "tap-info"
standalone = ["--help", "-h", "-q", "-v"]

[[command.sub]]
name = "services"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--json", "-h"]
[[command.sub.sub]]
name = "info"
bare = false
standalone = ["--all", "--help", "--json", "-h"]

[[command.sub]]
name = "upgrade"
guard = "--dry-run"
level = "Inert"
standalone = [
    "--cask", "--debug", "--dry-run", "--fetch-HEAD",
    "--formula", "--greedy", "--greedy-auto-updates",
    "--greedy-latest", "--help", "--quiet", "--verbose",
    "-d", "-h", "-n", "-q", "-v",
]

[[command.sub]]
name = "cleanup"
guard = "--dry-run"
level = "Inert"
standalone = [
    "--dry-run", "--help", "--prune", "--quiet", "--verbose",
    "-d", "-h", "-n", "-q", "-s", "-v",
]
valued = ["--prune-prefix"]

[[command.sub]]
name = "bundle"
[[command.sub.sub]]
name = "check"
standalone = ["--all", "--help", "--no-upgrade", "--verbose", "-h", "-v"]
valued = ["--file", "--global"]
[[command.sub.sub]]
name = "list"
standalone = ["--all", "--brews", "--casks", "--formula", "--help", "--taps", "--verbose", "--vscode", "-h", "-v"]
valued = ["--file", "--global"]
