[[command]]
name = "cx"
description = "Cloud 66's `cx` toolbelt (Go binary, replaces the archived Ruby `c66toolbelt`). Manages applications, servers, services, processes, containers, databases, env-vars, backups, gateways, and failover groups on the Cloud 66 PaaS. Read-only subcommands (stacks list, servers list, services list/info, processes list, containers list, backups list, env-vars list, jobs list, gateways list, failover-groups list, settings list, users list/show, tail, ssh_config, info) issue API queries over HTTPS without modifying remote state. The `config` subcommands (list, show, create, use, update, rename) operate only on the local profile file (typically ~/.cloud66/cx.json); `delete` is recorded as a candidate because removing a profile is irreversible from the CLI's perspective. Mutating operations include redeploy (deploy a stack), stacks restart/reboot/clear-caches, processes restart/pause/resume/scale, services restart/pause/resume/stop/scale, containers restart/stop, env-vars set, backups new/download, databases promote-replica/resync-replica, gateways add/remove/open/close, failover groups add/update/delete, jobs run, run (execute an arbitrary command on a remote server), servers reboot, settings set, stacks configuration apply/upload, tags add/delete, upload/download (file transfer to/from remote servers), ssh (interactive remote shell), and update (self-update the binary). The toolbelt updates itself silently on each invocation; release cadence from Cloud 66 is moderate. The `-s`/`--stack` flag is near-universal for targeting a stack."
url = "https://help.cloud66.com/rails/toolbelt/using-cloud66-toolbelt/"
researched_version = "Cloud 66 cx toolbelt (Go), self-updating; help.cloud66.com docs as of 2026-05-08"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "help"
allow_all = true

