[[command]]
name = "direnv"
description = "Shell extension that automatically loads and unloads environment variables when you enter or leave a directory, based on .envrc files. The security model requires explicit 'direnv allow' before any .envrc is executed, hashing the file contents so that modifications require re-approval -- this prevents drive-by code execution from cloned repos. The covered subcommands (status, version, export, fetchurl, hook) are diagnostic and informational: status prints internal state, version prints the binary version, export outputs the computed env diff for a given shell, fetchurl downloads a URL to stdout, and hook prints the per-shell hook function (canonical setup: `eval \"$(direnv hook bash)\"`). None of these execute .envrc files. The allow, deny, and edit subcommands are the state-modifying operations not covered here."
url = "https://direnv.net/"
researched_version = "v2.37.1 (2025-07-20)"
bare_flags = ["--help", "--version", "-h"]
examples_safe = [
    "eval \"$(direnv hook bash)\"",
    "eval \"$(direnv hook zsh)\"",
    "eval \"$(direnv hook fish)\"",
]
examples_denied = [
    "eval \"$(direnv hook --help)\"",
    "eval \"$(direnv hook $SHELL)\"",
    "eval \"$(direnv status)\"",
    "eval \"$(direnv export bash)\"",
]

[[command.sub]]
name = "status"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "export"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "fetchurl"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "hook"
bare = false
max_positional = 1
standalone = ["--help", "-h"]
eval_safe = true
