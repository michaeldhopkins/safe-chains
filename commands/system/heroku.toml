[[command]]
name = "heroku"
description = "Salesforce's Heroku PaaS CLI for deploying, scaling, and managing cloud applications, add-ons, and databases. The full CLI can push code, scale dynos, manage config vars, provision add-ons, run one-off processes, and access databases. The covered subcommands (addons, apps, apps:info, buildpacks, config, logs, ps, regions, releases, status) are read-only API queries over HTTPS that fetch application metadata, deployment history, process status, and log streams without modifying any remote state. The uncovered create, destroy, scale, config:set, addons:create, and run subcommands are the state-modifying operations. The CLI was updated to v11 in March 2026 with a modernized codebase; it auto-updates in the background every 4 hours."
url = "https://devcenter.heroku.com/articles/heroku-cli-commands"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "addons"
standalone = ["--all", "--help", "--json", "-A", "-h"]
valued = ["--app", "-a"]

[[command.sub]]
name = "apps"
standalone = ["--all", "--help", "--json", "-a", "-h"]
valued = ["--space", "--team", "-s", "-t"]

[[command.sub]]
name = "apps:info"
standalone = ["--help", "--json", "--shell", "-h", "-s"]
valued = ["--app", "-a"]

[[command.sub]]
name = "buildpacks"
standalone = ["--help", "-h"]
valued = ["--app", "-a"]

[[command.sub]]
name = "config"
standalone = ["--help", "--json", "--shell", "-h", "-j", "-s"]
valued = ["--app", "-a"]

[[command.sub]]
name = "logs"
standalone = ["--force-colors", "--help", "--tail", "-h", "-t"]
valued = ["--app", "--dyno", "--num", "--source", "-a", "-d", "-n", "-s"]

[[command.sub]]
name = "ps"
standalone = ["--help", "--json", "-h", "-j"]
valued = ["--app", "-a"]

[[command.sub]]
name = "regions"
standalone = ["--help", "--json", "-h"]

[[command.sub]]
name = "releases"
standalone = ["--help", "--json", "-h", "-j"]
valued = ["--app", "--num", "-a", "-n"]

[[command.sub]]
name = "status"
standalone = ["--help", "--json", "-h"]
