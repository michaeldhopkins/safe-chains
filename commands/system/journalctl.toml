[[command]]
name = "journalctl"
description = "systemd's journal query utility for reading structured binary logs from the kernel, services, and user applications. journalctl is fundamentally a read-only tool -- it queries the journal's indexed binary log files with filtering by time range, boot session, unit, priority, and structured fields. It does not modify system state. The --vacuum-size and --vacuum-time flags (not covered here) can delete old log entries. The --verify flag checks journal file integrity. The -f (follow) mode streams new log entries in real-time. All operations are local; no network calls are made unless --machine is used to query a remote systemd host over SSH. The interface is stable and tied to systemd releases."
url = "https://man7.org/linux/man-pages/man1/journalctl.1.html"
level = "Inert"
bare = true
standalone = [
    "--all", "--catalog", "--disk-usage", "--dmesg",
    "--full", "--header", "--help", "--json", "--list-boots",
    "--list-catalog", "--list-fields", "--merge", "--no-full",
    "--no-hostname", "--no-pager", "--no-tail", "--quiet",
    "--reverse", "--system", "--this-boot", "--user",
    "--utc", "--verify", "--version",
    "-a", "-b", "-f", "-h", "-k", "-l", "-m", "-q", "-r", "-x",
]
valued = [
    "--after-cursor", "--boot", "--cursor", "--directory",
    "--facility", "--field", "--file", "--identifier",
    "--lines", "--machine", "--output", "--priority",
    "--since", "--unit", "--until", "--user-unit",
    "-D", "-F", "-M", "-S", "-U", "-g", "-n", "-o", "-p", "-t", "-u",
]
