[[command]]
name = "koyeb"
description = "Koyeb's PaaS CLI (Go, github.com/koyeb/koyeb-cli) for managing apps, services, deployments, instances, secrets, regions, and domains on the Koyeb platform via its HTTPS API. Resource-oriented structure (`koyeb <RESOURCE> <ACTION>`) with persistent flags accepted at any level: --config/-c, --output/-o, --debug/-d, --debug-full, --force-ascii, --full, --url, --token, --organization. The list/get/describe actions across apps, services, deployments, instances, regions, secrets, and domains issue API queries that return JSON/YAML/table representations of remote state without touching it; deployments logs and services logs stream historical and tailed log lines. login runs an interactive browser-token exchange and writes the resulting API token to the YAML config file at $HOME/.koyeb.yaml (or $KOYEB_CONFIG, or whatever --config points at). The state-modifying surface (apps create/update/delete/pause/resume, services create/update/delete/redeploy/scale/pause/resume, secrets create/update/delete/reveal, domains create/delete/attach/detach/refresh, deployments cancel) talks to the production control plane and rolls user code; instances exec/cp and services exec open or stream against running customer containers. The CLI sees frequent commits (multiple a month on master) with new sandbox/compose/database/volume/snapshot resource verbs added throughout 2025-2026; the documented flag surface for read actions has been stable but expects a follow-up tightening once verbatim --help is captured from a pinned release."
url = "https://www.koyeb.com/docs/build-and-deploy/cli"
researched_version = "github.com/koyeb/koyeb-cli @ master, 2026-05-08 (Go)"
bare_flags = ["--help", "--version", "-h", "-v"]

[command.wrapper]
standalone = ["--debug", "--debug-full", "--force-ascii", "--full", "-d"]
valued = ["--config", "--organization", "--output", "--token", "--url", "-c", "-o"]

