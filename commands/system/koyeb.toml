[[command]]
name = "koyeb"
description = "Koyeb's PaaS CLI (Go, github.com/koyeb/koyeb-cli) for managing apps, services, deployments, instances, secrets, regions, and domains on the Koyeb platform via its HTTPS API. Resource-oriented structure (`koyeb <RESOURCE> <ACTION>`) with persistent flags accepted at any level: --config/-c, --output/-o, --debug/-d, --debug-full, --force-ascii, --full, --url, --token, --organization. The list/get/describe actions across apps, services, deployments, instances, regions, secrets, and domains issue API queries that return JSON/YAML/table representations of remote state without touching it; deployments logs and services logs stream historical and tailed log lines. login runs an interactive browser-token exchange and writes the resulting API token to the YAML config file at $HOME/.koyeb.yaml (or $KOYEB_CONFIG, or whatever --config points at). The state-modifying surface (apps create/update/delete/pause/resume, services create/update/delete/redeploy/scale/pause/resume, secrets create/update/delete/reveal, domains create/delete/attach/detach/refresh, deployments cancel) talks to the production control plane and rolls user code; instances exec/cp and services exec open or stream against running customer containers. The CLI sees frequent commits (multiple a month on master) with new sandbox/compose/database/volume/snapshot resource verbs added throughout 2025-2026; the documented flag surface for read actions has been stable but expects a follow-up tightening once verbatim --help is captured from a pinned release."
url = "https://www.koyeb.com/docs/build-and-deploy/cli"
researched_version = "github.com/koyeb/koyeb-cli @ master, 2026-05-08 (Go)"
bare_flags = ["--help", "--version", "-h", "-v"]
examples_safe = [
    "koyeb apps list",
    "koyeb app list",
    "koyeb a list",
    "koyeb deployments list",
    "koyeb deployment list",
    "koyeb dep list",
    "koyeb d list",
    "koyeb services list",
    "koyeb service list",
    "koyeb svc list",
    "koyeb s list",
    "koyeb instances list",
    "koyeb instance list",
    "koyeb inst list",
    "koyeb i list",
    "koyeb secrets list",
    "koyeb secret list",
    "koyeb sec list",
    "koyeb domains list",
    "koyeb domain list",
    "koyeb dom list",
    "koyeb regions list",
    "koyeb region list",
    "koyeb organizations list",
    "koyeb organization list",
    "koyeb org list",
]
examples_denied = [
    "koyeb apps create my-app",
    "koyeb services delete svc-1",
    "koyeb secrets reveal API_KEY",
    "koyeb instances exec inst-1 -- /bin/sh",
]

[command.wrapper]
standalone = ["--debug", "--debug-full", "--force-ascii", "--full", "-d"]
valued = ["--config", "--organization", "--output", "--token", "--url", "-c", "-o"]

[[command.sub]]
name = "login"
level = "SafeWrite"
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]

[[command.sub]]
name = "whoami"
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]

[[command.sub]]
name = "apps"
aliases = ["app", "a"]
nested_bare = true
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]
[[command.sub.sub]]
name = "get"
bare = false
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]
[[command.sub.sub]]
name = "describe"
bare = false
standalone = ["--help", "-h"]
valued = ["--organization", "--output", "--token", "--url", "-o"]
[[command.sub.sub]]
name = "create"
profile = "remote-create"
fact = "Creates a new application (an empty container for services) on the Koyeb control plane via the HTTPS API."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps create`"
[[command.sub.sub]]
name = "init"
profile = "remote-create"
fact = "Creates an application AND its first service in one call, deploying from a git repo or container image."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps init`"
[[command.sub.sub]]
name = "update"
profile = "remote-mutate"
fact = "Updates an existing application's settings on Koyeb via the API; the app keeps running."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps update`"
[[command.sub.sub]]
name = "delete"
profile = "remote-destroy-recoverable"
fact = "Deletes the named application and all its services and deployments from Koyeb."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps delete`"
judgment = "Classified recoverable, not irreversible: the app definition can be recreated and redeployed from source. Any app-held DATA (a managed database's contents) would make a specific sub irreversible — that lives on the addons/database subs, not here."
[[command.sub.sub]]
name = "pause"
profile = "remote-control"
fact = "Pauses the application — stops its running services without deleting them; resumable."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps pause`"
[[command.sub.sub]]
name = "resume"
profile = "remote-control"
fact = "Resumes a paused application, restarting its services."
source = "https://www.koyeb.com/docs/reference/cli — `koyeb apps resume`"

