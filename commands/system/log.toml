[[command]]
name = "log"
description = "macOS unified logging system CLI (/usr/bin/log) for querying Apple's binary log store, which aggregates messages from the kernel, system services, and applications across all Apple platforms. The show subcommand queries historical logs with predicate-based filtering; stream provides real-time log output; stats reports log store statistics. All three are read-only operations against the local log archive. The uncovered collect subcommand can write .logarchive files to disk, and config can adjust logging levels. Logs may contain sensitive system data but are read from existing stores, not generated. Privacy-sensitive fields are redacted by default (shown as <private>). The interface ships with macOS and evolves with OS releases."
url = "https://ss64.com/mac/log.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "show"
standalone = [
    "--backtrace", "--debug", "--help", "--info", "--loss", "--mach-continuous-time",
    "--no-pager", "--signpost", "-h",
]
valued = [
    "--color", "--end", "--last", "--predicate",
    "--process", "--source", "--start", "--style", "--type",
]

[[command.sub]]
name = "stream"
standalone = [
    "--backtrace", "--debug", "--help", "--info", "--loss",
    "--mach-continuous-time", "--signpost", "-h",
]
valued = [
    "--color", "--level", "--predicate", "--process",
    "--source", "--style", "--timeout", "--type",
]

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]

[[command.sub]]
name = "stats"
standalone = ["--help", "-h"]
