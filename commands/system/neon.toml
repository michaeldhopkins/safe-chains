[[command]]
name = "neon"
aliases = ["neonctl"]
description = "Neon CLI — managed Postgres. Most subcommands contact Neon's API (network). Read-side: `version`, `me`, `auth`, `projects list/get`, `branches list/get`, `databases list`, `roles list`, `connection-string`, `endpoints list`, `set-context`. Write-side: `auth`, `projects create/delete/update`, `branches create/delete/reset/restore`, `databases create/delete`, `roles create/delete`, `endpoints create/delete/restart`, `org create/delete`, `set-context`."
url = "https://neon.tech/docs/reference/neon-cli"
researched_version = "neonctl 2.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

