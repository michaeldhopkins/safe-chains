[[command]]
name = "newrelic"
description = "New Relic's observability platform CLI for managing entities, workloads, dashboards, alerts, and deployment markers across the New Relic ecosystem. The full CLI can create and modify alert policies, record deployment markers, manage tags, and configure workloads. The covered subcommands (entity search/tags, nrql query, apm application, workload list/get, profile list, version) are read-only queries that search monitored entities, execute NRQL analytics queries, inspect APM application data, list workloads, and show configured profiles -- all over HTTPS to New Relic's API. They do not create, modify, or delete any New Relic resources. The uncovered entity tags create/delete, workload create, and deployment marker subcommands are the state-modifying operations."
url = "https://github.com/newrelic/newrelic-cli"
bare_flags = ["--help", "--version", "-h"]
[command.wrapper]
standalone = ["--debug", "--trace"]
valued = ["--format", "--plain"]

[[command.sub]]
name = "version"

[[command.sub]]
name = "entity"
[[command.sub.sub]]
name = "search"
bare = false
positional_style = true
standalone = ["--help", "-h"]
valued = ["--fields-filter", "--type"]
[[command.sub.sub]]
name = "tags"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "nrql"
[[command.sub.sub]]
name = "query"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--query", "-a", "-q"]

[[command.sub]]
name = "apm"
[[command.sub.sub]]
name = "application"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--guid", "--name", "-a"]

[[command.sub]]
name = "workload"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--accountId", "-a"]
[[command.sub.sub]]
name = "get"
bare = false
standalone = ["--help", "-h"]
valued = ["--accountId", "--guid", "-a"]

[[command.sub]]
name = "profile"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
