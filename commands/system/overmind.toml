[[command]]
name = "overmind"
description = "Process manager for Procfile-based applications that runs each process in a separate tmux window, allowing interactive access and per-process restart. The start subcommand launches all processes defined in the Procfile, which can be arbitrary commands; connect attaches to a process's tmux session granting interactive shell access; restart and stop control individual process lifecycle; kill and quit terminate the entire overmind session; run executes an ad-hoc command in the overmind environment. All of these modify local process state. The status subcommand reports running process status, echo shows captured process output, and help displays subcommand documentation -- all read-only. The project is mature with infrequent releases and a stable interface."
url = "https://github.com/DarthSim/overmind"
researched_version = "v2.5.1 (latest as of 2026-05; flag surface stable for years)"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "connect"
level = "SafeWrite"
bare = false
standalone = ["--control-mode", "--help", "-c", "-h"]
valued = ["--network", "--socket", "-S", "-s"]

[[command.sub]]
name = "echo"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]
max_positional = 0

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]
max_positional = 1

[[command.sub]]
name = "kill"
level = "SafeWrite"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]
max_positional = 0

[[command.sub]]
name = "quit"
level = "SafeWrite"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]
max_positional = 0

[[command.sub]]
name = "restart"
level = "SafeWrite"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]

[[command.sub]]
name = "run"
candidate = true

[[command.sub]]
name = "start"
level = "SafeWrite"
standalone = [
    "--any-can-die", "--daemonize", "--help", "--no-port", "--show-timestamps",
    "-D", "-N", "-T", "-h",
]
valued = [
    "--auto-restart", "--can-die", "--colors", "--formation",
    "--formation-port-step", "--ignored-processes", "--network",
    "--port", "--port-step", "--procfile", "--processes", "--root",
    "--shell", "--socket", "--stop-signals", "--timeout",
    "--title", "--tmux-config",
    "-F", "-H", "-P", "-S",
    "-b", "-c", "-d", "-f", "-i", "-l", "-m", "-p", "-r", "-s", "-t", "-w", "-x",
]
max_positional = 0

[[command.sub]]
name = "status"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]
max_positional = 0

[[command.sub]]
name = "stop"
level = "SafeWrite"
standalone = ["--help", "-h"]
valued = ["--network", "--socket", "-S", "-s"]
