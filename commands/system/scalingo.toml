[[command]]
name = "scalingo"
description = "Scalingo's PaaS CLI (Go, github.com/Scalingo/cli) for Heroku-style application, addon, and database management on the Scalingo platform. The command targets a remote app via the global --app/-a flag (or a detected git remote) and an optional --region; auth is held in the local config under ~/.config/scalingo. Read-only subcommands (apps, apps-info, domains, domains-ssl, env, env-get, addons, addons-info, addons-config, addons-list, addons-plans, deployments, deployment-logs, logs, logs-archives, ps, stats, regions, releases, keys, integration-link, review-apps, notifiers, notifiers-details, notification-platforms, alerts, autoscalers, log-drains, cron-tasks, projects, projects-details, collaborators, stacks, backups, backup-download, integrations, self/whoami, version, changelog) issue HTTPS API queries against the Scalingo control plane and stream/print results without modifying remote state. login performs a credential or SSH/token exchange and writes the resulting session token to the local config file. The mutating surface includes deploy/git-setup/git-show (push code), restart/scale/send-signal/sticky-session/force-https/router-logs/canonical-domain (mutate routing), env-set/env-unset/domains-add/domains-remove/keys-add/keys-remove (rotate credentials), addons-add/addons-remove/addons-upgrade/database-* (provision/destroy paid resources), backups-create (run a backup), alerts/autoscalers/log-drains/notifiers/notification-platforms/integration-link/review-apps create-update-remove (mutate platform config), projects/collaborators/stacks/integrations create-update-remove, and one-off-stop. CRITICALLY, scalingo run (alias r) runs an arbitrary command inside a remote one-off container with the application environment loaded — not a local env-loading wrapper — so it executes user code on Scalingo infrastructure with the live app secrets attached; bash, dbtunnel, db-tunnel, mongo-console, mysql-console, pgsql-console, redis-console, influxdb-console, and ssh likewise open interactive remote shells against running containers or managed databases. The CLI tracks the v11 platform API and ships incremental releases on master; verbatim flag surfaces below were captured from cmd/*.go and may need a follow-up tightening sweep once a release is pinned."
url = "https://doc.scalingo.com/platform/cli/start"
researched_version = "github.com/Scalingo/cli @ master, 2026-05-06 (Go)"
bare_flags = ["--help", "--version", "-h", "-v"]

[command.wrapper]
valued = ["--addon", "--app", "--database", "--region", "-a"]

[[command.sub]]
name = "login"
level = "SafeWrite"
standalone = ["--help", "--password-only", "--ssh", "-h"]
valued = ["--addon", "--api-token", "--app", "--database", "--region", "--ssh-identity", "-a"]

