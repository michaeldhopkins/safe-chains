[[command]]
name = "supabase"
description = "Supabase CLI — managed Postgres + Auth + Storage + Edge Functions. Most subcommands contact Supabase Cloud or run a local stack via Docker. Read-side: `version`, `status`, `projects list`, `orgs list`, `domains get`, `migration list/squash`, `branches list/get`, `services list/show`, `inspect db`, `inspect db query`, `network-bans list`, `secrets list`. Write-side: `init`, `start`, `stop`, `link`, `unlink`, `login`, `logout`, `db push`, `db pull`, `db reset`, `db dump`, `db diff`, `migration new`, `secrets set/unset`, `functions deploy/serve/new/delete`, `storage cp`."
url = "https://supabase.com/docs/reference/cli/introduction"
researched_version = "supabase 1.x"
bare_flags = ["--help", "--version", "-h", "-v"]
examples_safe = [
    "supabase status",
    "supabase version",
]
examples_denied = [
    "supabase start",
    "supabase db reset",
    "supabase functions deploy myfunc",
]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

