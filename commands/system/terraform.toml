[[command]]
name = "terraform"
description = "Infrastructure-as-code CLI that provisions and manages cloud resources via declarative configuration files. The full CLI has a very large blast radius: plan, apply, and destroy create, modify, or delete real infrastructure and can trigger arbitrary provider-defined operations. init downloads provider plugins from the network. Read-only subcommands (validate, output, show, state list/show, graph, providers, version) inspect local state and configuration without modifying infrastructure. fmt reformats files in place unless --check is passed, in which case it only reports drift. Terraform releases roughly quarterly with occasional new subcommands (e.g. terraform stacks in v1.13)."
url = "https://developer.hashicorp.com/terraform/cli/commands"
bare_flags = ["--help", "--version", "-V", "-h"]

examples_safe = [
  "terraform fmt",
  "terraform fmt -recursive",
  "terraform fmt --recursive",
  "terraform fmt --check",
  "terraform fmt -check -diff",
  "terraform validate",
  "terraform version",
]
examples_denied = [
  "terraform apply",
  "terraform destroy",
  "terraform plan",
]

# `terraform fmt` rewrites `.tf` files in place (unless -check/-diff,
# which only report drift). A local file rewrite in the working tree —
# no network, no state. Go's flag parser accepts both `-foo` and `--foo`.
[[command.sub]]
name = "fmt"
level = "SafeWrite"
standalone = [
  "--check", "-check", "--diff", "-diff", "--help", "-help",
  "--no-color", "-no-color", "--recursive", "-recursive", "-h",
]

[[command.sub]]
name = "graph"
standalone = ["--draw-cycles", "--help", "-h"]
valued = ["--plan", "--type"]

[[command.sub]]
name = "output"
standalone = ["--help", "--json", "--no-color", "--raw", "-h"]
valued = ["--state"]

[[command.sub]]
name = "providers"
standalone = ["--help", "-h"]

[[command.sub]]
name = "show"
standalone = ["--help", "--json", "--no-color", "-h"]

[[command.sub]]
name = "state"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
valued = ["--id", "--state"]
[[command.sub.sub]]
name = "show"
bare = false
standalone = ["--help", "-h"]
valued = ["--state"]

[[command.sub]]
name = "validate"
standalone = ["--help", "--json", "--no-color", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "--json", "-h"]
