[[command]]
name = "vagrant"
description = "Virtual machine lifecycle management tool that wraps providers like VirtualBox, VMware, and libvirt. Write subcommands (up, halt, destroy, provision, reload, snapshot, ssh -- not listed here) create, start, stop, destroy, and execute code inside VMs. ssh and provision can run arbitrary commands on the guest. Read-only subcommands (status, global-status, ssh-config, port, validate, version, box list/outdated, plugin list) query local VM state, Vagrantfile validity, and installed plugins/boxes without side effects. global-status --prune is a subtle exception: it removes stale entries from Vagrant's index. Vagrant's development has slowed considerably under HashiCorp/IBM; releases are infrequent (a handful of 2.4.x patches per year)."
url = "https://developer.hashicorp.com/vagrant/docs/cli"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "status"
standalone = ["--help", "--machine-readable", "-h"]

[[command.sub]]
name = "global-status"
standalone = ["--help", "--machine-readable", "--prune", "-h"]

[[command.sub]]
name = "ssh-config"
standalone = ["--help", "-h"]
valued = ["--host"]

[[command.sub]]
name = "port"
standalone = ["--guest", "--help", "-h"]

[[command.sub]]
name = "validate"
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "box"
[[command.sub.sub]]
name = "list"
standalone = ["--box-info", "--help", "-h", "-i"]
[[command.sub.sub]]
name = "outdated"
standalone = ["--global", "--help", "-h"]

[[command.sub]]
name = "plugin"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]
