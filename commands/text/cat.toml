[[command]]
name = "cat"
aliases = ["gcat"]
description = "Concatenates files and writes to stdout. Purely read-only: reads input files sequentially and never modifies them. Output destination is controlled by shell redirection, not by cat itself. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#cat-invocation"
level = "Inert"
bare = true
standalone = [
    "-A", "-E", "-T", "-V", "-b", "-e", "-h", "-l", "-n", "-s", "-t", "-u", "-v",
    "--help", "--number", "--number-nonblank", "--show-all", "--show-ends",
    "--show-nonprinting", "--show-tabs", "--squeeze-blank", "--version",
]
examples_safe = ["cat README.md", "cat src/main.rs", "cat ./notes.txt"]

# Declarative facet behavior: cat OBSERVES each positional (a read whose content flows to the
# model), gated per-operand by locus so `cat ~/.ssh/id_rsa` denies. No network, exec, or
# secret write — those facets come from the `observe`/`reads_content` builder. Replaces the
# hardcoded `resolve_cat`.
[command.behavior]
operation = "observe"
positionals = "read"
standalone = [
    "-A", "-b", "-e", "-E", "-n", "-s", "-t", "-T", "-u", "-v",
    "--number", "--number-nonblank", "--show-all", "--show-ends",
    "--show-nonprinting", "--show-tabs", "--squeeze-blank", "--help", "--version",
]
