[[command]]
name = "cat"
description = "Concatenates files and writes to stdout. Purely read-only: reads input files sequentially and never modifies them. Output destination is controlled by shell redirection, not by cat itself. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#cat-invocation"
level = "Inert"
bare = true
standalone = [
    "-A", "-E", "-T", "-V", "-b", "-e", "-h", "-l", "-n", "-s", "-t", "-u", "-v",
    "--help", "--number", "--number-nonblank", "--show-all", "--show-ends",
    "--show-nonprinting", "--show-tabs", "--squeeze-blank", "--version",
]
