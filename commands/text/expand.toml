[[command]]
name = "expand"
description = "Converts tabs to spaces in input text. Read-only stdin-to-stdout filter; never modifies files on disk. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#expand-invocation"
level = "Inert"
bare = true
standalone = ["-V", "-h", "-i", "--help", "--initial", "--version"]
valued = ["-t", "--tabs"]
