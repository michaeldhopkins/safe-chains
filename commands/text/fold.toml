[[command]]
name = "fold"
description = "Wraps input lines to a specified width by inserting newlines. Read-only stdin-to-stdout filter; never modifies files on disk. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#fold-invocation"
level = "Inert"
bare = true
standalone = ["-V", "-b", "-h", "-s", "--bytes", "--help", "--spaces", "--version"]
valued = ["-w", "--width"]
