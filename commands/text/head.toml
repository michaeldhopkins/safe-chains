[[command]]
name = "head"
aliases = ["ghead"]
description = "Outputs the first part (lines or bytes) of files. Purely read-only: reads input and writes a prefix to stdout without modifying source files. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#head-invocation"
level = "Inert"
bare = true
numeric_dash = true
standalone = [
    "-V", "-h", "-q", "-v", "-z",
    "--help", "--quiet", "--silent", "--verbose", "--version", "--zero-terminated",
]
valued = ["-c", "-n", "--bytes", "--lines"]
examples_safe = ["head README.md", "head -n 20 src/main.rs", "head -20 src/main.rs"]

# Declarative facet behavior: head OBSERVES a bounded prefix of each file (content → the model),
# gated per-operand by locus. Same observe/read shape as cat; `-c`/`-n` and the obsolete `-NUM`
# count form take a value. Replaces `resolve_head`.
[command.behavior]
operation = "observe"
positionals = "read"
numeric_shorthand = true
standalone = [
    "-V", "-h", "-q", "-v", "-z",
    "--help", "--quiet", "--silent", "--verbose", "--version", "--zero-terminated",
]
valued = ["-c", "-n", "--bytes", "--lines"]
