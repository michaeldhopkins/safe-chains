[[command]]
name = "nl"
description = "Adds line numbers to input text, with configurable numbering styles for header, body, and footer sections. Read-only stdin-to-stdout filter; never modifies files on disk. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#nl-invocation"
level = "Inert"
bare = true
standalone = ["-V", "-p", "--help", "--no-renumber", "--version"]
valued = [
    "-b", "-d", "-f", "-h", "-i", "-l", "-n", "-s", "-v", "-w",
    "--body-numbering", "--footer-numbering", "--header-numbering",
    "--join-blank-lines", "--line-increment", "--number-format",
    "--number-separator", "--number-width", "--section-delimiter",
    "--starting-line-number",
]
