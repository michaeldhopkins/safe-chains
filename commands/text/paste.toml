[[command]]
name = "paste"
description = "Merges lines from multiple files side by side, joining corresponding lines with a delimiter. Purely read-only: reads input files and writes merged output to stdout without modifying source files. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#paste-invocation"
level = "Inert"
bare = true
standalone = ["-V", "-h", "-s", "-z", "--help", "--serial", "--version", "--zero-terminated"]
valued = ["-d", "--delimiters"]
