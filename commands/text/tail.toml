[[command]]
name = "tail"
description = "Outputs the last part (lines or bytes) of files, with an option to follow appended data in real time (-f/--follow). Read-only: never modifies the files it reads. The --follow mode keeps a file descriptor open for ongoing reads but still performs no writes. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#tail-invocation"
level = "Inert"
bare = true
numeric_dash = true
standalone = [
    "-F", "-V", "-f", "-h", "-q", "-r", "-v", "-z",
    "--follow", "--help", "--quiet", "--retry", "--silent",
    "--verbose", "--version", "--zero-terminated",
]
valued = ["-b", "-c", "-n", "--bytes", "--lines", "--max-unchanged-stats", "--pid", "--sleep-interval"]
