[[command]]
name = "unexpand"
description = "Converts spaces to tabs in input text. Read-only stdin-to-stdout filter; never modifies files on disk. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#unexpand-invocation"
level = "Inert"
bare = true
standalone = ["-V", "-a", "-h", "--all", "--first-only", "--help", "--version"]
valued = ["-t", "--tabs"]
