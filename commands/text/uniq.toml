[[command]]
name = "uniq"
description = "Filters or counts adjacent duplicate lines in sorted input. Read-only: reads from stdin or a file and writes deduplicated output to stdout. Can write to an output file if given a second positional argument, but never modifies the input file. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#uniq-invocation"
level = "Inert"
bare = true
max_positional = 1
standalone = [
    "-D", "-V", "-c", "-d", "-h", "-i", "-u", "-z",
    "--count", "--help", "--ignore-case", "--repeated",
    "--unique", "--version", "--zero-terminated",
]
valued = [
    "-f", "-s", "-w",
    "--all-repeated", "--check-chars", "--group",
    "--skip-chars", "--skip-fields",
]
