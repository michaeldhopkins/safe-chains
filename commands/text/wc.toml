[[command]]
name = "wc"
aliases = ["gwc"]
description = "Counts lines, words, characters, and bytes in input files. Purely read-only: reads input and writes counts to stdout without modifying source files. Part of GNU coreutils, which releases roughly every 6-12 months; the interface has been stable for decades."
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#wc-invocation"
level = "Inert"
bare = true
standalone = [
    "-L", "-V", "-c", "-h", "-l", "-m", "-w",
    "--bytes", "--chars", "--help", "--lines",
    "--max-line-length", "--version", "--words", "--zero-terminated",
]
valued = ["--files0-from"]
examples_safe = ["wc -l src/main.rs", "wc -w README.md"]

# Declarative facet behavior: wc OBSERVES each file to count it (content → the model), gated
# per-operand by locus. `--files0-from` is deliberately OMITTED from the behavior grammar so it
# hits an unrecognized flag and worst-cases — it reads an unpinnable set of files named by
# another file, which locus gating can't bound. Replaces `resolve_wc`.
[command.behavior]
operation = "observe"
positionals = "read"
standalone = [
    "-L", "-V", "-c", "-l", "-m", "-w",
    "--bytes", "--chars", "--help", "--lines",
    "--max-line-length", "--version", "--words", "--zero-terminated",
]
