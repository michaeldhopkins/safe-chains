[[command]]
name = "zcat"
description = "Decompresses gzip-compressed files and writes the uncompressed data to stdout (equivalent to gunzip -c). Purely read-only: never modifies or removes the compressed source files, unlike gunzip. Part of GNU gzip, which releases very infrequently (1.14 released February 2025); the interface has been stable for decades."
url = "https://man7.org/linux/man-pages/man1/zcat.1.html"
level = "Inert"
bare = true
aliases = ["gzcat"]
standalone = ["-V", "-f", "-h", "-q", "-v", "--force", "--help", "--quiet", "--verbose", "--version"]
