[[command]]
name = "@asyncapi/cli"
description = "CLI for working with AsyncAPI specification documents. The validate and diff subcommands parse documents and report conformance errors or differences to stdout without modifying files. Actively maintained with frequent releases."
url = "https://www.asyncapi.com/docs/tools/cli"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "validate"
level = "SafeRead"
bare = false
standalone = [
    "--help", "--log-diagnostics",
    "--no-log-diagnostics", "--score",
    "--suppressAllWarnings", "--suppressWarnings",
    "-h",
]
valued = [
    "--diagnostics-format", "--fail-severity",
    "--proxyHost", "--proxyPort",
]

[[command.sub]]
name = "diff"
level = "SafeRead"
bare = false
standalone = [
    "--help", "--log-diagnostics",
    "--no-log-diagnostics",
    "-h",
]
valued = [
    "--diagnostics-format", "--fail-severity",
    "--format", "--type",
    "-f", "-t",
]
