[[command]]
name = "black"
description = "Opinionated Python code formatter. In default mode it rewrites files in place; --check exits non-zero on unformatted files and --diff prints a unified diff, both without modifying anything. Maintained under the Python Software Foundation with regular annual-style releases."
url = "https://black.readthedocs.io/en/stable/usage_and_configuration/the_basics.html"
level = "Inert"
bare = false
require_any = ["--check", "--diff"]
standalone = [
    "--check", "--diff", "--color", "--no-color",
    "--fast", "--quiet", "--verbose",
    "--help", "--version",
]
valued = [
    "--config", "--exclude", "--extend-exclude",
    "--include", "--line-length", "--target-version",
    "-l", "-t",
]
