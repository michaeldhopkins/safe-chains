[[command]]
name = "bw"
description = "Bitwarden CLI — manages Bitwarden vault items. Every meaningful subcommand contacts the Bitwarden server over the network. `list`, `get`, `status`, `fingerprint`, `template`, `pending` are read-only. `sync` syncs local state with the server. `lock`, `unlock`, `login`, `logout` change session state. `create`, `edit`, `delete`, `restore`, `move`, `share`, `confirm`, `import`, `export` mutate vault data."
url = "https://bitwarden.com/help/cli/"
researched_version = "bw 2025.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "status"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "fingerprint"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "list"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--organizationid", "--pretty", "--quiet", "--raw", "--response", "--session", "--trash", "-h"]
valued = ["--collectionid", "--folderid", "--nointeraction", "--organizationid", "--search", "--session", "--url"]

[[command.sub]]
name = "get"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--pretty", "--raw", "--response", "-h"]
valued = ["--itemid", "--organizationid", "--output", "--session"]
write_flags = ["--output"]

[[command.sub]]
name = "template"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "--pretty", "-h"]

[[command.sub]]
name = "encode"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "pending"
level = "SafeRead"
bare = false
tolerate_unknown_short = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = true
standalone = ["--help", "-h"]
valued = ["--shell"]

[[command.sub]]
name = "help"
allow_all = true

