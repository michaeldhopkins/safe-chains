[[command]]
name = "cucumber"
description = "BDD test runner that executes scenarios written in Gherkin plain-language feature files. Reads feature files and step definitions, runs tests, and reports results to stdout. Can execute arbitrary code through step definition glue. Actively maintained with frequent releases."
url = "https://cucumber.io/docs/cucumber/api/#running-cucumber"
level = "SafeRead"
bare = true
standalone = [
    "--backtrace", "--color", "--dry-run", "--expand",
    "--guess", "--help", "--i18n-keywords", "--i18n-languages",
    "--init", "--no-color", "--no-diff", "--no-multiline",
    "--no-snippets", "--no-source", "--no-strict",
    "--publish", "--publish-quiet", "--quiet",
    "--retry", "--snippets", "--strict", "--verbose", "--version", "--wip",
    "-V", "-b", "-d", "-e", "-h", "-q",
]
valued = [
    "--ci-environment", "--format", "--format-options",
    "--language", "--lines", "--name", "--order",
    "--out", "--profile", "--require",
    "--require-module", "--retry", "--tags",
    "-f", "-i", "-l", "-n", "-o", "-p", "-r", "-t",
]
