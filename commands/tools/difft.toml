[[command]]
name = "difft"
description = "Structural diff tool that compares files based on their syntax tree rather than line-by-line text. Reads two files or directories and prints syntax-aware differences to stdout without modifying anything. Actively maintained with several releases per year."
url = "https://difftastic.wilfred.me.uk/"
level = "Inert"
bare = false
aliases = ["difftastic"]
standalone = [
    "--check-only", "--help", "--list-languages", "--missing-as-empty",
    "--skip-unchanged", "--strip-cr", "--version",
]
valued = [
    "--background", "--byte-limit", "--color", "--context",
    "--display", "--graph-limit", "--language", "--override",
    "--parse-error-limit", "--sort-paths", "--syntax-highlight",
    "--tab-width", "--width",
]
