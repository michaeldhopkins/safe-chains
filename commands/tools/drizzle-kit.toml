[[command]]
name = "drizzle-kit"
description = "CLI for the Drizzle ORM. `generate` produces SQL migrations from the schema (project-local SafeWrite). `studio` runs a local UI for browsing the database (network listener). `push`, `pull`, `migrate`, `drop` connect to the configured database (external system writes). `check`, `up`, `export` are introspective."
url = "https://orm.drizzle.team/docs/kit-overview"
researched_version = "drizzle-kit 0.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "generate"
level = "SafeWrite"
bare = true
standalone = ["--breakpoints", "--help", "-h", "--verbose"]
valued = ["--config", "--custom", "--name", "--out", "--schema"]

[[command.sub]]
name = "check"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]
valued = ["--config", "--out"]

[[command.sub]]
name = "up"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]
valued = ["--config", "--out"]

[[command.sub]]
name = "export"
level = "SafeRead"
bare = true
standalone = ["--help", "--sql", "-h"]
valued = ["--config"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "push"
candidate = true

[[command.sub]]
name = "pull"
candidate = true

[[command.sub]]
name = "introspect"
candidate = true

[[command.sub]]
name = "migrate"
candidate = true

[[command.sub]]
name = "drop"
candidate = true

[[command.sub]]
name = "studio"
candidate = true
