[[command]]
name = "envsubst"
description = "Substitutes environment variables into stdin / strings and prints to stdout. Pure read of env + transform of stdin. Stable GNU gettext utility."
url = "https://www.gnu.org/software/gettext/manual/html_node/envsubst-Invocation.html"
researched_version = "GNU gettext envsubst"
level = "SafeRead"
bare = true
tolerate_unknown_short = true
standalone = ["--help", "--variables", "--version", "-V", "-h", "-v"]
