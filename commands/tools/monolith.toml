[[command]]
name = "monolith"
description = "Saves a complete web page as a single self-contained HTML file by fetching and embedding all linked CSS, images, fonts, and JavaScript assets. It makes network requests to the target URL and all referenced asset URLs, and writes the result to stdout or a file. The -k flag disables TLS certificate verification. The --cookies and --user-agent flags transmit caller-specified data. Development is sporadic (v2.8.x, with gaps of months between releases)."
url = "https://github.com/Y2Z/monolith"
level = "Inert"
bare = false
max_positional = 1
standalone = [
    "-a", "-c", "-e", "-f", "-F", "-h", "-i", "-I", "-j",
    "-k", "-m", "-M", "-n", "-q", "-v", "-V",
    "--help", "--version", "--no-audio", "--no-css", "--no-fonts",
    "--no-frames", "--no-images", "--isolate", "--no-js",
    "--insecure", "--unwrap-noscript", "--silent",
    "--no-video", "--no-metadata",
]
valued = [
    "-b", "-B", "-C", "-d", "-E", "-t", "-u",
    "--base-url", "--blacklist-domains", "--cookies",
    "--domain", "--encoding", "--timeout", "--user-agent",
]
