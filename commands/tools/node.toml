[[command]]
name = "node"
description = "JavaScript runtime that executes arbitrary JavaScript with full access to the filesystem, network, child processes, and native addons. It is a general-purpose runtime — any script it runs operates with the invoking user's permissions. `--check`/`-c` is a parse-only syntax check: it reads the target file (or stdin), reports `SyntaxError` or exits cleanly, and does not execute the script, its top-level code, or any imports. Node.js ships new major versions yearly and adds CLI flags in minor releases (now at v25.x), so the flag surface is large and continuously growing."
url = "https://nodejs.org/api/cli.html"
researched_version = "Node.js 25.x"
level = "Inert"
bare = false
max_positional = 0
standalone = ["--help", "--version", "-h", "-v"]
valued = ["--check", "-c"]
