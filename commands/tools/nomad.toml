[[command]]
name = "nomad"
description = "HashiCorp Nomad CLI — cluster scheduler. Most subcommands contact a Nomad server (network) to read or schedule jobs. Carve-out covers diagnostic + read-only inspection: `version`, `status`, `job status`, `job inspect`, `node status`, `alloc status`, `eval status`, `validate`, `fmt --check`, `monitor`, `agent-info`."
url = "https://developer.hashicorp.com/nomad/docs/commands"
researched_version = "Nomad 1.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "status"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--help", "-h"]
valued = ["-address", "-namespace", "-region", "-token", "-token-file"]

[[command.sub]]
name = "agent-info"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]
valued = ["-address"]

[[command.sub]]
name = "validate"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h"]
valued = ["-vault-namespace", "-vault-token"]

[[command.sub]]
name = "fmt"
level = "SafeWrite"
bare = false
positional_style = true
standalone = ["--check", "--help", "--list", "--recursive", "--write", "-c", "-h", "-l", "-recursive", "-w"]
write_flags = ["--write", "-w"]

[[command.sub]]
name = "help"
allow_all = true

