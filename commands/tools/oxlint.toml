[[command]]
name = "oxlint"
description = "Rust-based JavaScript/TypeScript linter from the OXC project, 50-100x faster than ESLint. Runs static analysis on source files and reports diagnostics to stdout without modifying files (no autofix is enabled by default). Executes user project code only for parsing, not evaluation. Very actively developed with weekly releases; reached v1.0 stable in August 2025."
url = "https://oxc.rs/docs/guide/usage/linter/cli"
level = "SafeRead"
bare = true
standalone = [
    "--deny-warnings", "--disable-nested-config",
    "--help", "--import-plugin",
    "--quiet", "--report-unused-disable-directives",
    "--rules", "--version",
    "-V", "-h",
]
valued = [
    "--allow", "--config", "--deny",
    "--format", "--max-warnings",
    "--tsconfig", "--warn",
    "-A", "-D", "-W", "-f",
]
