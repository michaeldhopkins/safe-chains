[[command]]
name = "pandoc"
description = "Universal document converter — reads many formats (Markdown, RST, LaTeX, HTML, DOCX, EPUB, JSON, CSV, etc.) and writes many others (HTML, PDF, DOCX, EPUB, LaTeX, Markdown, etc.). -o / --output writes to a file; otherwise output goes to stdout. --filter and --lua-filter load arbitrary Pandoc filters (executable scripts or Lua); those are arbitrary code execution. --extract-media writes embedded media to disk. Citation processing reads bibliographic databases. Mature, widely used."
url = "https://pandoc.org/MANUAL.html"
researched_version = "pandoc 3.x"
level = "SafeWrite"
bare = true
standalone = [
    "--ascii", "--atx-headers",
    "--bash-completion", "--biblatex", "--bibliography",
    "--columns", "--csl", "--datadir",
    "--dump-args", "--eol",
    "--embed-resources", "--epub-chapter-level",
    "--epub-cover-image", "--epub-embed-font",
    "--epub-metadata", "--epub-stylesheet",
    "--epub-subdirectory", "--fail-if-warnings",
    "--file-scope", "--from", "--gladtex",
    "--help", "--highlight-style", "--html-q-tags",
    "--ignore-args", "--id-prefix", "--include-after-body",
    "--include-before-body", "--include-in-header",
    "--incremental", "--indented-code-classes",
    "--ipynb-output", "--katex", "--katex-stylesheet",
    "--latex-engine", "--list-extensions",
    "--list-highlight-languages", "--list-highlight-styles",
    "--list-input-formats", "--list-output-formats",
    "--listings", "--log",
    "--mathjax", "--mathml", "--metadata",
    "--mimex", "--natbib", "--no-check-certificate",
    "--no-highlight", "--number-offset",
    "--number-sections", "--output", "--parse-raw",
    "--pdf-engine", "--preserve-tabs",
    "--quiet", "--read", "--reference-doc",
    "--reference-links", "--reference-location",
    "--resource-path", "--sandbox",
    "--section-divs", "--self-contained",
    "--shift-heading-level-by",
    "--slide-level", "--smart",
    "--standalone", "--strip-comments",
    "--strip-empty-paragraphs", "--syntax-definition",
    "--tab-stop", "--table-of-contents",
    "--template", "--to",
    "--toc", "--toc-depth", "--top-level-division",
    "--trace", "--track-changes", "--variable",
    "--verbose", "--version", "--webtex",
    "--wrap", "--write",
    "-C", "-D", "-F", "-H", "-N", "-R",
    "-S", "-V", "-h", "-i", "-o",
    "-p", "-r", "-s", "-t", "-v", "-w",
]
valued = [
    "--abbreviations", "--bibliography", "--citation-abbreviations",
    "--columns", "--csl", "--data-dir",
    "--default-image-extension", "--dpi",
    "--email-obfuscation", "--epub-chapter-level",
    "--epub-cover-image", "--epub-embed-font",
    "--epub-metadata", "--epub-stylesheet",
    "--epub-subdirectory",
    "--extract-media", "--file-scope",
    "--from", "--gladtex", "--id-prefix",
    "--include-after-body", "--include-before-body",
    "--include-in-header", "--ipynb-output",
    "--katex", "--katex-stylesheet",
    "--latex-engine", "--log", "--lua-filter",
    "--mathjax", "--mathml", "--metadata",
    "--metadata-file",
    "--natbib",
    "--number-offset", "--output",
    "--pdf-engine", "--pdf-engine-opt",
    "--read", "--reference-doc",
    "--reference-location",
    "--request-header", "--resource-path",
    "--shift-heading-level-by", "--slide-level",
    "--syntax-definition", "--tab-stop",
    "--template", "--to", "--toc-depth",
    "--top-level-division", "--track-changes",
    "--variable", "--webtex", "--wrap",
    "--write",
    "-D", "-H", "-M", "-N", "-V", "-f", "-i", "-o",
    "-t", "-w",
]
write_flags = ["--output", "-o", "--extract-media"]
