[[command]]
name = "pylint"
description = "Static analysis tool for Python that checks for errors, coding standard violations, and code smells. Imports and partially executes Python modules to build an AST, so it can trigger module-level side effects in the analyzed code. Does not modify source files. Actively maintained with multiple releases per year; v4.0 shipped October 2025."
url = "https://pylint.readthedocs.io/en/latest/user_guide/usage/run.html"
level = "SafeRead"
bare = false
standalone = [
    "--errors-only", "--help", "--list-msgs", "--list-msgs-enabled",
    "--long-help", "--persistent", "--py-version",
    "--recursive", "--verbose", "--version",
    "-E", "-V", "-h", "-v",
]
valued = [
    "--disable", "--enable", "--extension-pkg-allow-list",
    "--fail-under", "--generated-members", "--ignore",
    "--ignore-paths", "--ignore-patterns", "--jobs",
    "--load-plugins", "--max-line-length", "--msg-template",
    "--output-format", "--rcfile", "--reports",
    "-d", "-e", "-f", "-j",
]
