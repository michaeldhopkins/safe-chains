[[command]]
name = "rspec"
description = "Ruby's behaviour-driven test framework. Loads the application code under test (so executes Ruby code at test time, including any side-effects test setup performs — DB connections, ActiveRecord migrations on the test schema, network mocks, etc.). Output is a test report to stdout; with --format documentation/progress/html/json/junit and --out it writes a report file. The --bisect flag re-runs the suite repeatedly to narrow failure ordering. --dry-run prints test names without running them. The --tag, --example, --pattern, --exclude-pattern flags scope which examples run. RSpec follows roughly annual major releases with monthly point releases; the CLI surface is highly stable."
url = "https://rspec.info/documentation/"
researched_version = "rspec ~3.x line; flag surface stable across recent releases as of 2026-05"
level = "SafeRead"
bare = true
standalone = [
    "--bisect", "--color", "--deprecation-out",
    "--dry-run", "--errors-only", "--fail-fast",
    "--fail-if-no-examples", "--force-color",
    "--format", "--help", "--no-color", "--no-fail-fast",
    "--no-profile", "--only-failures", "--order",
    "--profile", "--require", "--seed",
    "--tty", "--version", "--warnings",
    "-D", "-I", "-O", "-P", "-T",
    "-b", "-c", "-f", "-h", "-p", "-r", "-v", "-w",
]
valued = [
    "--default-path", "--example", "--exclude-pattern",
    "--filter-files", "--init", "--no-deprecation-out",
    "--out", "--pattern", "--tag",
    "-I", "-O", "-P", "-e", "-o", "-t",
]
write_flags = ["--out", "-o"]
