[[command]]
name = "rubocop"
description = "Ruby static code analyzer and formatter based on the community Ruby Style Guide. In its default mode (without -a/--auto-correct), it reports violations without modifying files. It loads and parses Ruby source files but does not execute application code. The --auto-correct and --fix flags (not exposed here) would write changes. Actively maintained with roughly monthly releases."
url = "https://docs.rubocop.org/rubocop/usage/basic_usage.html"
level = "SafeRead"
bare = true
standalone = [
    "--color", "--debug", "--display-cop-names",
    "--display-only-correctable", "--display-only-safe-correctable",
    "--display-style-guide", "--extra-details",
    "--help", "--lint", "--list-target-files",
    "--no-color", "--parallel", "--show-cops",
    "--show-docs-url", "--version",
    "-L", "-V", "-d", "-h", "-l",
]
valued = [
    "--cache-root", "--config", "--disable-pending-cops",
    "--enable-pending-cops", "--except", "--exclude-limit",
    "--fail-level", "--format", "--only", "--out",
    "--require", "--stdin",
    "-P", "-c", "-f", "-o", "-r",
]
