[[command]]
name = "secretlint"
description = "Pluggable linting tool that scans files for accidentally committed credentials, API keys, and other secrets. Reads source files and reports findings to stdout without modifying anything. Plugin-based architecture loads detection rules at runtime. Actively maintained with frequent releases; currently at v11.x."
url = "https://github.com/secretlint/secretlint"
level = "SafeRead"
bare = false
standalone = [
    "--help", "--no-color", "--no-maskSecrets",
    "--no-terminalLink", "--profile", "--version",
    "-h",
]
valued = [
    "--format", "--locale",
    "--secretlintignore", "--secretlintrc",
    "--secretlintrcJSON",
]
