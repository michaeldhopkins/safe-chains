[[command]]
name = "semgrep"
description = "Static analysis tool that finds bugs and security vulnerabilities using pattern-matching rules across 30+ languages. scan and ci subcommands parse source files and report findings without modifying them (--autofix is opt-in and not exposed here). The ci subcommand may send results to the Semgrep platform if configured. Actively maintained with monthly releases."
url = "https://semgrep.dev/docs/cli-reference/"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "scan"
level = "SafeRead"
standalone = [
    "--debug", "--dryrun", "--emacs", "--error", "--help",
    "--json", "--junit-xml", "--no-autofix", "--no-git-ignore",
    "--no-rewrite-rule-ids", "--quiet", "--sarif",
    "--strict", "--text", "--time", "--verbose", "--vim",
    "-e", "-h", "-q", "-v",
]
valued = [
    "--config", "--exclude", "--include", "--lang",
    "--max-target-bytes", "--metrics", "--output",
    "--pattern", "--timeout",
    "-c", "-f", "-l", "-o",
]

[[command.sub]]
name = "ci"
level = "SafeRead"
standalone = [
    "--debug", "--dryrun", "--help", "--json",
    "--quiet", "--sarif", "--text", "--verbose",
    "-h", "-q",
]
valued = ["--config", "--exclude", "--include", "--metrics", "--output", "-c", "-o"]
