[[command]]
name = "shellcheck"
description = "Static analysis tool for shell scripts (bash, sh, dash, ksh). Parses scripts and reports common errors, portability issues, and style problems without executing them. Purely read-only with no file-modification capability. Infrequent but stable releases; v0.11.0 shipped August 2025."
url = "https://www.shellcheck.net/wiki/"
level = "Inert"
bare = false
standalone = [
    "--color", "--external-sources", "--help", "--list-optional",
    "--norc", "--severity", "--version", "--wiki-link-count",
    "-C", "-V", "-a", "-h", "-x",
]
valued = [
    "--enable", "--exclude", "--format", "--include",
    "--rcfile", "--severity", "--shell", "--source-path", "--wiki-link-count",
    "-P", "-S", "-W", "-e", "-f", "-i", "-o", "-s",
]
