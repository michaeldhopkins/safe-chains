[[command]]
name = "skaffold"
description = "Continuous development for Kubernetes apps. `dev`, `run`, `debug`, `deploy`, `delete`, `apply` build images and push to a cluster (external system writes). `build`, `render`, `diagnose`, `inspect`, `find-configs`, `config list`, `version`, `survey`, `completion` are mostly read-only or local diagnostics. The carve-out covers diagnostic forms."
url = "https://skaffold.dev/docs/references/cli/"
researched_version = "skaffold 2.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]
valued = ["--output", "-o"]

[[command.sub]]
name = "diagnose"
level = "SafeRead"
bare = true
standalone = ["--enable-templating", "--enable-rpc", "--help", "--yaml-only", "-h"]
valued = ["--filename", "--output", "-f", "-o", "--rpc-port"]

[[command.sub]]
name = "find-configs"
level = "SafeRead"
bare = true
standalone = ["--help", "-h"]
valued = ["--directory", "--output", "-d", "-o"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

[[command.sub]]
name = "dev"
candidate = true

[[command.sub]]
name = "run"
candidate = true

[[command.sub]]
name = "debug"
candidate = true

[[command.sub]]
name = "deploy"
candidate = true

[[command.sub]]
name = "delete"
candidate = true

[[command.sub]]
name = "apply"
candidate = true

[[command.sub]]
name = "build"
candidate = true

[[command.sub]]
name = "render"
candidate = true

[[command.sub]]
name = "test"
candidate = true

[[command.sub]]
name = "verify"
candidate = true

[[command.sub]]
name = "config"
candidate = true

[[command.sub]]
name = "credentials"
candidate = true

[[command.sub]]
name = "exec"
candidate = true

[[command.sub]]
name = "fix"
candidate = true

[[command.sub]]
name = "init"
candidate = true

[[command.sub]]
name = "inspect"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "-h"]
valued = ["-f", "--filename", "-o", "--output", "--module", "-m"]

[[command.sub]]
name = "schema"
candidate = true

[[command.sub]]
name = "survey"
candidate = true

[[command.sub]]
name = "lint"
candidate = true

[[command.sub]]
name = "filter"
candidate = true
