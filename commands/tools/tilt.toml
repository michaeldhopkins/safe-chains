[[command]]
name = "tilt"
description = "Local Kubernetes / Docker dev environment with continuous build/deploy. `up` runs the long-running interactive dev loop (builds images, deploys to local cluster). `ci` runs in CI mode. `down` tears down resources. `args`, `disable`, `enable`, `trigger`, `wait` mutate cluster/run state. The carve-out covers diagnostic forms only."
url = "https://docs.tilt.dev/cli/tilt"
researched_version = "tilt 0.x"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "doctor"
level = "Inert"
bare = true
standalone = ["--help", "-h"]
valued = ["--output", "-o"]

[[command.sub]]
name = "verify-install"
level = "Inert"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "completion"
level = "Inert"
bare = false
positional_style = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
allow_all = true

