[[command]]
name = "watchexec"
description = "File-watching tool that re-executes a command when files change. Acts as a wrapper: it monitors the filesystem for changes and then runs an arbitrary inner command. Safety depends entirely on the inner command being executed. The watcher itself only reads filesystem events. Development pace has slowed but the project remains maintained; v2.5.1 shipped March 2026."
url = "https://watchexec.github.io/"
[command.wrapper]
standalone = [
    "--clear", "--help", "--no-default-ignore", "--no-discover-ignore",
    "--no-environment", "--no-meta", "--no-process-group",
    "--no-vcs-ignore", "--notify", "--postpone", "--restart",
    "--verbose", "--version",
    "-c", "-h", "-n", "-p", "-r", "-v", "-w",
]
valued = [
    "--color", "--debounce", "--delay-run", "--emit-events-to",
    "--exts", "--filter", "--filter-file", "--ignore",
    "--log-file", "--on-busy-update", "--project-origin",
    "--signal", "--stop-signal", "--stop-timeout",
    "--watch", "--workdir",
    "-E", "-W", "-d", "-e", "-f", "-i", "-j",
]
separator = "--"
