[[command]]
name = "jj"
url = "https://jj-vcs.github.io/jj/latest/cli-reference/"
bare_flags = ["--help", "--version", "-h"]
[command.wrapper]
standalone = ["--debug", "--ignore-immutable", "--ignore-working-copy", "--no-pager", "--quiet", "--verbose"]
valued = ["--at-op", "--at-operation", "--color", "--repository", "-R"]

[[command.sub]]
name = "cat"
positional_style = true
bare = false

[[command.sub]]
name = "diff"
positional_style = true

[[command.sub]]
name = "help"
positional_style = true

[[command.sub]]
name = "log"
positional_style = true

[[command.sub]]
name = "root"
positional_style = true

[[command.sub]]
name = "show"
positional_style = true

[[command.sub]]
name = "st"
positional_style = true

[[command.sub]]
name = "status"
positional_style = true

[[command.sub]]
name = "version"
positional_style = true

[[command.sub]]
name = "bookmark"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "config"
nested_bare = true
[[command.sub.sub]]
name = "get"
positional_style = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "file"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "show"
positional_style = true

[[command.sub]]
name = "git"
nested_bare = true
[[command.sub.sub]]
name = "fetch"
positional_style = true
[[command.sub.sub]]
name = "remote"
nested_bare = true
[[command.sub.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "op"
nested_bare = true
[[command.sub.sub]]
name = "log"
positional_style = true

[[command.sub]]
name = "resolve"
first_arg = ["--list"]

[[command.sub]]
name = "tag"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command.sub]]
name = "workspace"
nested_bare = true
[[command.sub.sub]]
name = "list"
positional_style = true

[[command]]
name = "git"
url = "https://git-scm.com/docs"
bare_flags = ["--help", "--version", "-V", "-h"]
[command.wrapper]
valued = ["-C"]

[[command.sub]]
name = "blame"
bare = false
standalone = [
    "--color-by-age", "--color-lines",
    "--help", "--incremental",
    "--line-porcelain",
    "--minimal",
    "--porcelain", "--progress",
    "--root",
    "--show-email", "--show-name", "--show-number",
    "--show-stats",
    "-b", "-c", "-e", "-f", "-h", "-k", "-l", "-n", "-p", "-s", "-t", "-w",
]
valued = [
    "--abbrev",
    "--contents",
    "--ignore-rev", "--ignore-revs-file",
    "-C", "-L", "-M", "-S",
]

[[command.sub]]
name = "branch"
standalone = [
    "--all", "--help", "--ignore-case", "--list",
    "--no-abbrev", "--no-color", "--no-column",
    "--omit-empty", "--remotes", "--show-current",
    "--verbose",
    "-a", "-h", "-i", "-l", "-r", "-v", "-vv",
]
valued = [
    "--abbrev", "--color", "--column", "--contains",
    "--format", "--merged", "--no-contains", "--no-merged",
    "--points-at", "--sort",
]

