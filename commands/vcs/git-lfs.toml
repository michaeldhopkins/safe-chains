[[command]]
name = "git-lfs"
description = "Git extension for versioning large binary files by replacing them with text pointers while storing contents on a remote server. Read-only subcommands (ls-files, status, env, version, locks) inspect local and remote LFS state without modifying anything. Write operations (track, push, pull, install) modify .gitattributes, transfer data over the network, or alter git hooks. The locks subcommand with --verify contacts the remote to check lock ownership. Major releases happen every 2-4 years; minor/patch releases ship as needed (latest: v3.7.1, Oct 2025)."
url = "https://git-lfs.com/"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "env"
standalone = ["--help", "-h"]

[[command.sub]]
name = "ls-files"
standalone = [
    "--all", "--deleted", "--help", "--long",
    "--name-only", "--size",
    "-a", "-d", "-h", "-l", "-n", "-s",
]
valued = ["--include", "--exclude", "-I", "-X"]

[[command.sub]]
name = "status"
standalone = ["--help", "--json", "--porcelain", "-h"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "locks"
standalone = ["--help", "--json", "--local", "--verify", "-h", "-l", "-v"]
valued = ["--id", "--limit", "--path"]
