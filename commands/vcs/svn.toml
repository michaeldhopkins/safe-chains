[[command]]
name = "svn"
description = "Subversion — centralized version control. Read-side: `log`, `diff`, `status`, `info`, `cat`, `list`, `ls`, `blame`, `praise`, `annotate`, `proplist`, `propget`, `pget`, `plist`, `pl`, `propedit`, `propdel`, `mergeinfo`, `cleanup --help`, `--version`, `--help`. Write-side: `add`, `commit`, `ci`, `update`, `up`, `co`, `checkout`, `import`, `export`, `mkdir`, `rm`, `delete`, `del`, `move`, `mv`, `rename`, `ren`, `copy`, `cp`, `lock`, `unlock`, `merge`, `propset`, `pset`, `revert`, `resolve`, `resolved`, `switch`, `relocate`, `cleanup`."
url = "https://subversion.apache.org/docs/release-notes/1.14.html"
researched_version = "Subversion 1.14"
bare_flags = ["--help", "--version", "-h", "-v"]

[[command.sub]]
name = "log"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--all-revprops", "--diff", "--help", "--incremental", "--quiet", "--revprop", "--search", "--stop-on-copy", "--use-merge-history", "--verbose", "--with-all-revprops", "--with-no-revprops", "--xml", "-c", "-g", "-h", "-l", "-q", "-r", "-v"]
valued = ["--changelist", "--config-dir", "--config-option", "--depth", "--diff-cmd", "--limit", "--password", "--revision", "--search-and", "--targets", "--username", "--with-revprop", "--xml-file", "-c", "-g", "-l", "-r"]

[[command.sub]]
name = "diff"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--diff-cmd", "--force", "--git", "--help", "--no-diff-deleted", "--no-diff-added", "--no-diff-statistics", "--notice-ancestry", "--patch-compatible", "--summarize", "--xml", "-c", "-h", "-r", "-x"]
valued = ["--changelist", "--config-dir", "--config-option", "--depth", "--diff-cmd", "--extensions", "--internal-diff", "--new", "--old", "--password", "--revision", "--username", "-c", "-r", "-x"]

[[command.sub]]
name = "status"
aliases = ["stat", "st"]
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--changelist", "--config-dir", "--depth", "--help", "--ignore-externals", "--incremental", "--no-ignore", "--quiet", "--show-updates", "--verbose", "--xml", "-N", "-h", "-q", "-u", "-v"]
valued = ["--changelist", "--config-dir", "--config-option", "--depth"]

[[command.sub]]
name = "info"
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--help", "--include-externals", "--incremental", "--recursive", "--targets", "--xml", "-R", "-h", "-r"]
valued = ["--changelist", "--config-dir", "--depth", "--password", "--revision", "--targets", "--username", "-r"]

[[command.sub]]
name = "cat"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--help", "--ignore-keywords", "-h", "-r"]
valued = ["--config-dir", "--password", "--revision", "--username", "-r"]

[[command.sub]]
name = "list"
aliases = ["ls"]
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--depth", "--help", "--incremental", "--recursive", "--verbose", "--xml", "-R", "-h", "-r", "-v"]
valued = ["--config-dir", "--depth", "--password", "--revision", "--username", "-r"]

[[command.sub]]
name = "blame"
aliases = ["praise", "annotate", "ann"]
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--force", "--help", "--use-merge-history", "--xml", "-g", "-h", "-r", "-v", "-x"]
valued = ["--config-dir", "--diff-cmd", "--extensions", "--password", "--revision", "--username", "-r", "-x"]

[[command.sub]]
name = "proplist"
aliases = ["plist", "pl"]
level = "SafeRead"
bare = true
positional_style = true
standalone = ["--depth", "--help", "--incremental", "--quiet", "--recursive", "--revprop", "--show-inherited-props", "--verbose", "--xml", "-R", "-h", "-q", "-r", "-v"]
valued = ["--changelist", "--config-dir", "--depth", "--password", "--revision", "--username", "-r"]

[[command.sub]]
name = "propget"
aliases = ["pget", "pg"]
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--depth", "--help", "--no-newline", "--recursive", "--revprop", "--show-inherited-props", "--strict", "--verbose", "--xml", "-R", "-h", "-r", "-v"]
valued = ["--changelist", "--config-dir", "--depth", "--password", "--revision", "--username", "-r"]

[[command.sub]]
name = "mergeinfo"
level = "SafeRead"
bare = false
positional_style = true
standalone = ["--from-source", "--help", "--show-revs", "-h"]
valued = ["--config-dir", "--password", "--revision", "--username", "-R", "-r"]

[[command.sub]]
name = "help"
allow_all = true

