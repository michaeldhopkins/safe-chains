[[command]]
name = "spin"
description = "Fermyon Spin — framework + runtime for WebAssembly serverless apps. Subcommands include `up`, `build`, `deploy`, `new`, `add`, `templates`, `plugins`, `registry`, `logs`, `link`, `unlink`, `init`, `cloud`, `watch`, `doctor`, `version`, `help`. `up` runs the long-running local server (executes user wasm). `build` compiles components (project-local SafeWrite + may invoke cargo / npm / etc.). `deploy` and `cloud` push to Fermyon Cloud (network)."
url = "https://developer.fermyon.com/spin/v3/cli-reference"
researched_version = "spin 3.x"
bare_flags = ["--help", "--version", "-h", "-V"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "doctor"
level = "Inert"
bare = true
standalone = ["--help", "-h"]

[[command.sub]]
name = "templates"
nested_bare = true

[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub.sub]]
name = "install"
candidate = true

[[command.sub.sub]]
name = "uninstall"
candidate = true

[[command.sub.sub]]
name = "upgrade"
candidate = true

[[command.sub]]
name = "plugins"
nested_bare = true

[[command.sub.sub]]
name = "list"
standalone = ["--help", "--all", "--summary", "--verbose", "-a", "-h"]

[[command.sub.sub]]
