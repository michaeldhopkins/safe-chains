[[command]]
name = "wasm2wat"
description = "WABT — disassembles a WebAssembly binary (.wasm) into text (.wat). Reads the .wasm file and writes the .wat to stdout (or to -o PATH). Pure read of binary; static disassembly."
url = "https://github.com/WebAssembly/wabt"
researched_version = "WABT 1.x"
level = "SafeRead"
bare = false
positional_style = true
standalone = [
    "--enable-all", "--enable-bulk-memory",
    "--enable-exceptions", "--enable-gc",
    "--enable-multi-memory", "--enable-multi-value",
    "--enable-mutable-globals", "--enable-reference-types",
    "--enable-relaxed-simd", "--enable-simd",
    "--enable-tail-call", "--enable-threads",
    "--fold-exprs", "--generate-names", "--help",
    "--ignore-custom-section-errors",
    "--inline-exports", "--inline-imports",
    "--no-debug-names", "--verbose", "--version",
    "-f", "-h", "-v",
]
valued = ["--output", "-o"]
