[[command]]
name = "timeout"
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#timeout-invocation"
[command.wrapper]
standalone = ["--preserve-status"]
valued = ["--signal", "--kill-after", "-s", "-k"]
positional_skip = 1

[[command]]
name = "time"
url = "https://man7.org/linux/man-pages/man1/time.1.html"
[command.wrapper]
standalone = ["-p"]

[[command]]
name = "nice"
aliases = ["ionice"]
url = "https://www.gnu.org/software/coreutils/manual/coreutils.html#nice-invocation"
[command.wrapper]
valued = ["-n", "--adjustment"]

[[command]]
name = "dotenv"
url = "https://github.com/bkeepers/dotenv"
[command.wrapper]
valued = ["-c", "-e", "-f", "-v"]
separator = "--"
