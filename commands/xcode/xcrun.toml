[[command]]
name = "xcrun"
description = "macOS developer tool dispatcher that locates and executes tools within the active Xcode toolchain. The query flags (--find, --show-sdk-path, --show-sdk-version, --show-sdk-build-version, --show-sdk-platform-path, --show-sdk-platform-version, --show-toolchain-path) are read-only — they print paths or version strings. When used as a wrapper (xcrun <tool> ...), it exec's the inner tool, so safety depends entirely on the delegated command. --sdk and --toolchain select which toolchain to search. Part of Xcode command-line tools; versioning follows Xcode releases."
url = "https://ss64.com/mac/xcrun.html"
bare_flags = []
[command.wrapper]
standalone = ["-l", "-n", "-v", "--log", "--no-cache", "--verbose"]
valued = ["--sdk", "--toolchain"]

[[command.sub]]
name = "--find"
bare = false
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-sdk-build-version"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-sdk-path"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-sdk-platform-path"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-sdk-platform-version"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-sdk-version"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "--show-toolchain-path"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "simctl"
[[command.sub.sub]]
name = "list"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "stapler"
[[command.sub.sub]]
name = "validate"
tolerate_unknown_short = true
tolerate_unknown_long = true

[[command.sub]]
name = "notarytool"
[[command.sub.sub]]
name = "history"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "info"
tolerate_unknown_short = true
tolerate_unknown_long = true
[[command.sub.sub]]
name = "log"
tolerate_unknown_short = true
tolerate_unknown_long = true
